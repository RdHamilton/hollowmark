# security-review-gate-test.yml
#
# S-07 Gate Logic — Unit Tests
#
# PURPOSE
# -------
# Verifies the critical properties of the SHA-delta staleness check (AC3/AC3b/AC4)
# and the check-run conclusion decision logic (AC5/AC6/AC7) in
# security-review-gate.yml.
#
# AC3:  A verdict approved before an update-branch merge commit, where the
#       merge commit touches ONLY non-S07-1A paths, keeps the gate GREEN.
#       (No false-positive staleness on security-inert rebases.)
#
# AC4:  A verdict approved before a commit that touches an S07-1A path is
#       correctly marked STALE. The gate stays RED and Sarah must re-review.
#       (Gate integrity preserved for real security changes.)
#
# AC3b: Fast-path — verdict timestamp is newer than the push timestamp;
#       verdict is trivially fresh without needing a delta walk.
#
# AC5:  Gate required + fresh matching verdict → decision conclusion = "success".
#       (The happy path: Sarah approved, check-run turns green.)
#
# AC6:  Gate required + no verdict found after retry exhaustion →
#       decision conclusion = "failure".
#       (True-negative: no approval comment → merge stays blocked.)
#
# AC7:  Gate required + verdict exists but verdict pre-dates a post-verdict
#       §1A-path commit → decision conclusion = "failure".
#       (Staleness caught: Sarah must re-review the new security-sensitive code.)
#
# HOW IT WORKS
# ------------
# The test harness replicates the exact bash decision logic from the gate
# steps in security-review-gate.yml using injected synthetic data rather
# than live GitHub API calls. No real PR is required.
#
# Each test case:
#   1. Sets input env vars (timestamps, paths, gate/verdict state).
#   2. Runs the replicated decision logic.
#   3. Asserts the expected conclusion output.
#
# TRIGGER
# -------
# Manual only (workflow_dispatch). Not triggered by push or pull_request --
# this is a test harness, not a gate enforcement workflow.
#
# Runbook: vault-mtg-docs/engineering/runbooks/infra-security-review-gate.md
# Ticket:  vault-mtg-tickets#231, RdHamilton/hollowmark#2420

name: S-07 Gate Staleness Tests

on:
  workflow_dispatch:

jobs:
  test-staleness-logic:
    name: Test SHA-Delta Staleness Logic
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # -----------------------------------------------------------------------
      # Shared helper: run the staleness delta check against a list of changed
      # files (newline-separated) and the S-07 §1A trigger globs.
      #
      # Inputs (env vars expected by this step's logic, set per test case):
      #   VERDICT_TIMESTAMP   -- ISO8601 UTC timestamp of the APPROVED comment
      #   LAST_PUSH_TIMESTAMP -- ISO8601 UTC timestamp of the current HEAD commit
      #   COMMIT_FILES        -- newline-separated list of files changed after verdict
      #
      # Outputs written to GITHUB_OUTPUT:
      #   verdict_valid -- "true" (fresh) or "false" (stale)
      # -----------------------------------------------------------------------

      # -----------------------------------------------------------------------
      # AC3: Security-inert update-branch merge commit must NOT stale the verdict
      # -----------------------------------------------------------------------
      - name: "AC3 setup: verdict before update-branch (non-1A files only)"
        run: |
          # Verdict posted at T=0; update-branch merge commit lands at T=+1m.
          # The merge commit only touches non-S07 paths (docs, frontend assets).
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:01:00Z"
          } >> "$GITHUB_ENV"
          # Newline-delimited: one file per "commit" (flat list for the check)
          {
            printf 'COMMIT_FILES<<EOF\n'
            printf 'docs/changelog.md\n'
            printf 'frontend/src/App.tsx\n'
            printf 'README.md\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC3: run delta check — expect verdict_valid=true (gate stays green)"
        id: ac3_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
        run: |
          set -euo pipefail

          # Replicate the fast-path / delta-path logic from security-review-gate.yml
          # "Scan PR comments" step.

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          echo "Verdict post-dates last push: ${VERDICT_AFTER_PUSH}"

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            # Fast path -- verdict is genuinely newer; trivially fresh.
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Delta path: check changed files against S-07 §1A trigger globs.
          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/deploy-spa-staging.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/daemon-release.yml"
            ".github/workflows/frontend.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          S07_DELTA_FOUND=false

          while IFS= read -r FILE; do
            [ -z "${FILE}" ] && continue
            for GLOB in "${TRIGGER_GLOBS[@]}"; do
              if echo "${FILE}" | grep -qF "${GLOB}"; then
                echo "S-07 §1A path match: ${FILE} matches ${GLOB}"
                S07_DELTA_FOUND=true
                break 2
              fi
            done
          done <<< "${COMMIT_FILES}"

          if [ "${S07_DELTA_FOUND}" = "true" ]; then
            echo "Delta check: STALE"
            echo "verdict_valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "Delta check: FRESH (no §1A paths in commits after verdict)"
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "AC3: assert verdict_valid=true"
        env:
          RESULT: ${{ steps.ac3_check.outputs.verdict_valid }}
        run: |
          echo "AC3 result: verdict_valid=${RESULT}"
          if [ "${RESULT}" != "true" ]; then
            echo "FAIL: AC3 — expected verdict_valid=true (gate green after inert update-branch),"
            echo "      but got verdict_valid=${RESULT}."
            echo "      A security-inert merge commit must NOT invalidate Sarah's prior verdict."
            exit 1
          fi
          echo "PASS: AC3 — security-inert update-branch does not stale the verdict."

      # -----------------------------------------------------------------------
      # AC4: Real S07-1A-path commit after verdict MUST stale the verdict
      # -----------------------------------------------------------------------
      - name: "AC4 setup: verdict before a real 1A-path commit"
        run: |
          # Verdict posted at T=0; engineer pushes a services/bff/cmd/ change at T=+2m.
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:02:00Z"
          } >> "$GITHUB_ENV"
          {
            printf 'COMMIT_FILES<<EOF\n'
            printf 'services/bff/cmd/main.go\n'
            printf 'services/bff/cmd/daemon_register.go\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC4: run delta check — expect verdict_valid=false (gate goes red)"
        id: ac4_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
        run: |
          set -euo pipefail

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          echo "Verdict post-dates last push: ${VERDICT_AFTER_PUSH}"

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/deploy-spa-staging.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/daemon-release.yml"
            ".github/workflows/frontend.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          S07_DELTA_FOUND=false

          while IFS= read -r FILE; do
            [ -z "${FILE}" ] && continue
            for GLOB in "${TRIGGER_GLOBS[@]}"; do
              if echo "${FILE}" | grep -qF "${GLOB}"; then
                echo "S-07 §1A path match: ${FILE} matches ${GLOB}"
                S07_DELTA_FOUND=true
                break 2
              fi
            done
          done <<< "${COMMIT_FILES}"

          if [ "${S07_DELTA_FOUND}" = "true" ]; then
            echo "Delta check: STALE — §1A path(s) changed after verdict"
            echo "verdict_valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "Delta check: FRESH"
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "AC4: assert verdict_valid=false"
        env:
          RESULT: ${{ steps.ac4_check.outputs.verdict_valid }}
        run: |
          echo "AC4 result: verdict_valid=${RESULT}"
          if [ "${RESULT}" != "false" ]; then
            echo "FAIL: AC4 — expected verdict_valid=false (gate red after real 1A-path change),"
            echo "      but got verdict_valid=${RESULT}."
            echo "      A genuine S-07 §1A-path change after approval MUST invalidate the verdict."
            exit 1
          fi
          echo "PASS: AC4 — real §1A-path change after verdict correctly stales approval."

      # -----------------------------------------------------------------------
      # AC3b: Fast path — verdict timestamp is NEWER than push (trivially fresh)
      # -----------------------------------------------------------------------
      - name: "AC3b setup: verdict newer than head commit (fast path)"
        run: |
          # Sarah posts verdict at T=+5m, head commit is at T=0.
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:05:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:00:00Z"
          } >> "$GITHUB_ENV"
          {
            printf 'COMMIT_FILES<<EOF\n'
            printf 'services/bff/cmd/main.go\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC3b: run delta check — expect verdict_valid=true (fast path)"
        id: ac3b_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
        run: |
          set -euo pipefail

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          echo "Verdict post-dates last push: ${VERDICT_AFTER_PUSH}"

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            echo "Fast path: verdict is newer than head -- trivially fresh."
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Should not reach here in AC3b.
          echo "verdict_valid=false" >> "$GITHUB_OUTPUT"

      - name: "AC3b: assert verdict_valid=true (fast path)"
        env:
          RESULT: ${{ steps.ac3b_check.outputs.verdict_valid }}
        run: |
          echo "AC3b result: verdict_valid=${RESULT}"
          if [ "${RESULT}" != "true" ]; then
            echo "FAIL: AC3b — expected verdict_valid=true (fast path: verdict newer than push),"
            echo "      but got verdict_valid=${RESULT}."
            exit 1
          fi
          echo "PASS: AC3b — fast path correctly identifies fresh verdict."

      # -----------------------------------------------------------------------
      # AC5: Gate required + fresh matching verdict → conclusion = "success"
      #
      # Verifies the check-run conclusion decision logic added by ticket #2420:
      # when the gate IS required and the verdict scan returns approved=true
      # (verdict is fresh), the conclusion emitted is "success".
      # -----------------------------------------------------------------------
      - name: "AC5 setup: gate required, verdict present and fresh"
        run: |
          {
            echo "GATE_REQUIRED=true"
            echo "APPROVED=true"
            echo "VERDICT_TIMESTAMP=2026-05-29T10:05:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "STALENESS_CHECK=fresh"
          } >> "$GITHUB_ENV"

      - name: "AC5: run conclusion decision — expect conclusion=success"
        id: ac5_check
        env:
          GATE_REQUIRED:      ${{ env.GATE_REQUIRED }}
          APPROVED:           ${{ env.APPROVED }}
          STALENESS_CHECK:    ${{ env.STALENESS_CHECK }}
        run: |
          set -euo pipefail

          # Replicate the conclusion-decision logic from the
          # "Publish check-run result" step in security-review-gate.yml.
          #
          # Logic:
          #   gate not required            → conclusion = success  (gate skipped)
          #   gate required + approved     → conclusion = success  (verdict accepted)
          #   gate required + not approved → conclusion = failure  (blocked)

          if [ "${GATE_REQUIRED}" != "true" ]; then
            CONCLUSION="success"
            TITLE="Security Review Gate: Not Required"
            SUMMARY="This PR does not match S-07 trigger criteria. Gate skipped."
          elif [ "${APPROVED}" = "true" ]; then
            CONCLUSION="success"
            TITLE="Security Review Gate: PASSED"
            SUMMARY="S-07 effect-enumeration review complete. Staleness check: ${STALENESS_CHECK}."
          else
            CONCLUSION="failure"
            TITLE="Security Review Gate: BLOCKED"
            SUMMARY="No APPROVED verdict found. Merge is blocked until Sarah posts the verdict."
          fi

          echo "conclusion=${CONCLUSION}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: "AC5: assert conclusion=success"
        env:
          RESULT: ${{ steps.ac5_check.outputs.conclusion }}
        run: |
          echo "AC5 result: conclusion=${RESULT}"
          if [ "${RESULT}" != "success" ]; then
            echo "FAIL: AC5 — expected conclusion=success (gate required + fresh verdict),"
            echo "      but got conclusion=${RESULT}."
            echo "      A required gate with a fresh APPROVED verdict MUST publish success."
            exit 1
          fi
          echo "PASS: AC5 — required gate + fresh verdict produces conclusion=success."

      # -----------------------------------------------------------------------
      # AC6: Gate required + no verdict after retries → conclusion = "failure"
      #
      # Verifies that when the gate IS required but no APPROVED comment is found
      # (the retry loop exhausted), the conclusion is "failure" (merge blocked).
      # -----------------------------------------------------------------------
      - name: "AC6 setup: gate required, no verdict found"
        run: |
          {
            echo "GATE_REQUIRED=true"
            echo "APPROVED=false"
            echo "VERDICT_TIMESTAMP="
            echo "LAST_PUSH_TIMESTAMP="
            echo "STALENESS_CHECK="
          } >> "$GITHUB_ENV"

      - name: "AC6: run conclusion decision — expect conclusion=failure"
        id: ac6_check
        env:
          GATE_REQUIRED:   ${{ env.GATE_REQUIRED }}
          APPROVED:        ${{ env.APPROVED }}
          STALENESS_CHECK: ${{ env.STALENESS_CHECK }}
        run: |
          set -euo pipefail

          if [ "${GATE_REQUIRED}" != "true" ]; then
            CONCLUSION="success"
          elif [ "${APPROVED}" = "true" ]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          echo "conclusion=${CONCLUSION}" >> "$GITHUB_OUTPUT"

      - name: "AC6: assert conclusion=failure"
        env:
          RESULT: ${{ steps.ac6_check.outputs.conclusion }}
        run: |
          echo "AC6 result: conclusion=${RESULT}"
          if [ "${RESULT}" != "failure" ]; then
            echo "FAIL: AC6 — expected conclusion=failure (gate required + no verdict),"
            echo "      but got conclusion=${RESULT}."
            echo "      A required gate with no APPROVED verdict MUST publish failure."
            exit 1
          fi
          echo "PASS: AC6 — required gate + no verdict produces conclusion=failure."

      # -----------------------------------------------------------------------
      # AC7: Gate required + verdict exists but §1A commit after verdict →
      #      staleness catches it → approved=false → conclusion = "failure"
      #
      # Verifies the end-to-end chain: a post-verdict §1A-path push marks
      # approved=false via the staleness check, which then flows through to
      # conclusion=failure (gate stays red, Sarah must re-review).
      # -----------------------------------------------------------------------
      - name: "AC7 setup: gate required, verdict staled by post-verdict 1A commit"
        run: |
          # Verdict posted at T=0; engineer pushes a services/bff/cmd/ change at T=+2m.
          # Staleness check sets approved=false (S07_DELTA_FOUND=true).
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:02:00Z"
          } >> "$GITHUB_ENV"
          {
            printf 'COMMIT_FILES_AC7<<EOF\n'
            printf 'services/bff/cmd/main.go\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC7: run staleness check then conclusion decision — expect conclusion=failure"
        id: ac7_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES_AC7 }}
        run: |
          set -euo pipefail

          # Step 1: staleness check (same as AC3/AC4 logic)
          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          APPROVED="false"

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            APPROVED="true"
          else
            TRIGGER_GLOBS=(
              ".github/workflows/deploy-bff.yml"
              ".github/workflows/deploy-spa.yml"
              ".github/workflows/deploy-spa-staging.yml"
              ".github/workflows/release.yml"
              ".github/workflows/rollback.yml"
              ".github/workflows/staging-deploy.yml"
              ".github/workflows/daemon-release.yml"
              ".github/workflows/frontend.yml"
              "services/bff/cmd/"
              "services/daemon/cmd/"
              "scripts/deploy/"
            )

            S07_DELTA_FOUND=false
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  echo "S-07 §1A path match: ${FILE} -> staling verdict"
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${COMMIT_FILES}"

            if [ "${S07_DELTA_FOUND}" = "false" ]; then
              APPROVED="true"
            fi
          fi

          echo "After staleness check: approved=${APPROVED}"

          # Step 2: conclusion decision
          if [ "${APPROVED}" = "true" ]; then
            CONCLUSION="success"
          else
            CONCLUSION="failure"
          fi

          echo "conclusion=${CONCLUSION}" >> "$GITHUB_OUTPUT"

      - name: "AC7: assert conclusion=failure"
        env:
          RESULT: ${{ steps.ac7_check.outputs.conclusion }}
        run: |
          echo "AC7 result: conclusion=${RESULT}"
          if [ "${RESULT}" != "failure" ]; then
            echo "FAIL: AC7 — expected conclusion=failure (verdict staled by post-verdict §1A commit),"
            echo "      but got conclusion=${RESULT}."
            echo "      A staled verdict MUST flow through to conclusion=failure."
            exit 1
          fi
          echo "PASS: AC7 — post-verdict §1A-path commit stales verdict and produces conclusion=failure."

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Test summary
        run: |
          echo "======================================================"
          echo "  S-07 Gate Tests: ALL PASSED"
          echo "======================================================"
          echo ""
          echo "AC3 : security-inert update-branch does not stale verdict        PASS"
          echo "AC3b: fast path (verdict newer than head) works correctly         PASS"
          echo "AC4 : real §1A-path change after verdict stales correctly         PASS"
          echo "AC5 : gate required + fresh verdict -> conclusion=success         PASS"
          echo "AC6 : gate required + no verdict   -> conclusion=failure          PASS"
          echo "AC7 : gate required + staled verdict -> conclusion=failure        PASS"
          echo ""
          echo "Gate integrity and check-run conclusion properties verified."
          echo "Tickets: vault-mtg-tickets#231, RdHamilton/hollowmark#2420"
