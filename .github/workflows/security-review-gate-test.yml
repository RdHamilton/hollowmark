# security-review-gate-test.yml
#
# S-07 Gate Logic — Unit Tests
#
# PURPOSE
# -------
# Verifies the critical properties of the SHA-delta staleness check and the
# check-run conclusion decision logic in security-review-gate.yml.
#
# Test cases (RdHamilton/hollowmark-tickets#1134, #1224 + vault-mtg-tickets#231, #2420):
#
# AC-1134-A (re-keyed): A prime guarded skip -- single-parent commit with §1A file in
#   COMMIT_FILES but EMPTY MERGE_CONTRIB (impossible in real single-parent flow,
#   but pins the predicate: staleness is driven by MERGE_CONTRIB for merge commits,
#   not raw COMMIT_FILES). MERGE_CONTRIB empty -> verdict_valid=true.
#   This test fails against a naive parents>=2 skip or a flat COMMIT_FILES check.
#
# AC-1134-B: A prime guarded skip -- merge commit (parents==2), COMMIT_FILES has
#   bff/cmd §1A path, MERGE_CONTRIB is EMPTY (the §1A file came from parent[1]/main,
#   not authored by this branch) -> verdict_valid=true (skip is safe).
#
# AC-1134-C: true-stale single-parent commit -- §1A path in COMMIT_FILES and no
#   parent[1] present -> uses raw COMMIT_FILES -> verdict_valid=false. Regression
#   guard: genuine single-parent §1A push after verdict MUST stale.
#
# AC-1134-D (evil-merge guard): merge commit (parents==2), COMMIT_FILES has §1A
#   path AND MERGE_CONTRIB also has §1A path (branch secretly rewrote §1A content
#   via evil merge) -> verdict_valid=false. Pins the security regression guard --
#   CI fails if anyone refactors back to a blanket parents>=2 skip.
#
# AC-1134-E (clean update-branch proven via A prime): merge commit (parents==2),
#   COMMIT_FILES has §1A path (daemon/cmd/* from main), MERGE_CONTRIB is the real
#   compare/eec62762...439d483a result (non-§1A only) -> verdict_valid=true.
#   Explicitly distinct from AC-1134-A to prove A prime compare drives the decision.
#
# AC-1134-F (octopus fail-closed): commit with parents==3 (octopus merge).
#   compare vs parent[0] includes a §1A path (MERGE_CONTRIB non-empty) ->
#   verdict_valid=false. Pins the fail-closed direction: parent[0]-anchored compare
#   is over-inclusive for >2-parent commits (over-stale, never under-stale).
#   A future reader must NOT "optimize" this without a new ADR + Sarah review.
#
# AC-1134-G (compare-API-failure fallback fail-closed): merge commit (parents==2),
#   COMMIT_FILES contains a §1A path. MERGE_CONTRIB is set to COMMIT_FILES to simulate
#   what the `|| echo "${COMMIT_FILES}"` fallback produces when the compare API call
#   fails. The A prime path sees §1A content in MERGE_CONTRIB -> verdict_valid=false.
#   Pins the security property: compare failure -> COMMIT_FILES fallback -> over-stale,
#   never silently skip. This test cannot simulate the shell-level API failure directly
#   (the harness is a logic harness, not an integration harness) but directly exercises
#   the fallback value that the `|| echo "${COMMIT_FILES}"` expression produces.
#
# AC-1224-A (§1A-self-touching PR + update-branch false-stale subclass -- tickets#1224):
#   The remaining subclass after tickets#1134: a PR whose OWN diff IS a §1A file
#   (e.g. daemon-release.yml deleted). With the parent[0] fix, compare(parent[0]...HEAD)
#   returns only what main contributed (non-§1A in this scenario) -> verdict_valid=true.
#   This test FAILS against the old parent[1] compare because compare(parent[1]...HEAD)
#   returns the PR's own daemon-release.yml deletion -> §1A match -> false STALE.
#   Fixture: PR #3137 (daemon-release.yml deletion). After update-branch merge commit:
#     parent[0] = b50cc4c4 (prior PR tip / verdict SHA)
#     parent[1] = df9a7ba4 (main tip)
#   compare(parent[0]...merge) = main's contribution = sentry hook (non-§1A) -> FRESH.
#
# AC-1224-B (real §1A branch push still stales -- gate integrity preserved):
#   Verifies the fix does not weaken the gate: if a branch genuinely pushes a new §1A
#   single-parent commit after the verdict (not just an update-branch), that commit
#   falls through to the raw COMMIT_FILES path (PARENT_COUNT=1) and correctly stales
#   the verdict -> verdict_valid=false.
#   This is identical in structure to AC-1134-C but uses daemon-release.yml as the
#   §1A fixture to match the PR #3137 context, confirming both cases are handled.
#
# AC3b: Fast path -- verdict timestamp is newer than push timestamp; trivially fresh.
# AC5:  Gate required + fresh matching verdict -> conclusion = "success".
# AC6:  Gate required + no verdict found after retry exhaustion -> conclusion = "failure".
# AC7:  Gate required + verdict exists but §1A commit after verdict -> conclusion = "failure".
#
# HOW IT WORKS
# ------------
# The test harness replicates the exact bash decision logic from the gate steps in
# security-review-gate.yml using injected synthetic data rather than live GitHub API
# calls. No real PR is required.
#
# Each test case:
#   1. Sets input env vars (timestamps, parent count, COMMIT_FILES, MERGE_CONTRIB).
#   2. Runs the replicated A prime decision logic.
#   3. Asserts the expected verdict_valid / conclusion output.
#
# TRIGGER
# -------
# - workflow_dispatch: manual execution for ad-hoc gate logic verification.
# - push (scoped to security-review-gate.yml): runs automatically whenever the gate
#   workflow itself changes, ensuring no gate regression ships without test coverage.
#   (OQ-4 resolution -- RdHamilton/hollowmark-tickets#1134.)
#
# Runbook: hollowmark-docs/engineering/runbooks/infra-security-review-gate.md
# Ticket:  RdHamilton/hollowmark-tickets#1134, vault-mtg-tickets#231, #2420

name: S-07 Gate Logic Tests

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/security-review-gate.yml'

jobs:
  test-staleness-logic:
    name: S-07 Gate Staleness Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -----------------------------------------------------------------------
      # Shared logic note: every "run delta check" step below replicates the
      # A prime-guarded staleness logic from security-review-gate.yml "Scan PR
      # comments" step. The key predicate is:
      #
      #   For each commit after verdict:
      #     if PARENT_COUNT >= 2 AND PARENT0_SHA is non-empty:
      #       use MERGE_CONTRIB (compare(parent[0]...HEAD) result scoped to §1A paths)
      #       if MERGE_CONTRIB empty  -> skip (inert merge commit)
      #       if MERGE_CONTRIB non-empty -> S07_DELTA_FOUND=true (stale)
      #     else:
      #       check raw COMMIT_FILES against §1A globs (single-parent authored path)
      #
      # TRIGGER_GLOBS must stay in sync with security-review-gate.yml §1A.
      # -----------------------------------------------------------------------

      # -----------------------------------------------------------------------
      # AC-1134-A: A prime predicate -- MERGE_CONTRIB empty overrides COMMIT_FILES
      #
      # Setup: PARENT_COUNT=2, COMMIT_FILES has daemon/cmd §1A path, MERGE_CONTRIB
      # has only non-§1A files (the §1A file came from parent[1]/main).
      # The A prime compare returns nothing §1A -> treat as inert -> verdict stays fresh.
      #
      # Fails against: flat COMMIT_FILES check (sees §1A -> stale; wrong).
      # Fails against: blanket parents>=2 skip (skips without checking MERGE_CONTRIB
      #   -> would miss evil merges in AC-1134-D; wrong).
      # Only the A prime logic produces verdict_valid=true here.
      # -----------------------------------------------------------------------
      - name: "AC-1134-A setup: merge commit, §1A in COMMIT_FILES, MERGE_CONTRIB non-§1A"
        run: |
          # MERGE_CONTRIB: A prime compare(parent0...sha) result -- non-§1A only
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:01:00Z"
            echo "PARENT_COUNT=2"
            echo "PARENT0_SHA=eec627624009a349f9ee9c95bd93ac1ddee5304f"
            printf 'COMMIT_FILES<<EOF\n'
            printf 'services/daemon/cmd/daemon-replay-check/main.go\n'
            printf 'services/daemon/cmd/daemon-replay-check/main_test.go\n'
            printf 'EOF\n'
            printf 'MERGE_CONTRIB<<EOF\n'
            printf '.github/workflows/e2e-staging-auth-smoke.yml\n'
            printf 'frontend/playwright.staging.config.ts\n'
            printf 'frontend/tests/e2e/staging/staging-smoke.spec.ts\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC-1134-A: run A prime delta check -- expect verdict_valid=true"
        id: ac_1134_a_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          PARENT_COUNT:        ${{ env.PARENT_COUNT }}
          PARENT0_SHA:         ${{ env.PARENT0_SHA }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
          MERGE_CONTRIB:       ${{ env.MERGE_CONTRIB }}
        run: |
          set -euo pipefail

          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/daemon-release.yml"
            ".github/workflows/frontend.yml"
            ".github/workflows/security-review-gate.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          S07_DELTA_FOUND=false

          # A prime guarded path: for merge commits (parents>=2 with non-empty
          # parent[0] SHA), use MERGE_CONTRIB (compare result), not raw COMMIT_FILES.
          if [ "${PARENT_COUNT}" -ge 2 ] && [ -n "${PARENT0_SHA}" ]; then
            echo "Merge commit (parents=${PARENT_COUNT}). Using A prime MERGE_CONTRIB."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  echo "A prime §1A path match in MERGE_CONTRIB: ${FILE}"
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${MERGE_CONTRIB}"
          else
            echo "Single-parent commit. Using raw COMMIT_FILES."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  echo "§1A path match in COMMIT_FILES: ${FILE}"
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${COMMIT_FILES}"
          fi

          if [ "${S07_DELTA_FOUND}" = "true" ]; then
            echo "A prime delta check: STALE"
            echo "verdict_valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "A prime delta check: FRESH (MERGE_CONTRIB has no §1A paths)"
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "AC-1134-A: assert verdict_valid=true"
        env:
          RESULT: ${{ steps.ac_1134_a_check.outputs.verdict_valid }}
        run: |
          echo "AC-1134-A result: verdict_valid=${RESULT}"
          if [ "${RESULT}" != "true" ]; then
            echo "FAIL: AC-1134-A -- expected verdict_valid=true."
            echo "      Merge commit with §1A in COMMIT_FILES but non-§1A A prime MERGE_CONTRIB"
            echo "      MUST NOT stale the verdict. The §1A file came from parent[1]/main,"
            echo "      not from this branch. The A prime compare result (MERGE_CONTRIB) must"
            echo "      drive the staleness decision for merge commits, not raw COMMIT_FILES."
            exit 1
          fi
          echo "PASS: AC-1134-A -- A prime non-§1A MERGE_CONTRIB correctly skips stale verdict."

      # -----------------------------------------------------------------------
      # AC-1134-B: A prime guarded skip -- separate merge commit fixture
      #
      # Distinct from AC-1134-A: COMMIT_FILES has bff/cmd §1A path, MERGE_CONTRIB
      # is empty (no files at all in compare result). Confirms predicate not fixture-specific.
      # -----------------------------------------------------------------------
      - name: "AC-1134-B setup: merge commit, bff/cmd §1A in COMMIT_FILES, MERGE_CONTRIB empty"
        run: |
          # MERGE_CONTRIB: A prime compare returned zero files (empty diff vs parent[1])
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:01:00Z"
            echo "PARENT_COUNT=2"
            echo "PARENT0_SHA=abc000000000000000000000000000000000dead"
            printf 'COMMIT_FILES<<EOF\n'
            printf 'services/bff/cmd/main.go\n'
            printf 'services/bff/cmd/router.go\n'
            printf 'EOF\n'
            printf 'MERGE_CONTRIB<<EOF\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC-1134-B: run A prime delta check -- expect verdict_valid=true"
        id: ac_1134_b_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          PARENT_COUNT:        ${{ env.PARENT_COUNT }}
          PARENT0_SHA:         ${{ env.PARENT0_SHA }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
          MERGE_CONTRIB:       ${{ env.MERGE_CONTRIB }}
        run: |
          set -euo pipefail

          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/daemon-release.yml"
            ".github/workflows/frontend.yml"
            ".github/workflows/security-review-gate.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          S07_DELTA_FOUND=false

          if [ "${PARENT_COUNT}" -ge 2 ] && [ -n "${PARENT0_SHA}" ]; then
            echo "Merge commit (parents=${PARENT_COUNT}). Using A prime MERGE_CONTRIB."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  echo "A prime §1A match: ${FILE}"
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${MERGE_CONTRIB}"
          else
            echo "Single-parent commit. Using COMMIT_FILES."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${COMMIT_FILES}"
          fi

          if [ "${S07_DELTA_FOUND}" = "true" ]; then
            echo "verdict_valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "AC-1134-B: assert verdict_valid=true"
        env:
          RESULT: ${{ steps.ac_1134_b_check.outputs.verdict_valid }}
        run: |
          echo "AC-1134-B result: verdict_valid=${RESULT}"
          if [ "${RESULT}" != "true" ]; then
            echo "FAIL: AC-1134-B -- expected verdict_valid=true."
            echo "      Merge commit with §1A in COMMIT_FILES but empty A prime MERGE_CONTRIB"
            echo "      MUST NOT stale the verdict (bff/cmd fixture)."
            exit 1
          fi
          echo "PASS: AC-1134-B -- A prime empty MERGE_CONTRIB skips stale (bff/cmd fixture)."

      # -----------------------------------------------------------------------
      # AC-1134-C: true-stale single-parent commit
      #
      # Single-parent (PARENT_COUNT=1, PARENT0_SHA empty): falls to raw COMMIT_FILES
      # path -> §1A match -> S07_DELTA_FOUND=true -> verdict_valid=false.
      # Regression guard: genuine single-parent §1A pushes after verdict MUST stale.
      # -----------------------------------------------------------------------
      - name: "AC-1134-C setup: single-parent commit with §1A path in COMMIT_FILES"
        run: |
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:02:00Z"
            echo "PARENT_COUNT=1"
            echo "PARENT0_SHA="
            printf 'COMMIT_FILES<<EOF\n'
            printf 'services/bff/cmd/main.go\n'
            printf 'EOF\n'
            printf 'MERGE_CONTRIB<<EOF\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC-1134-C: run A prime delta check -- expect verdict_valid=false (genuine stale)"
        id: ac_1134_c_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          PARENT_COUNT:        ${{ env.PARENT_COUNT }}
          PARENT0_SHA:         ${{ env.PARENT0_SHA }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
          MERGE_CONTRIB:       ${{ env.MERGE_CONTRIB }}
        run: |
          set -euo pipefail

          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/daemon-release.yml"
            ".github/workflows/frontend.yml"
            ".github/workflows/security-review-gate.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          S07_DELTA_FOUND=false

          if [ "${PARENT_COUNT}" -ge 2 ] && [ -n "${PARENT0_SHA}" ]; then
            echo "Merge commit. Using A prime MERGE_CONTRIB."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${MERGE_CONTRIB}"
          else
            echo "Single-parent commit. Using raw COMMIT_FILES."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  echo "§1A path match in COMMIT_FILES: ${FILE}"
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${COMMIT_FILES}"
          fi

          if [ "${S07_DELTA_FOUND}" = "true" ]; then
            echo "verdict_valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "AC-1134-C: assert verdict_valid=false (genuine §1A push must stale)"
        env:
          RESULT: ${{ steps.ac_1134_c_check.outputs.verdict_valid }}
        run: |
          echo "AC-1134-C result: verdict_valid=${RESULT}"
          if [ "${RESULT}" != "false" ]; then
            echo "FAIL: AC-1134-C -- expected verdict_valid=false."
            echo "      A genuine single-parent §1A push after approval MUST invalidate"
            echo "      the verdict. The A prime logic must not apply to single-parent commits."
            exit 1
          fi
          echo "PASS: AC-1134-C -- single-parent §1A push correctly stales verdict."

      # -----------------------------------------------------------------------
      # AC-1134-D: evil-merge guard -- merge commit where MERGE_CONTRIB has §1A
      #
      # Setup: PARENT_COUNT=2, COMMIT_FILES has §1A paths, AND MERGE_CONTRIB also
      # has a §1A path (the branch secretly rewrote security-review-gate.yml via
      # evil merge). The A prime compare must catch this.
      #
      # This is the critical SECURITY regression guard. A blanket parents>=2 skip
      # would produce verdict_valid=true here -- a security regression. If this test
      # fails in CI, the gate has been weakened.
      # -----------------------------------------------------------------------
      - name: "AC-1134-D setup: evil merge -- MERGE_CONTRIB has §1A path"
        run: |
          # MERGE_CONTRIB: A prime compare(parent1...merge) returned a §1A file --
          # the merge silently modified the gate workflow (evil merge pattern).
          {
            echo "VERDICT_TIMESTAMP=2026-05-29T10:00:00Z"
            echo "LAST_PUSH_TIMESTAMP=2026-05-29T10:01:00Z"
            echo "PARENT_COUNT=2"
            echo "PARENT0_SHA=abc111000000000000000000000000000000dead"
            printf 'COMMIT_FILES<<EOF\n'
            printf 'services/daemon/cmd/daemon-replay-check/main.go\n'
            printf 'services/daemon/cmd/daemon-replay-check/main_test.go\n'
            printf '.github/workflows/security-review-gate.yml\n'
            printf 'EOF\n'
            printf 'MERGE_CONTRIB<<EOF\n'
            printf '.github/workflows/security-review-gate.yml\n'
            printf 'EOF\n'
          } >> "$GITHUB_ENV"

      - name: "AC-1134-D: run A prime delta check -- expect verdict_valid=false (evil merge caught)"
        id: ac_1134_d_check
        env:
          VERDICT_TIMESTAMP:   ${{ env.VERDICT_TIMESTAMP }}
          LAST_PUSH_TIMESTAMP: ${{ env.LAST_PUSH_TIMESTAMP }}
          PARENT_COUNT:        ${{ env.PARENT_COUNT }}
          PARENT0_SHA:         ${{ env.PARENT0_SHA }}
          COMMIT_FILES:        ${{ env.COMMIT_FILES }}
          MERGE_CONTRIB:       ${{ env.MERGE_CONTRIB }}
        run: |
          set -euo pipefail

          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/daemon-release.yml"
            ".github/workflows/frontend.yml"
            ".github/workflows/security-review-gate.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${VERDICT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")

          if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
            echo "verdict_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          S07_DELTA_FOUND=false

          if [ "${PARENT_COUNT}" -ge 2 ] && [ -n "${PARENT0_SHA}" ]; then
            echo "Merge commit (parents=${PARENT_COUNT}). Using A prime MERGE_CONTRIB."
            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              for GLOB in "${TRIGGER_GLOBS[@]}"; do
                if echo "${FILE}" | grep -qF "${GLOB}"; then
                  echo "A prime §1A path match in MERGE_CONTRIB: ${FILE} (evil merge detected)"
                  S07_DELTA_FOUND=true
                  break 2
                fi
              done
            done <<< "${MERGE_CONTRIB}"
          else
