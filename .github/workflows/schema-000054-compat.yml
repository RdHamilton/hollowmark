name: Schema-000054-Compat

# ---------------------------------------------------------------------------
# vault-mtg-tickets#193 — Schema-compatibility CI job
#
# WHY THIS JOB EXISTS
# -------------------
# Production databases are initialized from migration 000054 (the consolidated
# schema) and then apply 000055 onward. They never had migrations 000001–000053
# applied. The standard integration test suite (integration.yml) runs against a
# DB that received every migration in sequence from 000001, which means tables
# that were created and then dropped in the incremental path (e.g. `cards`,
# created in 000001 and dropped in 000025) may silently satisfy queries that
# would fail in production. This discrepancy caused GAP-S1 through GAP-S4:
# stale LEFT JOIN / FROM cards queries passed CI while failing in prod.
#
# This job initialises a fresh DB from migration 000054 ONLY (via
# `migrate force 53` on an empty database, then `migrate up`), then runs the
# repository-level integration tests. Any query that references a table not
# present in the 000054-only schema will fail here before it reaches main.
#
# SCOPE
# -----
# - REQUIRED status check — registered in branch protection (hollowmark-tickets#359).
#   Job context: "Schema-000054-compat — repository tests on consolidated schema".
# - ALWAYS-EMIT (two-job) pattern, same as bff-layer5.yml (#1216): a required
#   context must produce a check run on EVERY PR head commit — a workflow-level
#   `paths:` filter produces NO run on non-matching PRs, and GitHub blocks merge
#   when a required check has zero runs ("Expected — waiting for status").
#   A job skipped via `if:` DOES emit a run with conclusion 'skipped', which
#   branch protection treats as satisfied. Reference:
#   https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
#   So: the cheap detect-changes job runs on every PR; the heavy test job (which
#   needs a postgres service container — containers start before any steps, so
#   an in-job early-exit cannot avoid the spin-up cost) only runs when
#   services/bff/internal/storage/{repository,migrations}/ or this workflow
#   file changed, and is skipped (= satisfied) otherwise.
# - Runs repository-level tests only (not the full integration suite) to keep
#   the job fast.
# - Does NOT replace the existing incremental-path integration test job in
#   integration.yml.
# ---------------------------------------------------------------------------

on:
  pull_request:
    branches: [ main ]
    # No path filter — the workflow must run on every PR so the required status
    # check context is always emitted. Path filtering is done inside
    # detect-changes below (two-job always-emit pattern, see SCOPE).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect schema-relevant file changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is REQUIRED: the base SHA from the PR event payload
          # must be reachable for 'git diff "$BASE" "$HEAD"' to work. The default
          # depth=1 clone has no parent commits, causing the diff to fail with
          # exit 128 ("fatal: ambiguous argument"). Same pattern as bff-layer5.yml.
          fetch-depth: 0

      - name: Detect repository / migrations / workflow changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Fail-closed: if git diff itself errors (e.g. a fetch issue or
          # unexpected git state), default to relevant=true so the suite runs
          # rather than being silently skipped. Do NOT suppress stderr — a
          # failing diff should be visible in the job log.
          if ! CHANGED=$(git diff --name-only "$BASE" "$HEAD"); then
            echo "::warning::git diff failed — defaulting to relevant=true (fail-closed)"
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(services/bff/internal/storage/(repository|migrations)/|\.github/workflows/schema-000054-compat\.yml)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Schema-relevant files changed — will run consolidated-schema repository tests."
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No schema-relevant files changed — test job will be skipped (emits 'skipped', satisfies the required check)."
          fi

  schema-000054-compat:
    name: Schema-000054-compat — repository tests on consolidated schema
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_compat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Download dependencies
        working-directory: services/bff
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: go mod download

      - name: Cache migrate CLI binary
        id: cache-migrate
        uses: actions/cache@v5
        with:
          path: ~/go/bin/migrate
          key: migrate-cli-${{ runner.os }}-v4.18.3

      - name: Install golang-migrate CLI
        if: steps.cache-migrate.outputs.cache-hit != 'true'
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.3

      # ---------------------------------------------------------------------------
      # Initialise the DB from migration 000054 only (the consolidated schema).
      # `migrate force 53` marks the empty database as being at version 53 without
      # running any SQL, so the subsequent `migrate up` starts from 000054.
      # This reproduces the production initialisation path: a DB that was never
      # created via the 000001–000053 incremental history.
      # ---------------------------------------------------------------------------
      - name: Initialise DB from migration 000054 (consolidated schema)
        env:
          DB_URL: "postgres://mtga:mtga@localhost:5432/mtga_compat_test?sslmode=disable"
          MIGRATIONS_PATH: services/bff/internal/storage/migrations/postgres
        run: |
          # Force the migration tracker to version 53 on the empty DB (no SQL executed).
          # The `up` command then applies only 000054 onward — matching production init.
          migrate -path "$MIGRATIONS_PATH" -database "$DB_URL" force 53
          migrate -path "$MIGRATIONS_PATH" -database "$DB_URL" up

      - name: Run repository integration tests against 000054-only schema
        working-directory: services/bff
        env:
          DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_compat_test?sslmode=disable
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: |
          echo "[schema-000054-compat] Running repository tests against consolidated-schema DB."
          echo "Any failure here means a query references a table absent from the 000054-only schema."
          go test -v ./internal/storage/repository/...
