name: E2E Smoke Tests

on:
  workflow_dispatch:
  # Required status check: run the full @smoke suite on every PR targeting main
  # so that download-path regressions, BFF routing changes, and install-flow
  # breaks cannot merge without a gate (root cause of the #2731 regression).
  #
  # No path filter -- the job must always run on PRs so the required status
  # check is always emitted.  A path-filtered required check never emits on
  # filtered PRs and permanently blocks those PRs via branch protection.
  # This matches the pattern used by chromatic.yml, bff-layer5.yml, and
  # schema-000054-compat.yml: "no path filter — the required check must
  # always be emitted."
  pull_request:
    branches: [ main ]
  # Safety-net: run smoke suite on every push to main so regressions surface
  # within minutes of merge rather than at the next release gate.
  # Root cause of run/26614819125: beta_invite_only and auth-status-panel
  # regressions merged undetected because the PR-level E2E job only runs
  # the `pipeline` Playwright project (pipeline.spec.ts), not the `smoke`
  # project (@smoke-tagged tests).  Adding push-to-main here closes that gap
  # without requiring a path-filter change or a full E2E rerun on every PR.
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  # Nightly belt-and-suspenders: catches regressions introduced by indirect
  # changes (feature-flag configs, shared hooks, analytics wiring) that may
  # not have touched frontend/** at all.
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  # Called by release.yml as the Tier 3 release gate
  workflow_call:
    inputs:
      # When called from ci.yml (build-bff-for-e2e job), the caller passes the
      # artifact name so we can skip the ~3-4 min source build.  If omitted
      # (manual trigger, release.yml, etc.) we fall back to building from source.
      bff_artifact_name:
        description: 'Name of a pre-built BFF binary artifact (upload-artifact name)'
        required: false
        type: string
        default: ''

# Concurrency group: cancel redundant runs on the same ref so push-to-main
# pileups (multiple merges in quick succession) do not stack up doomed
# ~20-min cold-runner runs that burn CI quota. (#815 iteration 4)
concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    # -------------------------------------------------------------------------
    # Use the official Playwright Docker container instead of installing browsers
    # at runtime from cdn.playwright.dev.
    #
    # Root cause of #815 (iterations 1-4):
    #   The throttled GitHub Actions CDN download of Chromium (165-200 MB from
    #   cdn.playwright.dev/dbazure) takes ~29 min on a severely rate-limited
    #   runner.  Every prior fix (timeout bump, warm-cache job) still depended
    #   on that download completing — the warm-cache job itself timed out at the
    #   20-min budget, "Post Cache" was skipped, the smoke job got a cache MISS
    #   and started its own 29-min death spiral.  Bumping timeouts is a band-aid.
    #
    # Fix: run the job inside mcr.microsoft.com/playwright:v1.56.1-jammy.
    #   - Chromium + all system deps are PRE-INSTALLED in the image.
    #   - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright is set; `npx playwright test`
    #     finds browsers without any install step.
    #   - No `playwright install`, no `playwright install-deps`, no cache action.
    #   - The warm-playwright-cache job is eliminated entirely.
    #
    # Container pinning: the image tag MUST match the repo's @playwright/test
    # version (1.56.1).  When upgrading @playwright/test, update this tag too.
    #
    # Networking: GitHub Actions creates a Docker bridge network for container
    # jobs.  The `postgres` service below is reachable from inside the container
    # at hostname "postgres" (the service label), NOT at "localhost".
    # DATABASE_URL is set accordingly. (#815)
    # -------------------------------------------------------------------------
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    # Budget: npm ci (~60s) + optional Go build (~3-4m) + Postgres startup (~60s)
    # + test suite (~2-5m) = up to ~10m.  30 min is a generous ceiling; no
    # browser download can occur, so this budget should never be approached.
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    # -----------------------------------------------------------------------
    # BFF binary — fast path: download pre-built artifact from ci.yml
    # -----------------------------------------------------------------------
    - name: Download pre-built BFF artifact
      if: inputs.bff_artifact_name != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.bff_artifact_name }}
        path: bin

    - name: Make pre-built BFF binary executable
      if: inputs.bff_artifact_name != ''
      run: chmod +x bin/mtga-bff

    # -----------------------------------------------------------------------
    # BFF binary — slow path: build from source (standalone / release trigger)
    # setup-go installs Go into the container; the Playwright image is ubuntu
    # (jammy) based and is fully compatible with the setup-go action.
    # -----------------------------------------------------------------------
    - name: Set up Go (source build only)
      if: inputs.bff_artifact_name == ''
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Build BFF binary (source build only)
      if: inputs.bff_artifact_name == ''
      uses: ./.github/actions/build-bff
      with:
        output-path: bin/mtga-bff

    # -----------------------------------------------------------------------
    # Frontend dependencies (Node.js + npm pre-installed in the Playwright
    # container; no setup-node needed).
    # -----------------------------------------------------------------------
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    # No `playwright install` or `playwright install-deps` steps.
    # Browsers are pre-installed in the container at /ms-playwright.

    - name: Run E2E smoke tests
      run: |
        cd frontend
        npm run test:e2e:smoke
      env:
        CI: true
        # RULE-INFRA-03: Every CI job that starts the BFF MUST explicitly set MTGA_ENV.
        # Relying on config.Load() defaults is forbidden — the default is "production"
        # which is always wrong in CI. See services/bff/CI_ENV_CONTRACT.md. (#1668)
        MTGA_ENV: development
        # In a container job, the postgres service is reachable at hostname "postgres"
        # (the service label) — NOT at "localhost". GitHub Actions bridges the
        # container and services on the same Docker network. (#815)
        DATABASE_URL: postgres://mtga:mtga@postgres:5432/mtga_e2e?sslmode=disable
        CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-smoke-results
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7

  # ---------------------------------------------------------------------------
  # Layer 5 Mode B — SPA Render Reconciliation (Strict)
  #
  # ADR-052 §83/§97: drives the SPA against the REAL seeded BFF with NO
  # page.route() intercepts on /api/* paths. Guards against the false-PASS
  # class where mocked adapters satisfy assertions the real BFF would fail.
  #
  # Promotion path: this job soaks at continue-on-error: true until two
  # consecutive clean runs confirm no infrastructure flakiness. Promotion
  # to hard-fail gate (required status check) is tracked in #1316.
  # NOT tagged @smoke — @smoke pulls tests into the required gate, bypassing
  # the soak period. Do NOT add @smoke until #1316 is resolved.
  #
  # RULE-INFRA-01: continue-on-error at job level. Folding Mode B specs into
  # the required e2e-smoke job would hard-fail on day 1 and block all PRs
  # until every surface is confirmed stable in CI.
  #
  # Path filter: only runs when frontend source, e2e tests, BFF source, or
  # the Layer 5 manifest changes. This avoids burning CI quota on unrelated
  # PRs during the soak period.
  # ---------------------------------------------------------------------------
  layer5-mode-b:
    name: Layer 5 Mode B (strict BFF — soak, non-blocking)
    continue-on-error: true

    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    # Generous ceiling: the strict Mode B suite hits the real BFF for every
    # assertion — network round-trips are longer than mocked responses.
    timeout-minutes: 45

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 2

    # -----------------------------------------------------------------------
    # Path filter — only run the heavy BFF build + tests when relevant paths
    # changed (ADR-052 path-filter requirement). A non-required job that always
    # runs wastes CI quota on docs-only and Dependabot PRs.
    #
    # git diff HEAD^1 is reliable on pull_request and push events (fetch-depth: 2).
    # On schedule / workflow_dispatch: no GITHUB_BASE_REF — skip the filter.
    # -----------------------------------------------------------------------
    - name: Check changed paths (path filter gate)
      id: paths
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          changed=$(git diff --name-only HEAD^1 HEAD 2>/dev/null | grep -cE \
            '^frontend/src/|^frontend/tests/e2e/|^services/bff/|^services/daemon/testdata/corpus/layer5-expected/|^frontend/tests/e2e/fixtures/test-data\.sql' || true)
          if [ "$changed" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
        fi

    # -----------------------------------------------------------------------
    # BFF binary — fast path: download pre-built artifact from ci.yml
    # -----------------------------------------------------------------------
    - name: Download pre-built BFF artifact
      if: steps.paths.outputs.changed == 'true' && inputs.bff_artifact_name != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.bff_artifact_name }}
        path: bin

    - name: Make pre-built BFF binary executable
      if: steps.paths.outputs.changed == 'true' && inputs.bff_artifact_name != ''
      run: chmod +x bin/mtga-bff

    # -----------------------------------------------------------------------
    # BFF binary — slow path: build from source
    # -----------------------------------------------------------------------
    - name: Set up Go (source build only)
      if: steps.paths.outputs.changed == 'true' && inputs.bff_artifact_name == ''
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Build BFF binary (source build only)
      if: steps.paths.outputs.changed == 'true' && inputs.bff_artifact_name == ''
      uses: ./.github/actions/build-bff
      with:
        output-path: bin/mtga-bff

    - name: Install frontend dependencies
      if: steps.paths.outputs.changed == 'true'
      run: |
        cd frontend
        npm ci

    - name: Run Layer 5 Mode B spec
      if: steps.paths.outputs.changed == 'true'
      run: |
        cd frontend
        npx playwright test tests/e2e/layer5/layer5-mode-b.spec.ts --project=full
      env:
        CI: true
        MTGA_ENV: development
        DATABASE_URL: postgres://mtga:mtga@postgres:5432/mtga_e2e?sslmode=disable
        CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}

    - name: Upload Mode B test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: layer5-mode-b-results
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 14
