name: E2E Smoke Tests

on:
  workflow_dispatch:
  # Safety-net: run smoke suite on every push to main so regressions surface
  # within minutes of merge rather than at the next release gate.
  # Root cause of run/26614819125: beta_invite_only and auth-status-panel
  # regressions merged undetected because the PR-level E2E job only runs
  # the `pipeline` Playwright project (pipeline.spec.ts), not the `smoke`
  # project (@smoke-tagged tests).  Adding push-to-main here closes that gap
  # without requiring a path-filter change or a full E2E rerun on every PR.
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  # Nightly belt-and-suspenders: catches regressions introduced by indirect
  # changes (feature-flag configs, shared hooks, analytics wiring) that may
  # not have touched frontend/** at all.
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  # Called by release.yml as the Tier 3 release gate
  workflow_call:
    inputs:
      # When called from ci.yml (build-bff-for-e2e job), the caller passes the
      # artifact name so we can skip the ~3-4 min source build.  If omitted
      # (manual trigger, release.yml, etc.) we fall back to building from source.
      bff_artifact_name:
        description: 'Name of a pre-built BFF binary artifact (upload-artifact name)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Cache-warming job: installs the Playwright chromium browser and populates
  # the Actions cache BEFORE the smoke job starts.
  #
  # Root cause of run/26974923220: cold-cache download of chromium-linux.zip
  # (~165-200 MB from cdn.playwright.dev/dbazure) took ~29 min on a throttled
  # runner, exhausting the 30-min budget before any test ran.  The cache key
  # is tied to package-lock.json — any lockfile change evicts the cache and
  # triggers a full cold download.
  #
  # Fix: this job runs first, unconditionally.  On a cache miss it pays the
  # download cost once and commits the populated cache.  On a cache hit it
  # exits in seconds.  The smoke job below always declares `needs: [warm-playwright-cache]`
  # so it starts after the cache is guaranteed populated — the smoke job's own
  # install steps become no-ops (cache-hit path = install-deps only). (#815)
  # -------------------------------------------------------------------------
  warm-playwright-cache:
    name: Warm Playwright browser cache
    runs-on: ubuntu-latest
    # Budget: Node setup (~15s) + npm ci (~60s) + cold chromium download+install
    # (~5-8 min healthy CDN, up to ~15 min degraded) + zip extraction (~60s).
    # 20 min is sufficient for the warm job; the smoke job's own 30 min budget
    # covers the test run after the cache is warm.
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright browsers (cache miss — full install)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: cd frontend && npx playwright install chromium --with-deps
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Install Playwright system dependencies (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: cd frontend && npx playwright install-deps chromium
      env:
        DEBIAN_FRONTEND: noninteractive

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    # Depends on the cache-warming job so this job always gets a cache HIT
    # and the ~165-200 MB chromium download never happens here. (#815)
    needs: [warm-playwright-cache]
    # Budget: Node setup + npm ci (~90s) + warm-cache install-deps (~30s) +
    # optional BFF source build (~3-4m) + Postgres startup (~60s) + suite (~2-5m)
    # = up to ~12m warm-cache worst case. 20 min is sufficient now that the
    # cold-download cost is paid by the warm job instead. (#815)
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    # -----------------------------------------------------------------------
    # BFF binary — fast path: download pre-built artifact from ci.yml
    # -----------------------------------------------------------------------
    - name: Download pre-built BFF artifact
      if: inputs.bff_artifact_name != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.bff_artifact_name }}
        path: bin

    - name: Make pre-built BFF binary executable
      if: inputs.bff_artifact_name != ''
      run: chmod +x bin/mtga-bff

    # -----------------------------------------------------------------------
    # BFF binary — slow path: build from source (standalone / release trigger)
    # -----------------------------------------------------------------------
    - name: Set up Go (source build only)
      if: inputs.bff_artifact_name == ''
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Build BFF binary (source build only)
      if: inputs.bff_artifact_name == ''
      uses: ./.github/actions/build-bff
      with:
        output-path: bin/mtga-bff

    # -----------------------------------------------------------------------
    # Frontend / Playwright setup (always required)
    # -----------------------------------------------------------------------
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    # warm-playwright-cache job runs first and populates the cache, so this
    # job should always hit. The conditional install steps are a safety fallback
    # for the rare case where the warm job's cache upload fails.
    - name: Install Playwright browsers (cache miss fallback — should not occur)
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        cd frontend
        npx playwright install chromium --with-deps
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Install Playwright system dependencies (cache hit — normal path)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: |
        cd frontend
        npx playwright install-deps chromium
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Run E2E smoke tests
      run: |
        cd frontend
        npm run test:e2e:smoke
      env:
        CI: true
        # RULE-INFRA-03: Every CI job that starts the BFF MUST explicitly set MTGA_ENV.
        # Relying on config.Load() defaults is forbidden — the default is "production"
        # which is always wrong in CI. See services/bff/CI_ENV_CONTRACT.md. (#1668)
        MTGA_ENV: development
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_e2e?sslmode=disable
        CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-smoke-results
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7
