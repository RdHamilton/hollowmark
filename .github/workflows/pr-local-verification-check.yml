name: PR Local Verification Check

# ---------------------------------------------------------------------------
# Mechanical gate for the `## Local Verification` section of every PR body.
#
# WHY THIS EXISTS
# ---------------
# A PR's Local Verification section is supposed to be a real pasted terminal
# transcript proving the change executes correctly. In practice, agents (and
# humans in a hurry) sometimes paste *predicted* or *structural* output --
# "this would print PASS" / "expected to succeed" -- which a reviewer cannot
# tell apart from a real transcript at a glance. Window B (2026-05-25) shipped
# a regression because a structural-only "verification" was accepted.
#
# This gate parses the PR body and applies cheap, deterministic heuristics
# that catch the most common fabrications without needing the reviewer to
# read every PR carefully.
#
# WHAT IT CHECKS
# --------------
# 1. The PR body contains a `## Local Verification` section header.
# 2. The section contains >= 1 fenced code block (``` ... ```).
# 3. >= 1 fenced code block contains a shell-prompt indicator line OR
#    the code block contains >= 2 non-blank lines (relaxed fallback for
#    genuine transcripts that omit the prompt prefix -- see #828).
#    Accepted prompt prefixes: `$ ` | `> ` | `# ` | `[user@host]$ ` | `PS> ` | `>> `
#    A code block with a single PASS-only line still fails (no real content).
# 4. The section contains >= 1 explicit success marker:
#       PASS | OK | SUCCESS  (case-insensitive)
# 5. If the PR diff touches any `*.sh` file (or anything under
#    `scripts/deploy/`), the section MUST contain the literal `--dry-run`
#    or `dry-run` -- shell-script PRs must show the dry-run exercised the
#    actual code path, not just `bash -n`.
#
#    EXCEPTION -- declaration-only shell changes: if the author cannot
#    produce a meaningful dry-run (e.g. the change only adds a function,
#    constant, or `source` call with no new executable entrypoint), a
#    syntax/lint check is accepted in lieu of `--dry-run`. The LV section
#    must contain `sh -n` or `shellcheck` against the changed file. If
#    neither `--dry-run` NOR a syntax/lint check is present, the gate
#    fails. The rule: executable entrypoint changes require `--dry-run`;
#    declaration-only changes accept `sh -n` / `shellcheck`.
#
# DEPENDABOT EXEMPTION (#826)
# ---------------------------
# When github.actor == 'dependabot[bot]', the LV-section heuristic is
# skipped entirely. Dependabot PRs are automated dependency bumps, not
# human-authored code changes. Requiring a ## Local Verification transcript
# for them adds no security value. The job still runs and reports SUCCESS
# so the required status check is satisfied without a manual body patch.
#
# WHAT IT DOES NOT CHECK
# ----------------------
# - It cannot tell a real transcript from a fabricated transcript that
#   *happens to look real*. That's still the human reviewer's job (see
#   the `local-verification-check` skill).
# - It does not check Go / frontend / CFN test commands by content.
#   Those gates live in `ci.yml`, `process-gates.yml`, and the per-stack
#   workflows; this gate only enforces the shape of the section.
#
# REQUIRED BRANCH PROTECTION
# --------------------------
# After this workflow first runs successfully, add the job
# `Local Verification heuristic check` to the list of REQUIRED status
# checks on the `main` branch (Settings -> Branches -> Branch protection
# rules -> main -> Require status checks to pass). The orchestrator should
# do this manually in the GitHub UI; this workflow file alone cannot
# configure branch protection.
#
# TEST CASES (run mentally against the bash logic below)
# ------------------------------------------------------
# PASS cases:
#   A) Body contains:
#        ## Local Verification
#        ```
#        $ go test ./...
#        ok  github.com/RdHamilton/vault-mtg/services/bff  0.834s
#        PASS
#        ```
#      -> 1 fence, prompt `$ `, marker `PASS` -> PASS
#
#   B) Body contains:
#        ## Local Verification
#        ```
#        $ shellcheck scripts/deploy/foo.sh
#        $ scripts/deploy/foo.sh --dry-run
#        [bootstrap] Assertion 1: PASS
#        ```
#      Diff touches `scripts/deploy/foo.sh` -> fence + prompt + PASS + dry-run -> PASS
#
#   C) Body contains:
#        ## Local Verification
#        ```
#        [user@host]$ npm run build
#        > frontend@0.0.0 build
#        > tsc -b && vite build
#        built in 4.32s
#        SUCCESS
#        ```
#      -> 1 fence, prompt `[user@host]$`, marker `SUCCESS` -> PASS
#
#   L) Body contains (relaxed fallback -- no prompt prefix, #828):
#        ## Local Verification
#        ```
#        npx tsc --noEmit  # passes
#        0 errors
#        SUCCESS
#        ```
#      -> 1 fence, no prompt, but >=2 non-blank lines + marker `SUCCESS` -> PASS
#
#   M) Dependabot PR -- actor == 'dependabot[bot]':
#      -> LV check skipped entirely -> PASS (exemption, #826)
#
# FAIL cases:
#   D) No `## Local Verification` header at all -> FAIL (missing section).
#
#   E) Section present but empty (no code fence) -> FAIL (no transcript).
#
#   F) Section contains only prose:
#        "I ran `go test` and it passed. Verified the bug is fixed."
#      -> FAIL (no fenced code block).
#
#   G) Code block contains only the PASS marker, nothing else:
#        ```
#        PASS
#        ```
#      -> FAIL (1 non-blank line; relaxed fallback requires >=2 non-blank
#              lines so there is real command/output content beyond the marker).
#
#   H) Code block has content lines but no PASS/OK/SUCCESS marker:
#        ```
#        go vet ./...
#        go build ./...
#        ```
#      -> FAIL (no success marker -- could be predicted output).
#
#   I) Shell-script PR (touches `scripts/deploy/ec2-bootstrap.sh`) with an
#      executable entrypoint change, but transcript shows only `bash -n`:
#        ```
#        $ bash -n scripts/deploy/ec2-bootstrap.sh
#        PASS
#        ```
#      -> FAIL (executable entrypoint changed; `--dry-run` required).
#
#   J) Declaration-only shell PR with no syntax/lint check OR --dry-run:
#        ```
#        $ echo "change looks fine"
#        PASS
#        ```
#      -> FAIL (neither --dry-run nor sh -n/shellcheck present).
#
# NEW PASS case -- declaration-only shell change:
#   K) PR adds a helper function to `scripts/lib/utils.sh` (not executable).
#      LV shows syntax check only (no --dry-run):
#        ```
#        $ sh -n scripts/lib/utils.sh
#        $ shellcheck scripts/lib/utils.sh
#        PASS
#        ```
#      -> PASS (declaration-only escape hatch: sh -n / shellcheck accepted
#              in lieu of --dry-run when no executable entrypoint is changed).
# ---------------------------------------------------------------------------

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  local-verification-check:
    name: Local Verification heuristic check
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Dependabot exemption (#826)
      # Dependabot PRs are automated dependency bumps, not human-authored code
      # changes. Requiring a ## Local Verification transcript for them adds no
      # security value and forces a manual body patch each cycle. Skip the LV
      # heuristic entirely for the dependabot[bot] actor. The job still runs
      # and reports SUCCESS so the required status check is satisfied.
      # -----------------------------------------------------------------------
      - name: Skip LV check for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: |
          echo "Actor: ${{ github.actor }}"
          echo "Dependabot PR -- Local Verification section not required."
          echo "permissionDecision: ALLOW"
          echo "Local Verification heuristic check: PASS (Dependabot exemption)"

      - name: Fetch PR body
        if: github.actor != 'dependabot[bot]'
        id: prbody
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr view "$PR_NUMBER" --json body --jq .body > /tmp/pr_body.txt
          echo "PR body bytes: $(wc -c < /tmp/pr_body.txt)"

      - name: Detect shell-file changes
        if: github.actor != 'dependabot[bot]'
        id: shellfiles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # List files changed in the PR. If any `*.sh` file or anything under
          # `scripts/deploy/` is touched, the PR is "shell-flavored" and must
          # show a --dry-run transcript.
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > /tmp/pr_files.txt
          SHELL_TOUCHED=no
          if grep -E '(\.sh$|^scripts/deploy/)' /tmp/pr_files.txt >/dev/null 2>&1; then
            SHELL_TOUCHED=yes
          fi
          echo "shell_touched=$SHELL_TOUCHED" >> "$GITHUB_OUTPUT"
          echo "Shell-flavored PR: $SHELL_TOUCHED"

      - name: Parse Local Verification section
        if: github.actor != 'dependabot[bot]'
        env:
          SHELL_TOUCHED: ${{ steps.shellfiles.outputs.shell_touched }}
        run: |
          set -u
          BODY_FILE=/tmp/pr_body.txt

          fail() {
            local msg="$1"
            local hint="${2:-}"
            echo ""
            echo "permissionDecision: BLOCKED"
            echo "ERROR: Local Verification gate -- ${msg}"
            if [ -n "${hint}" ]; then
              echo ""
              echo "HINT: ${hint}"
            fi
            echo ""
            echo "Required structure (see PR template):"
            echo ""
            echo "  ## Local Verification"
            echo "  \`\`\`"
            echo "  \$ <command you actually ran>"
            echo "  <actual terminal output>"
            echo "  ... PASS"
            echo "  \`\`\`"
            echo ""
            echo "Rules:"
            echo "  - >=1 fenced code block in the section"
            echo "  - >=1 non-blank content lines inside the block (beyond the PASS marker)"
            echo "  - >=1 PASS / OK / SUCCESS marker in the section"
            if [ "${SHELL_TOUCHED}" = "yes" ]; then
              echo "  - Shell-script PR: transcript must contain --dry-run"
            fi
            exit 1
          }

          # ---- 1. Section header present ----
          if ! grep -qE '^## Local Verification' "$BODY_FILE"; then
            fail "PR body is missing the '## Local Verification' section header."
          fi

          # ---- Extract section (between '## Local Verification' and next '## ') ----
          # awk: print lines from the Local Verification header up to (but not
          # including) the next top-level `## ` header. End-of-file also ends
          # the section.
          awk '
            /^## Local Verification/ { inside=1; next }
            inside && /^## / { inside=0 }
            inside { print }
          ' "$BODY_FILE" > /tmp/lv_section.txt

          if [ ! -s /tmp/lv_section.txt ]; then
            fail "Local Verification section is empty."
          fi

          echo "---- Local Verification section ----"
          cat /tmp/lv_section.txt
          echo "------------------------------------"

          # ---- 2. >=1 fenced code block ----
          # Count fence-opener lines (triple-backtick at line start). A valid
          # section needs at least one opener AND one closer => fence count >=2.
          FENCE_COUNT=$(grep -cE '^[[:space:]]*```' /tmp/lv_section.txt || true)
          if [ "${FENCE_COUNT:-0}" -lt 2 ]; then
            echo ""
            echo "Parser expected: lines matching regex  ^[[:space:]]*\`\`\`  (raw triple-backtick at line start)"
            echo "Expected form (opening and closing fence on their own lines):"
            echo "  \`\`\`"
            echo "  \$ your-command"
            echo "  actual output"
            echo "  PASS"
            echo "  \`\`\`"
            echo ""
            # AC3: Hex-dump any line that looks like an escaped fence so the author
            # can see the invisible bytes (e.g. backslash-escaped ``` from LLM output).
            # Search for lines containing a backslash immediately before a backtick.
            ESCAPED_FENCE=$(grep -E "\\\\[\`]" /tmp/lv_section.txt | head -3 || true)
            if [ -n "${ESCAPED_FENCE}" ]; then
              echo "Possible escaped-fence lines detected (showing hex via cat -A):"
              printf '%s\n' "${ESCAPED_FENCE}" | head -3 | cat -A
              echo ""
              echo "Those backslash-escaped backticks are NOT recognized as fences."
              echo "Replace them with three raw backtick characters on their own line."
            fi
            fail "No fenced code block found in Local Verification (need an opening and closing \`\`\`)."
          fi

          # ---- 3. >=1 prompt indicator inside a code block, OR relaxed fallback ----
          # Extract content inside fenced code blocks only, then look for prompt lines.
          #
          # Relaxed fallback (#828): if no prompt prefix is found but the code block
          # contains >= 2 non-blank lines, accept it. This allows genuine transcripts
          # that omit the `$ ` prefix (e.g. `npx tsc --noEmit  # passes`) to pass.
          # A block with only a PASS marker (1 non-blank line) still fails because
          # there is no real command/output content to support the claim.
          awk '
            /^[[:space:]]*```/ { fence = !fence; next }
            fence { print }
          ' /tmp/lv_section.txt > /tmp/lv_code.txt

          if [ ! -s /tmp/lv_code.txt ]; then
            fail "Fenced code block(s) present but empty."
          fi

          # Prompt regex:
          #   ^\s*\$\s    bash/zsh prompt
          #   ^\s*>\s     PowerShell or quoted prompt
          #   ^\s*#\s     root prompt / comment-style (cheap signal)
          #   ^\[.*\]\$   `[user@host]$` style
          #   ^\s*PS>     PowerShell explicit
          #   ^\s*>>\s    secondary prompt (continuation)
          PROMPT_FOUND=no
          if grep -qE '(^[[:space:]]*\$ )|(^[[:space:]]*> )|(^[[:space:]]*# )|(^\[[^]]+\]\$)|(^[[:space:]]*PS> )|(^[[:space:]]*>> )' /tmp/lv_code.txt; then
            PROMPT_FOUND=yes
          fi

          if [ "${PROMPT_FOUND}" = "no" ]; then
            # Relaxed fallback: count non-blank lines inside the code blocks.
            # >= 2 non-blank lines confirms there is real command/output content
            # beyond the PASS marker alone.
            NONBLANK_COUNT=$(grep -cE '[^[:space:]]' /tmp/lv_code.txt || true)
            if [ "${NONBLANK_COUNT:-0}" -lt 2 ]; then
              echo ""
              echo "No shell-prompt prefix found AND code block has fewer than 2 non-blank lines."
              echo ""
              echo "Parser expected EITHER:"
              echo "  (a) At least one line matching a prompt prefix:"
              echo "      \`\$ \`  \`> \`  \`# \`  \`[user@host]\$\`  \`PS> \`  \`>> \`"
              echo "  OR"
              echo "  (b) At least 2 non-blank lines inside the code block"
              echo "      (command + output content, beyond the PASS marker alone)"
              echo ""
              echo "A block containing only \`PASS\` (with no command or output) is not a real transcript."
              echo ""
              fail "Code block appears to have no real transcript content. Add your actual command output, or prefix command lines with \`\$ \`."
            fi
            echo "No prompt prefix found -- relaxed fallback accepted (${NONBLANK_COUNT} non-blank lines in code block)."
          fi

          # ---- 4. >=1 PASS/OK/SUCCESS marker (case-insensitive) ----
          # Word-boundary match to avoid matching things like "passport" or
          # "OKAY-NOTHING". Allow bare "ok" (go test format) too.
          if ! grep -qiE '(\bPASS\b)|(\bOK\b)|(\bSUCCESS\b)' /tmp/lv_section.txt; then
            echo ""
            echo "Parser expected: at least one line in the section matching regex (case-insensitive, word-boundary):"
            printf '  (\\bPASS\\b)|(\\bOK\\b)|(\\bSUCCESS\\b)\n'
            echo "Accepted markers: PASS  OK  SUCCESS  (any case; must be a whole word)"
            echo ""
            fail "No PASS / OK / SUCCESS marker found in Local Verification section."
          fi

          # ---- 5. Shell-script PRs require --dry-run / dry-run ----
          # Exception (declaration-only): if the author cannot produce a
          # meaningful dry-run (the change only adds a function, constant,
          # or `source` call with no new executable entrypoint), a syntax
          # or lint check is accepted in lieu of --dry-run.  The LV section
          # must contain `sh -n` or `shellcheck` against the changed file.
          # Rule: executable entrypoint changes -> --dry-run required;
          #       declaration-only changes      -> sh -n / shellcheck accepted.
          if [ "${SHELL_TOUCHED}" = "yes" ]; then
            HAS_DRY_RUN=no
            HAS_SYNTAX_CHECK=no
            if grep -qE '(--dry-run|dry-run)' /tmp/lv_section.txt; then
              HAS_DRY_RUN=yes
            fi
            if grep -qE '(\bsh[[:space:]]+-n[[:space:]]|shellcheck[[:space:]])' /tmp/lv_section.txt; then
              HAS_SYNTAX_CHECK=yes
            fi
            if [ "${HAS_DRY_RUN}" = "no" ] && [ "${HAS_SYNTAX_CHECK}" = "no" ]; then
              echo ""
              echo "Parser expected: at least one of:"
              echo "  (a) regex  (--dry-run|dry-run)  for executable entrypoint changes"
              echo "  (b) regex  (sh -n |shellcheck )  for declaration-only changes"
              echo "This PR touches a *.sh file or scripts/deploy/."
              echo "Executable entrypoint change -> include a --dry-run transcript."
              echo "Declaration-only change (function/constant/source only) -> include sh -n or shellcheck."
              echo ""
              fail "Shell-script PR (touches *.sh or scripts/deploy/): Local Verification must include either (a) a --dry-run transcript showing the actual code path was exercised, or (b) a syntax/lint check (sh -n or shellcheck) for declaration-only changes that add no executable entrypoint." \
                   "If your change only adds a function, constant, or source call, use: sh -n <file> && shellcheck <file>"
            fi
          fi

          echo ""
          echo "permissionDecision: ALLOW"
          echo "Local Verification heuristic check: PASS"
          echo "  - Section header: present"
          echo "  - Fenced code blocks: ${FENCE_COUNT} fence markers found"
          if [ "${PROMPT_FOUND}" = "yes" ]; then
            echo "  - Shell-prompt indicator: present"
          else
            echo "  - Shell-prompt indicator: absent (relaxed fallback -- ${NONBLANK_COUNT} non-blank lines)"
          fi
          echo "  - Success marker: present"
          if [ "${SHELL_TOUCHED}" = "yes" ]; then
            if [ "${HAS_DRY_RUN}" = "yes" ]; then
              echo "  - Shell-script verification: --dry-run present"
            else
              echo "  - Shell-script verification: declaration-only (sh -n / shellcheck accepted)"
            fi
          fi
