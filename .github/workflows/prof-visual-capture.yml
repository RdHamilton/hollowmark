name: Prof Visual Capture (staging)

# Parameterized authenticated visual-capture harness for Prof (MTGA Enthusiast
# Consultant). Authenticates as the ci-smoke-token account against the live
# staging SPA, navigates to the requested surface, performs the requested
# interaction, screenshots, and uploads as a downloadable artifact.
#
# READ-ONLY: navigate + screenshot ONLY. No mutations, no crafting, no settings
# changes, no destructive actions.
#
# Auth: reads CLERK_SECRET_KEY from SSM /vaultmtg/app/staging/CLERK_SECRET_KEY
# Account: ci-smoke-token (user_3EmtmrSgZrtd0yRRdisTIIFYnnF, account_id=17)
#   — seeded with ~10k card_inventory rows and 3 Standard mtgzone_archetypes.
#
# Container: uses mcr.microsoft.com/playwright:v1.56.1-jammy (same as e2e-smoke.yml).
# Chromium is pre-installed in the image — no playwright install step, no CDN
# download, no timeout risk. (#855 — eliminated cold-install cancellations)
#
# Usage (Prof):
#   gh workflow run prof-visual-capture.yml \
#     -f route=wildcard-advisor \
#     -f action=expand-rec \
#     -f label=wildcard-v1
#   gh run watch          # wait for completion
#   gh run download       # downloads artifact to ./prof-visual-capture-*/
#
# Full usage doc: docs/prof-visual-harness.md

on:
  workflow_dispatch:
    inputs:
      route:
        description: |
          Surface to visit. Supported values:
            collection              /collection
            wildcard-advisor        /collection → open wildcard advisor panel
            match-history           /match-history
            match-details           /match-history → click first match row
            draft-analytics         /draft-analytics
            home                    /home dashboard
            decks                   /decks
            meta                    /meta
            charts-win-rate         /charts/win-rate-trend
            charts-deck-perf        /charts/deck-performance
        required: true
        type: choice
        options:
          - collection
          - wildcard-advisor
          - match-history
          - match-details
          - draft-analytics
          - home
          - decks
          - meta
          - charts-win-rate
          - charts-deck-perf
        default: collection

      action:
        description: |
          Interaction to perform before screenshotting. Supported values:
            screenshot-only         Navigate and screenshot with no further interaction
            open-wildcard-advisor   Click "Show Wildcard Advisor" button
            expand-rec              Expand first wildcard recommendation card (drill-down)
            switch-format-historic  Toggle wildcard advisor format → Historic
            switch-format-standard  Toggle wildcard advisor format → Standard
            grade-pill              Wait for draft grade pill to appear
            open-first-row          Click first list row → detail view
        required: true
        type: choice
        options:
          - screenshot-only
          - open-wildcard-advisor
          - expand-rec
          - switch-format-historic
          - switch-format-standard
          - grade-pill
          - open-first-row
        default: screenshot-only

      label:
        description: >
          Short label prefix for screenshot filenames and the artifact name
          (e.g. "wildcard-v1", "match-history-review", "draft-analytics-q2").
          No spaces — use hyphens.
        required: false
        type: string
        default: 'prof-capture'

      staging_spa_url:
        description: 'Staging SPA URL override (leave blank for default stg-app.vaultmtg.app)'
        required: false
        type: string
        # TODO(#1068): switch back to stg-app.hollowmark.app once staging host is provisioned
        default: 'https://stg-app.vaultmtg.app'

permissions:
  contents: read
  id-token: write

jobs:
  prof-visual-capture:
    name: Prof Visual Capture — ${{ inputs.route }} / ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: staging
    # -------------------------------------------------------------------------
    # Use the official Playwright Docker container.
    # Chromium is PRE-INSTALLED — no playwright install step, no CDN download.
    # Tag must match @playwright/test version in frontend/package.json (1.56.1).
    # PLAYWRIGHT_BROWSERS_PATH=/ms-playwright is set in the image; tests find
    # browsers automatically.
    # -------------------------------------------------------------------------
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    timeout-minutes: 15

    steps:
      - name: Checkout vault-mtg
        uses: actions/checkout@v6

      # Node.js and npm are pre-installed in the Playwright container.
      # No setup-node or browser cache steps required.

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # The Playwright container image does not ship the AWS CLI.
      # Install it here so the Read SSM secrets step can call `aws ssm get-parameter`.
      - name: Install AWS CLI
        run: |
          apt-get update -qq && apt-get install -y -qq unzip curl
          curl -sSfL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp/awscliv2
          /tmp/awscliv2/aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli
          aws --version

      - name: Read SSM secrets
        id: ssm
        run: |
          CLERK_SECRET_KEY=$(aws ssm get-parameter \
            --name /vaultmtg/app/staging/CLERK_SECRET_KEY \
            --with-decryption \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          echo "::add-mask::${CLERK_SECRET_KEY}"
          echo "clerk_secret_key=${CLERK_SECRET_KEY}" >> "$GITHUB_OUTPUT"

      # No playwright install steps — browsers are pre-installed in the container.

      - name: Create screenshot output directory
        run: mkdir -p /tmp/prof-screenshots

      - name: Run Prof visual capture spec
        working-directory: frontend
        run: |
          npx playwright test \
            tests/e2e/staging/prof-visual-capture.spec.ts \
            --config=playwright.visual-capture.config.ts \
            --reporter=list
        env:
          CI: true
          # TODO(#1068): switch back to stg-app.hollowmark.app once staging host is provisioned
          STAGING_SPA_URL: ${{ inputs.staging_spa_url || 'https://stg-app.vaultmtg.app' }}
          CLERK_SECRET_KEY: ${{ steps.ssm.outputs.clerk_secret_key }}
          SCREENSHOT_DIR: /tmp/prof-screenshots
          CI_SMOKE_USER_ID: user_3EmtmrSgZrtd0yRRdisTIIFYnnF
          PROF_ROUTE: ${{ inputs.route }}
          PROF_ACTION: ${{ inputs.action }}
          PROF_LABEL: ${{ inputs.label || 'prof-capture' }}

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prof-visual-capture-${{ inputs.label || 'prof-capture' }}
          path: /tmp/prof-screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-prof-visual-${{ inputs.label || 'prof-capture' }}
          path: frontend/playwright-report-staging-spa/
          retention-days: 7
