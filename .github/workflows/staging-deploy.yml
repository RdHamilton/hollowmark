# Staging BFF deploy — runs on every push to main and on a nightly cadence.
#
# Path filter removed intentionally (post-mortem action A1): deploy scripts,
# infra scripts, and migration files can change without touching services/bff/,
# and those changes must be exercised in staging before they reach production.
# Running on every merge ensures the full deploy path is always warm and that
# no stage of the release pipeline first executes in production.
#
# Nightly schedule (R-20): guarantees staging is exercised at least once per day
# even if no commits land on main. This keeps the deploy path warm during slow
# periods and surfaces any drift in external dependencies (SSM params, AMI/OS
# patches, IAM role trust, S3 bucket policies) before a production release is cut.
# Cron is 06:00 UTC daily (~01:00/02:00 ET) to avoid overlap with business hours.
#
# Production deploys are NOT triggered by this workflow — release.yml fires only
# on app/v* tags and routes to deploy-bff.yml with environment: production.
#
# All deploy logic is delegated to the shared deploy-bff.yml reusable workflow,
# which is also called by release.yml for production. Staging always runs first;
# any defect in the deploy path surfaces here before a production release is cut.

name: Staging Deploy

on:
  push:
    branches: [main]

  # Nightly staging deploy (R-20). Runs at 06:00 UTC daily against the default
  # branch (main) HEAD. github.sha resolves to the latest commit on main.
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy to staging (branch, tag, or SHA)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read
  id-token: write  # passed through to the reusable workflow via secrets: inherit path

jobs:
  deploy-staging:
    name: Deploy BFF to Staging
    uses: ./.github/workflows/deploy-bff.yml
    with:
      environment: staging
      deploy-bucket: vaultmtg-deploy-artifacts-staging
      s3-binary-key-suffix: staging/${{ github.sha }}/mtga-bff-staging
      binary-name: mtga-bff-staging
      deploy-sha: ${{ github.sha }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      # DEPLOY_BUCKET is not needed for staging — bucket is passed as an input above.
      # Omitting it so the reusable workflow falls back to the input value.
