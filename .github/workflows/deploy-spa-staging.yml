name: Deploy Staging SPA to S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy Staging SPA
    runs-on: ubuntu-latest
    environment: staging
    # Hard cap prevents the "Install Playwright browsers" step from hanging the runner
    # for GitHub's default 6-hour job timeout when ubuntu-latest 24.04 (≥20260525.161)
    # causes apt-get's needrestart post-install hook to block in non-interactive CI.
    # 20 min is generous: build+deploy typically completes in ~5 min; smoke suite adds ~2 min.
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Cache Playwright browser binaries keyed on package-lock.json so the
      # 173 MB Chromium zip is only re-downloaded when playwright version changes.
      # Mirrors the pattern in e2e-smoke-staging.yml.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-staging-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-staging-${{ runner.os }}-
            playwright-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Read S3 bucket name, CloudFront distribution ID, Sentry DSN, CI smoke
      # credentials, and staging Clerk publishable key from SSM at deploy time.
      # Canonical SSM-as-source-of-truth pattern (vault-mtg-tickets#16).
      #
      # Auth-enforcement (#678): ci-smoke-token is the pre-issued BFF JWT used by
      # staging-smoke.spec.ts for BFF API assertions. Its absence causes the BFF
      # smoke to FAIL with INCONCLUSIVE — not silently skip.
      #
      # vmt#967: CLERK_PUBLISHABLE_KEY is read from SSM /vaultmtg/staging/CLERK_PUBLISHABLE_KEY
      # (a plain String — publishable keys are public) so the staging SPA authenticates
      # against the staging Clerk instance, not the prod instance. The repo-level
      # vars.VITE_CLERK_PUBLISHABLE_KEY holds the PROD key and must NOT be used here.
      - name: Read SSM parameters
        id: ssm
        run: |
          BUCKET=$(aws ssm get-parameter \
            --name /vaultmtg/staging/spa-bucket-name \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          DIST_ID=$(aws ssm get-parameter \
            --name /vaultmtg/staging/spa-distribution-id \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          SENTRY_DSN=$(aws ssm get-parameter \
            --name /vaultmtg/staging/sentry-spa-dsn \
            --with-decryption \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          # Mask the Sentry DSN immediately so it never appears in log output.
          echo "::add-mask::${SENTRY_DSN}"
          STAGING_SMOKE_TOKEN=$(aws ssm get-parameter \
            --name /vaultmtg/staging/ci-smoke-token \
            --with-decryption \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          # Mask the smoke token immediately so it never appears in log output.
          echo "::add-mask::${STAGING_SMOKE_TOKEN}"
          # Publishable key is a plain String (pk_live_* values are public) — no --with-decryption.
          CLERK_PUBLISHABLE_KEY=$(aws ssm get-parameter \
            --name /vaultmtg/staging/CLERK_PUBLISHABLE_KEY \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          {
            echo "bucket=$BUCKET"
            echo "dist_id=$DIST_ID"
            echo "sentry_dsn=$SENTRY_DSN"
            echo "staging_smoke_token=${STAGING_SMOKE_TOKEN}"
            echo "clerk_publishable_key=${CLERK_PUBLISHABLE_KEY}"
          } >> "$GITHUB_OUTPUT"

      - name: Build React SPA (staging)
        working-directory: frontend
        run: npm run build
        env:
          VITE_BFF_URL: ${{ vars.VITE_BFF_URL }}
          # Staging daemon binds the staging local-API port 9011 (stable=9001) —
          # see internal/install + services/daemon/internal/localapi. Without this
          # the env-aware SPA client (services/daemonConfig.ts) falls back to the
          # stable port 9001 and the staging install cannot reach its daemon.
          # Value is a loopback port only — not a secret. Coupled to the daemon
          # 9011-bind change (ticket #667); must deploy together.
          VITE_DAEMON_URL: ${{ vars.VITE_DAEMON_URL || 'http://localhost:9011/api/v1' }}
          # vmt#967: sourced from SSM /vaultmtg/staging/CLERK_PUBLISHABLE_KEY (staging instance),
          # not the repo-level var which holds the prod key.
          VITE_CLERK_PUBLISHABLE_KEY: ${{ steps.ssm.outputs.clerk_publishable_key }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          # #818: pin PostHog ingest host explicitly. Falls back to app.posthog.com
          # if the repo var is not yet set (safe — the redirect still works).
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || 'https://app.posthog.com' }}
          VITE_SENTRY_DSN: ${{ steps.ssm.outputs.sentry_dsn }}
          # Staging builds use the full git SHA as the Sentry release value so every
          # merge to main produces a unique, traceable release string. No git tag
          # exists on staging pushes — do not use git describe here.
          VITE_APP_VERSION: staging-${{ github.sha }}
          VITE_SENTRY_ENV: staging
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Pins daemon downloads to the latest signed pre-release build.
          # Updated automatically by daemon-release.yml after each successful
          # pre-release signing run. Production omits this var entirely so
          # downloads resolve via /releases/latest/download/.
          VITE_DAEMON_VERSION: ${{ vars.VITE_DAEMON_VERSION }}

      - name: Sync build output to S3 (staging)
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.ssm.outputs.bucket }} \
            --delete \
            --region us-east-1

      - name: Invalidate CloudFront cache (staging)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.ssm.outputs.dist_id }} \
            --paths "/*"

      - name: Post-deploy SPA smoke check
        run: |
          for i in $(seq 1 6); do
            if curl -fsSL https://stg-app.hollowmark.app/ | grep -q '<div id="root"'; then
              echo "Staging SPA smoke check passed."
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 10s..."
            sleep 10
          done
          echo "Staging SPA smoke check failed after 60s"
          exit 1

      # On ubuntu-latest 24.04 (≥20260525.161) the apt-get needrestart post-install hook
      # hangs indefinitely in CI without DEBIAN_FRONTEND=noninteractive. Split into two
      # conditional steps (cache-miss = full install; cache-hit = system deps only)
      # so we never pay the binary download cost on a warm runner.
      - name: Install Playwright browsers (cache miss — full install)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install chromium --with-deps
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium
        env:
          DEBIAN_FRONTEND: noninteractive

      # ── SPA authenticated smoke (#678) ──────────────────────────────────────
      # Exercises every protected SPA route via Clerk testing token injection.
      # CLERK_STAGING_SECRET_KEY is sourced from GitHub Actions secrets (provisioned
      # from SSM /vaultmtg/app/staging/CLERK_SECRET_KEY at environment setup time).
      # If absent, the suite FAILS with INCONCLUSIVE — it does NOT skip.
      - name: Run SPA browser smoke suite
        working-directory: frontend
        run: npm run test:e2e:staging-spa
        env:
          STAGING_SPA_URL: ${{ vars.STAGING_SPA_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}

      # ── BFF API authenticated smoke (#678) ──────────────────────────────────
      # Exercises auth-gated BFF endpoints (matches, SSE) with a pre-issued
      # staging Clerk JWT read from SSM /vaultmtg/staging/ci-smoke-token.
      # If STAGING_SMOKE_TOKEN is absent, the suite FAILS with INCONCLUSIVE.
      - name: Run BFF API authenticated smoke suite
        working-directory: frontend
        run: npm run test:staging
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://staging-api.hollowmark.app' }}
          STAGING_SMOKE_TOKEN: ${{ steps.ssm.outputs.staging_smoke_token }}

      - name: Upload Playwright SPA smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-spa-report
          path: |
            frontend/playwright-report-staging-spa/
            frontend/playwright-report-staging/
          retention-days: 7
