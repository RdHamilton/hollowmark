name: Layer-5 Replay Reconcile (ADR-052 Mode A)

# Pull requests: always run so the 'Layer-5 API Reconciliation' check is always
# present as a required status. The path filter has been moved in-job (two-job
# pattern) -- the cheap detect-changes job runs on every PR; the heavy
# reconciliation job (which needs a postgres service container) only runs when
# relevant files changed. Service containers start before any steps, so an
# in-job skip CANNOT prevent container spin-up in a single-job design --
# the two-job split is the correct pattern here.
#
# Skip mechanism: a job skipped via `if:` emits a 'skipped' conclusion to the
# commit status API. GitHub branch protection treats 'skipped' as satisfying a
# required status check (documented: "If a required status check is skipped
# using paths filtering, the branch protection rule considers the status as
# met"). The heavy job keeps the exact display name 'Layer-5 API Reconciliation'
# so the required-check context is emitted on every PR, whether the job runs or
# skips. Reference: https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
#
# This is the Layer-5 Mode A gate: mines a corpus snapshot (when available),
# replays it through the real daemon→BFF→projection pipeline, and asserts the
# projected BFF API responses against the expected-truth manifest.
#
# RULE-INFRA-01 (ADR-052): flipped to continue-on-error: false (hard-fail)
# on 2026-06-11 after green runs 27315107720 + 27315215200 (#695).
# Always-emit conversion applied 2026-06-10 (#1216): PR path filter dropped,
# in-job two-job gate added. continue-on-error: false is preserved.
#
# Local run:
#   export DATABASE_URL="postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable"
#   export LAYER5_CORPUS_SNAPSHOT_DIR="$HOME/mtga-log-backups/corpus-snapshot-20260602T170441Z/daemon-archives"
#   go test -v -tags layer5 -run TestLayer5 ./services/bff/
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    # No path filter -- the job must always run on PRs so the required status
    # check is always emitted (even when zero relevant files changed).
    # Path filtering is done inside detect-changes below.

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect relevant file changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect BFF / daemon / contract / api / workflow changes
        id: filter
        run: |
          # On pull_request events, diff against the base branch merge-base.
          # On workflow_dispatch, always run.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch: treating all files as relevant"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(services/bff/|services/daemon/|services/contract/|frontend/src/services/api/|\.github/workflows/bff-layer5\.yml)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Relevant files changed -- will run Layer-5 reconciliation."
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No relevant files changed -- Layer-5 reconciliation will be skipped."
          fi

  layer5-api-reconcile:
    name: Layer-5 API Reconciliation
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # RULE-INFRA-01: flipped to hard-fail after two consecutive green main runs.
    # Flip date: 2026-06-11. Green run IDs: 27315107720, 27315215200.
    # Ticket: RdHamilton/hollowmark-tickets#695.
    # Always-emit: continue-on-error: false is preserved (#1216).
    continue-on-error: false
    # AC5 (#695): hard cap prevents a hung reconciliation job from consuming a
    # runner for the default 6-hour GHA job timeout.
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Download daemon module dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: go mod download

      - name: Download BFF module dependencies
        working-directory: services/bff
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: go mod download

      - name: Run Layer-5 replay injector tests
        # DATABASE_URL is set; LAYER5_CORPUS_SNAPSHOT_DIR is NOT set in CI
        # (the raw snapshot is a local-only artifact per ADR-041 PII protocol).
        # Both tests skip gracefully when the corpus dir is absent.
        # The CI job serves as a compile+infrastructure gate; full corpus
        # replay runs locally and in the staging-replay-gate.
        working-directory: services/bff
        env:
          DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: go test -v -race -tags layer5 -run TestLayer5 -timeout 300s ./...

      - name: Run daemon replay package unit tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
          GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        run: go test -v -race ./replay/...
