name: Board Status Automation

# ---------------------------------------------------------------------------
# Automatically transitions Status on ANY project board that contains a
# linked issue, based on PR lifecycle and issue close events.
#
# TARGET BEHAVIOR
# ---------------
# PR opened / ready-for-review  -> linked board items set to "PR Review"
# PR merged (pull_request_target closed+merged) -> linked board items set to "Done"
# Issue closed                  -> issue's own board items set to "Done"
#
# "In Progress" is OUT OF SCOPE -- set at dispatch by the orchestrator/engineer.
#
# BOARD-AGNOSTIC DESIGN
# ----------------------
# No board number, project ID, Status field ID, or option ID is hardcoded.
# For each linked issue, the workflow queries all of its projectItems to get
# the set of boards the issue currently belongs to. For each board, it
# dynamically resolves that board's Status field ID and the option IDs for
# "PR Review" and "Done" at runtime via node(id:) -> field(name:"Status").
# This means items move on whatever board(s) they belong to today -- #55,
# #63, or any future wave board -- with zero per-wave edits to this file.
#
# CROSS-REPO SUPPORT
# ------------------
# Issues in RdHamilton/hollowmark and RdHamilton/hollowmark-tickets are
# both supported. closingIssuesReferences resolves cross-repo links.
# For issue-close events: this workflow fires for issues in its own repo.
# Issues in hollowmark-tickets need this same workflow in that repo.
#
# LINKING CONVENTION
# ------------------
# Issues are linked via PR body using GitHub closing keywords:
#   closes #NNN                                    (same-repo)
#   closes RdHamilton/hollowmark-tickets#NNN       (cross-repo)
# Both forms are resolved by closingIssuesReferences.
#
# TOKEN
# -----
# Uses secrets.GH_PROJECT_PAT (classic PAT, "VaultMTG-Board-Automation",
# project scope). GITHUB_TOKEN cannot write to ProjectV2.
# If GH_PROJECT_PAT is absent, the job warns and exits 0 (safe no-op).
# If a GraphQL mutation returns errors, the step fails (non-zero) so
# drift is visible -- real errors are not swallowed.
#
# NULL SAFETY
# -----------
# A PR/issue with no linked issues, or a linked issue on no board, or a
# board with no Status field, is a legitimate no-op. Every dict access is
# guarded; no subscript on None. The job exits 0 with an informational log.
#
# TICKET
# ------
# Fix #1087 -- board-agnostic board-status-automation (Ben, 2026-06-07)
# ---------------------------------------------------------------------------

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]
  pull_request_target:
    types: [closed]
    branches: [main]
  issues:
    types: [closed]

concurrency:
  group: board-status-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:

  # -------------------------------------------------------------------------
  # Job: set-pr-review
  # Runs when a PR is opened or marked ready-for-review (non-draft).
  # For each issue linked via closingIssuesReferences, finds all boards that
  # issue belongs to and sets Status = "PR Review" on each.
  # -------------------------------------------------------------------------
  set-pr-review:
    name: Set board status to PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review') &&
      github.event.pull_request.draft == false

    steps:
      - name: Move linked board items to PR Review
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # shellcheck disable=SC2016  # single-quoted $vars are GraphQL placeholders, not shell expansions
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "WARNING: GH_PROJECT_PAT secret is not set -- skipping board status update (safe no-op)."
            exit 0
          fi

          echo "PR #${PR_NUMBER} opened/ready -- fetching linked closing issues and their board memberships..."

          RESPONSE=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  closingIssuesReferences(first: 25) {
                    nodes {
                      number
                      repository { name owner { login } }
                      projectItems(first: 20) {
                        nodes {
                          id
                          project { id number title }
                        }
                      }
                    }
                  }
                }
              }
            }' \
            -f owner="${REPO_OWNER}" \
            -f repo="${REPO_NAME}" \
            -F pr="${PR_NUMBER}" 2>&1)

          echo "GraphQL response received."

          python3 - "${RESPONSE}" << 'PYEOF'
          import json, sys, subprocess, os

          raw = sys.argv[1]
          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"ERROR: could not parse GraphQL response: {e}", file=sys.stderr)
              sys.exit(1)

          errors = data.get("errors")
          if errors:
              print(f"ERROR: GraphQL returned errors: {errors}", file=sys.stderr)
              sys.exit(1)

          repo_data = (data.get("data") or {}).get("repository") or {}
          pr_node = repo_data.get("pullRequest")
          if not pr_node:
              print("No linked PR node found -- PR may not exist or token lacks read access.")
              sys.exit(0)

          issues = (pr_node.get("closingIssuesReferences") or {}).get("nodes") or []
          if not issues:
              print("No linked closing issues found -- nothing to update.")
              sys.exit(0)

          target_status = "PR Review"
          total_updated = 0
          total_failed = 0

          for issue in issues:
              issue_num = issue.get("number", "?")
              issue_repo = ((issue.get("repository") or {}).get("owner") or {}).get("login", "?") + \
                           "/" + (issue.get("repository") or {}).get("name", "?")
              items = (issue.get("projectItems") or {}).get("nodes") or []
              if not items:
                  print(f"  Issue {issue_repo}#{issue_num}: no board memberships -- skipping.")
                  continue

              for item in items:
                  item_id = item.get("id")
                  project = item.get("project") or {}
                  project_id = project.get("id")
                  project_num = project.get("number", "?")
                  project_title = project.get("title", "?")

                  if not item_id or not project_id:
                      print(f"  Issue {issue_repo}#{issue_num}: item or project id missing -- skipping.")
                      continue

                  print(f"  Issue {issue_repo}#{issue_num} on board #{project_num} ({project_title}):")
                  print(f"    Item: {item_id}")

                  # Resolve Status field for this specific board dynamically
                  field_resp = subprocess.run(
                      ["gh", "api", "graphql",
                       "-f", f"query=query($pid: ID!) {{ node(id: $pid) {{ ... on ProjectV2 {{ field(name: \"Status\") {{ ... on ProjectV2SingleSelectField {{ id options {{ id name }} }} }} }} }} }}",
                       "-f", f"pid={project_id}"],
                      capture_output=True, text=True
                  )
                  try:
                      field_data = json.loads(field_resp.stdout)
                  except json.JSONDecodeError:
                      print(f"    FAILED: could not parse field resolution response.", file=sys.stderr)
                      total_failed += 1
                      continue

                  if field_data.get("errors"):
                      print(f"    FAILED: field resolution returned errors: {field_data['errors']}", file=sys.stderr)
                      total_failed += 1
                      continue

                  field_node = ((field_data.get("data") or {}).get("node") or {}).get("field")
                  if not field_node:
                      print(f"    Board #{project_num} has no 'Status' field -- skipping.")
                      continue

                  field_id = field_node.get("id")
                  options = {o["name"]: o["id"] for o in (field_node.get("options") or [])}
                  option_id = options.get(target_status)

                  if not field_id or not option_id:
                      print(f"    Board #{project_num}: Status field or '{target_status}' option not found -- skipping.")
                      continue

                  print(f"    Resolved field_id={field_id}, option_id={option_id} ({target_status})")

                  # Perform the mutation
                  mut_resp = subprocess.run(
                      ["gh", "api", "graphql",
                       "-f", "query=mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) { updateProjectV2ItemFieldValue(input: { projectId: $pid itemId: $iid fieldId: $fid value: { singleSelectOptionId: $oid } }) { projectV2Item { id } } }",
                       "-f", f"pid={project_id}",
                       "-f", f"iid={item_id}",
                       "-f", f"fid={field_id}",
                       "-f", f"oid={option_id}"],
                      capture_output=True, text=True
                  )
                  try:
                      mut_data = json.loads(mut_resp.stdout)
                  except json.JSONDecodeError:
                      print(f"    FAILED: could not parse mutation response.", file=sys.stderr)
                      total_failed += 1
                      continue

                  if mut_data.get("errors"):
                      print(f"    FAILED: mutation returned errors: {mut_data['errors']}", file=sys.stderr)
                      total_failed += 1
                      continue

                  updated_item = ((mut_data.get("data") or {}).get("updateProjectV2ItemFieldValue") or {}).get("projectV2Item") or {}
                  updated_id = updated_item.get("id", "")
                  if updated_id.startswith("PVTI_"):
                      print(f"    OK: {item_id} -> {target_status} on board #{project_num}")
                      total_updated += 1
                  else:
                      print(f"    FAILED: mutation succeeded but returned unexpected item id: {mut_resp.stdout}", file=sys.stderr)
                      total_failed += 1

          print(f"\nResult: {total_updated} updated, {total_failed} failed.")
          if total_failed > 0:
              sys.exit(1)
          PYEOF

  # -------------------------------------------------------------------------
  # Job: set-done-on-pr-merge
  # Runs when a PR is merged (pull_request_target closed + merged == true).
  # pull_request_target runs in the base-branch context so secrets are
  # available even for PRs from feature branches.
  # For each linked issue, sets Status = "Done" on every board it belongs to.
  # -------------------------------------------------------------------------
  set-done-on-pr-merge:
    name: Set board status to Done (PR merged)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true

    steps:
      - name: Move linked board items to Done
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # shellcheck disable=SC2016  # single-quoted $vars are GraphQL placeholders, not shell expansions
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "WARNING: GH_PROJECT_PAT secret is not set -- skipping board status update (safe no-op)."
            exit 0
          fi

          echo "PR #${PR_NUMBER} merged -- fetching linked closing issues and their board memberships..."

          RESPONSE=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  closingIssuesReferences(first: 25) {
                    nodes {
                      number
                      repository { name owner { login } }
                      projectItems(first: 20) {
                        nodes {
                          id
                          project { id number title }
                        }
                      }
                    }
                  }
                }
              }
            }' \
            -f owner="${REPO_OWNER}" \
            -f repo="${REPO_NAME}" \
            -F pr="${PR_NUMBER}" 2>&1)

          echo "GraphQL response received."

          python3 - "${RESPONSE}" << 'PYEOF'
          import json, sys, subprocess, os

          raw = sys.argv[1]
          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"ERROR: could not parse GraphQL response: {e}", file=sys.stderr)
              sys.exit(1)

          errors = data.get("errors")
          if errors:
              print(f"ERROR: GraphQL returned errors: {errors}", file=sys.stderr)
              sys.exit(1)

          repo_data = (data.get("data") or {}).get("repository") or {}
          pr_node = repo_data.get("pullRequest")
          if not pr_node:
              print("No linked PR node found -- PR may not exist or token lacks read access.")
              sys.exit(0)

          issues = (pr_node.get("closingIssuesReferences") or {}).get("nodes") or []
          if not issues:
              print("No linked closing issues found -- nothing to update.")
              sys.exit(0)

          target_status = "Done"
          total_updated = 0
          total_failed = 0

          for issue in issues:
              issue_num = issue.get("number", "?")
              issue_repo = ((issue.get("repository") or {}).get("owner") or {}).get("login", "?") + \
                           "/" + (issue.get("repository") or {}).get("name", "?")
              items = (issue.get("projectItems") or {}).get("nodes") or []
              if not items:
                  print(f"  Issue {issue_repo}#{issue_num}: no board memberships -- skipping.")
                  continue

              for item in items:
                  item_id = item.get("id")
                  project = item.get("project") or {}
                  project_id = project.get("id")
                  project_num = project.get("number", "?")
                  project_title = project.get("title", "?")

                  if not item_id or not project_id:
                      print(f"  Issue {issue_repo}#{issue_num}: item or project id missing -- skipping.")
                      continue

                  print(f"  Issue {issue_repo}#{issue_num} on board #{project_num} ({project_title}):")
                  print(f"    Item: {item_id}")

                  # Resolve Status field for this specific board dynamically
                  field_resp = subprocess.run(
                      ["gh", "api", "graphql",
                       "-f", f"query=query($pid: ID!) {{ node(id: $pid) {{ ... on ProjectV2 {{ field(name: \"Status\") {{ ... on ProjectV2SingleSelectField {{ id options {{ id name }} }} }} }} }} }}",
                       "-f", f"pid={project_id}"],
                      capture_output=True, text=True
                  )
                  try:
                      field_data = json.loads(field_resp.stdout)
                  except json.JSONDecodeError:
                      print(f"    FAILED: could not parse field resolution response.", file=sys.stderr)
                      total_failed += 1
                      continue

                  if field_data.get("errors"):
                      print(f"    FAILED: field resolution returned errors: {field_data['errors']}", file=sys.stderr)
                      total_failed += 1
                      continue

                  field_node = ((field_data.get("data") or {}).get("node") or {}).get("field")
                  if not field_node:
                      print(f"    Board #{project_num} has no 'Status' field -- skipping.")
                      continue

                  field_id = field_node.get("id")
                  options = {o["name"]: o["id"] for o in (field_node.get("options") or [])}
                  option_id = options.get(target_status)

                  if not field_id or not option_id:
                      print(f"    Board #{project_num}: Status field or '{target_status}' option not found -- skipping.")
                      continue

                  print(f"    Resolved field_id={field_id}, option_id={option_id} ({target_status})")

                  # Perform the mutation
                  mut_resp = subprocess.run(
                      ["gh", "api", "graphql",
                       "-f", "query=mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) { updateProjectV2ItemFieldValue(input: { projectId: $pid itemId: $iid fieldId: $fid value: { singleSelectOptionId: $oid } }) { projectV2Item { id } } }",
                       "-f", f"pid={project_id}",
                       "-f", f"iid={item_id}",
                       "-f", f"fid={field_id}",
                       "-f", f"oid={option_id}"],
                      capture_output=True, text=True
                  )
                  try:
                      mut_data = json.loads(mut_resp.stdout)
                  except json.JSONDecodeError:
                      print(f"    FAILED: could not parse mutation response.", file=sys.stderr)
                      total_failed += 1
                      continue

                  if mut_data.get("errors"):
                      print(f"    FAILED: mutation returned errors: {mut_data['errors']}", file=sys.stderr)
                      total_failed += 1
                      continue

                  updated_item = ((mut_data.get("data") or {}).get("updateProjectV2ItemFieldValue") or {}).get("projectV2Item") or {}
                  updated_id = updated_item.get("id", "")
                  if updated_id.startswith("PVTI_"):
                      print(f"    OK: {item_id} -> {target_status} on board #{project_num}")
                      total_updated += 1
                  else:
                      print(f"    FAILED: mutation succeeded but returned unexpected item id: {mut_resp.stdout}", file=sys.stderr)
                      total_failed += 1

          print(f"\nResult: {total_updated} updated, {total_failed} failed.")
          if total_failed > 0:
              sys.exit(1)
          PYEOF

  # -------------------------------------------------------------------------
  # Job: set-done-on-issue-close
  # Runs when an issue is closed in this repo.
  # Covers: manual closes, orchestrator-inline closes, superseded issues,
  # and cross-repo closes that do not fire a PR-merge event in this repo.
  #
  # Queries the closed issue's own projectItems to find all boards it
  # belongs to, then sets Status = "Done" on each dynamically.
  #
  # NOTE: The issues: [closed] trigger fires only for issues in this repo.
  # Issues in RdHamilton/hollowmark-tickets need this same workflow there.
  # -------------------------------------------------------------------------
  set-done-on-issue-close:
    name: Set board status to Done (issue closed)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'issues' && github.event.action == 'closed'

    steps:
      - name: Move closed issue board items to Done
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # shellcheck disable=SC2016  # single-quoted $vars are GraphQL placeholders, not shell expansions
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "WARNING: GH_PROJECT_PAT secret is not set -- skipping board status update (safe no-op)."
            exit 0
          fi

          echo "Issue #${ISSUE_NUMBER} closed -- fetching its board memberships..."

          RESPONSE=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!, $issue: Int!) {
              repository(owner: $owner, name: $repo) {
                issue(number: $issue) {
                  projectItems(first: 20) {
                    nodes {
                      id
                      project { id number title }
                    }
                  }
                }
              }
            }' \
            -f owner="${REPO_OWNER}" \
            -f repo="${REPO_NAME}" \
            -F issue="${ISSUE_NUMBER}" 2>&1)

          echo "GraphQL response received."

          python3 - "${RESPONSE}" << 'PYEOF'
          import json, sys, subprocess, os

          raw = sys.argv[1]
          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"ERROR: could not parse GraphQL response: {e}", file=sys.stderr)
              sys.exit(1)

          errors = data.get("errors")
          if errors:
              print(f"ERROR: GraphQL returned errors: {errors}", file=sys.stderr)
              sys.exit(1)

          repo_data = (data.get("data") or {}).get("repository") or {}
          issue_node = repo_data.get("issue")
          if not issue_node:
              print("No issue node found -- issue may not exist or token lacks read access.")
              sys.exit(0)

          items = (issue_node.get("projectItems") or {}).get("nodes") or []
          if not items:
              print(f"Issue #{os.environ.get('ISSUE_NUMBER','?')} has no board memberships -- nothing to update.")
              sys.exit(0)

          target_status = "Done"
          total_updated = 0
          total_failed = 0

          for item in items:
              item_id = item.get("id")
              project = item.get("project") or {}
              project_id = project.get("id")
              project_num = project.get("number", "?")
              project_title = project.get("title", "?")

              if not item_id or not project_id:
                  print(f"  Item or project id missing -- skipping.")
                  continue

              print(f"  Board #{project_num} ({project_title}): item {item_id}")

              # Resolve Status field for this specific board dynamically
              field_resp = subprocess.run(
                  ["gh", "api", "graphql",
                   "-f", f"query=query($pid: ID!) {{ node(id: $pid) {{ ... on ProjectV2 {{ field(name: \"Status\") {{ ... on ProjectV2SingleSelectField {{ id options {{ id name }} }} }} }} }} }}",
                   "-f", f"pid={project_id}"],
                  capture_output=True, text=True
              )
              try:
                  field_data = json.loads(field_resp.stdout)
              except json.JSONDecodeError:
                  print(f"    FAILED: could not parse field resolution response.", file=sys.stderr)
                  total_failed += 1
                  continue

              if field_data.get("errors"):
                  print(f"    FAILED: field resolution returned errors: {field_data['errors']}", file=sys.stderr)
                  total_failed += 1
                  continue

              field_node = ((field_data.get("data") or {}).get("node") or {}).get("field")
              if not field_node:
                  print(f"    Board #{project_num} has no 'Status' field -- skipping.")
                  continue

              field_id = field_node.get("id")
              options = {o["name"]: o["id"] for o in (field_node.get("options") or [])}
              option_id = options.get(target_status)

              if not field_id or not option_id:
                  print(f"    Board #{project_num}: Status field or '{target_status}' option not found -- skipping.")
                  continue

              print(f"    Resolved field_id={field_id}, option_id={option_id} ({target_status})")

              # Perform the mutation
              mut_resp = subprocess.run(
                  ["gh", "api", "graphql",
                   "-f", "query=mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) { updateProjectV2ItemFieldValue(input: { projectId: $pid itemId: $iid fieldId: $fid value: { singleSelectOptionId: $oid } }) { projectV2Item { id } } }",
                   "-f", f"pid={project_id}",
                   "-f", f"iid={item_id}",
                   "-f", f"fid={field_id}",
                   "-f", f"oid={option_id}"],
                  capture_output=True, text=True
              )
              try:
                  mut_data = json.loads(mut_resp.stdout)
              except json.JSONDecodeError:
                  print(f"    FAILED: could not parse mutation response.", file=sys.stderr)
                  total_failed += 1
                  continue

              if mut_data.get("errors"):
                  print(f"    FAILED: mutation returned errors: {mut_data['errors']}", file=sys.stderr)
                  total_failed += 1
                  continue

              updated_item = ((mut_data.get("data") or {}).get("updateProjectV2ItemFieldValue") or {}).get("projectV2Item") or {}
              updated_id = updated_item.get("id", "")
              if updated_id.startswith("PVTI_"):
                  print(f"    OK: {item_id} -> {target_status} on board #{project_num}")
                  total_updated += 1
              else:
                  print(f"    FAILED: mutation succeeded but returned unexpected item id: {mut_resp.stdout}", file=sys.stderr)
                  total_failed += 1

          print(f"\nResult: {total_updated} updated, {total_failed} failed.")
          if total_failed > 0:
              sys.exit(1)
          PYEOF
