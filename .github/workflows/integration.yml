name: Integration Tests

# Triggered on pull requests that touch BFF or contract code so projection
# regressions are caught per-PR (ADR-042 Layer 3a). Also runnable manually
# and callable from environment-promotion workflows.
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    paths:
      - 'services/bff/**'
      - 'services/contract/**'

permissions:
  contents: read

jobs:
  bff-integration-tests:
    name: BFF Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Download dependencies
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go mod download

    - name: Run BFF integration tests
      working-directory: services/bff
      env:
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
        INTEGRATION_TEST: "true"
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -v -run Integration -coverprofile=coverage-integration.out -covermode=atomic ./...

    - name: Run Layer 3a projection integration tests
      # RULE-INFRA-01 / ADR-042: hard-fail enabled after two consecutive green
      # runs (vault-mtg-tickets#249, runs 26678898798 + 26686145566).
      working-directory: services/bff
      env:
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -v -tags integration -run TestProjectionIntegration -coverprofile=coverage-integration-proj.out -covermode=atomic ./...

    - name: Run Layer 3b sync integration smoke
      # RULE-INFRA-01 / ADR-042: hard-fail enabled after two consecutive green
      # runs (vault-mtg-tickets#249, runs 26678898798 + 26686145566).
      # Closes #185 (data-pipeline-integration-smoke gap).
      working-directory: services/bff
      env:
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -v -tags integration -run TestSyncIntegration -coverprofile=coverage-integration-sync.out -covermode=atomic ./...

    - name: Run repository package integration tests
      # Fixes RdHamilton/hollowmark-tickets#1177: the existing "-run Integration"
      # step name-filters to ~3 tests in this package; the remaining ~350
      # TestXxxRepository_* tests all call openTestDB (which t.Skip when
      # DATABASE_URL is absent) but are silently excluded by the name filter
      # before the skip guard fires. This step runs the package directly with no
      # name filter so every DB-backed test executes. TestMain (main_test.go)
      # in this package calls RunMigrations before m.Run so the schema is ready.
      working-directory: services/bff
      env:
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -v -count=1 -coverprofile=coverage-integration-repo.out -covermode=atomic ./internal/storage/repository/...

    - name: Upload integration coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./services/bff/coverage-integration.out
        flags: bff-integration
        fail_ci_if_error: false
