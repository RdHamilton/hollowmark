name: E2E Staging Auth Smoke (vmt-t#678)

# Runs the authenticated staging smoke suites after every successful staging
# SPA deploy. Exercises every auth-gated SPA surface and BFF API endpoint using
# a real Clerk session minted from the staging CLERK_SECRET_KEY in SSM.
#
# Auth-enforcement contract (vmt-t#678):
#   - CLERK_SECRET_KEY is sourced from the CLERK_STAGING_SECRET_KEY GitHub Actions
#     secret (provisioned from SSM /vaultmtg/app/staging/CLERK_SECRET_KEY at
#     environment setup time, stored as a repo/environment secret for CI use).
#   - If CLERK_STAGING_SECRET_KEY is absent the suite FAILs with INCONCLUSIVE —
#     it does NOT skip and report PASS. A smoke that skips all authenticated
#     surfaces is worse than no test (2026-06-02 false-PASS incident).
#   - STAGING_SMOKE_TOKEN is a pre-issued static BFF JWT for the BFF API smoke.
#     Also sourced from the STAGING_SMOKE_TOKEN GitHub Actions secret.
#
# Container note: Uses mcr.microsoft.com/playwright:v1.56.1-jammy (same container
# as ci.yml frontend-e2e). Chromium is pre-baked — no browser download needed.
# The configure-aws-credentials OIDC action does NOT propagate env vars into
# container steps; GitHub Actions secrets injected via `env:` DO propagate.
# This is why CLERK_STAGING_SECRET_KEY uses a GHA secret instead of SSM runtime read.
#
# Surfaces exercised (authenticated):
#   SPA: /home, /match-history, /quests, /draft, /draft-analytics, /decks,
#        /collection, /meta, /charts/*, /settings, /history/drafts, /draft/live,
#        /api-keys
#   BFF: GET /api/v1/matches, GET /api/v1/events (SSE), GET /healthz
#   WildcardAdvisorPanel: authenticated panel screenshots for visual PLAYER_VERDICT
#
# Verdict interpretation:
#   PASS     = all authenticated surfaces exercised without error
#   FAIL     = at least one surface errored, or auth was unavailable (INCONCLUSIVE)
#
# Triggered by:
#   - workflow_call: from deploy-spa.yml (environment: staging) post-deploy
#   - workflow_dispatch: manual trigger for ad-hoc re-runs

on:
  workflow_call:
    inputs:
      staging_spa_url:
        description: 'Staging SPA URL (e.g. https://stg-app.hollowmark.app)'
        required: false
        type: string
        default: 'https://stg-app.hollowmark.app'
      staging_api_url:
        description: 'Staging BFF URL (e.g. https://staging-api.hollowmark.app)'
        required: false
        type: string
        default: 'https://staging-api.hollowmark.app'

  workflow_dispatch:
    inputs:
      staging_spa_url:
        description: 'Staging SPA URL'
        required: false
        type: string
        default: 'https://stg-app.hollowmark.app'
      staging_api_url:
        description: 'Staging BFF URL'
        required: false
        type: string
        default: 'https://staging-api.hollowmark.app'

permissions:
  contents: read

jobs:
  staging-auth-smoke:
    name: Staging Authenticated E2E Smoke
    runs-on: ubuntu-latest
    # Playwright container: Chromium + all system deps pre-installed.
    # Matches the container used in ci.yml frontend-e2e (tag = @playwright/test version).
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    environment: staging
    # 20 min: SPA routes (17 × ~20s) + wildcard panel screenshots + BFF smoke.
    timeout-minutes: 20

    steps:
      - name: Checkout vault-mtg
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── SPA authenticated smoke ────────────────────────────────────────────
      # Exercises every protected SPA route via Clerk testing token injection.
      # If CLERK_STAGING_SECRET_KEY is absent or invalid, this step FAILS — not skips.
      - name: Run SPA authenticated smoke (staging-spa-smoke.spec.ts)
        working-directory: frontend
        run: npx playwright test --config=playwright.staging-spa.config.ts
        env:
          CI: true
          STAGING_SPA_URL: ${{ inputs.staging_spa_url }}
          # CLERK_SECRET_KEY (sk_live_*) is stored as the CLERK_STAGING_SECRET_KEY
          # GitHub Actions secret (provisioned from SSM /vaultmtg/app/staging/CLERK_SECRET_KEY).
          # GHA secrets propagate into container steps (unlike OIDC env vars).
          CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}
          # CLERK_FAPI_URL: Hollowmark staging Clerk instance FAPI base URL.
          # Updated from clerk.stg-app.vaultmtg.app during Hollowmark staging cutover.
          CLERK_FAPI_URL: https://clerk.stg-app.hollowmark.app

      # ── BFF API authenticated smoke ───────────────────────────────────────
      # Exercises auth-gated BFF endpoints (matches, SSE) with a pre-issued token.
      # If STAGING_SMOKE_TOKEN is absent, this step FAILS — not skips.
      - name: Run BFF API authenticated smoke (staging-smoke.spec.ts)
        working-directory: frontend
        run: npx playwright test --config=playwright.staging.config.ts
        env:
          CI: true
          STAGING_API_URL: ${{ inputs.staging_api_url }}
          STAGING_SMOKE_TOKEN: ${{ secrets.STAGING_SMOKE_TOKEN }}

      # ── WildcardAdvisorPanel visual screenshot capture ───────────────────
      # Captures authenticated screenshots of the WildcardAdvisorPanel for
      # Prof's visual PLAYER_VERDICT (#421/#424). Uses the same Clerk session
      # as the SPA smoke suite above. Runs with continue-on-error so a smoke
      # failure doesn't block screenshot capture.
      - name: Create screenshot output directory
        if: always()
        run: mkdir -p /tmp/wildcard-panel-screenshots

      - name: Capture WildcardAdvisorPanel screenshots (wildcard-panel-visual-424.spec.ts)
        if: always()
        working-directory: frontend
        continue-on-error: true
        run: |
          npx playwright test \
            tests/e2e/staging/wildcard-panel-visual-424.spec.ts \
            --config=playwright.staging-spa.config.ts \
            --reporter=list
        env:
          CI: true
          # TODO(#1068): switch back to stg-app.hollowmark.app once staging host is provisioned
          STAGING_SPA_URL: ${{ inputs.staging_spa_url || 'https://stg-app.vaultmtg.app' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}
          CLERK_FAPI_URL: https://clerk.stg-app.hollowmark.app
          SCREENSHOT_DIR: /tmp/wildcard-panel-screenshots
          CI_SMOKE_USER_ID: user_3EmtmrSgZrtd0yRRdisTIIFYnnF

      - name: Upload WildcardAdvisorPanel screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wildcard-panel-staging-screenshots
          path: /tmp/wildcard-panel-screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-auth-smoke-report
          path: |
            frontend/playwright-report-staging-spa/
            frontend/playwright-report-staging/
          retention-days: 7
