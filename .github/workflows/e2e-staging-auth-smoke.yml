name: E2E Staging Auth Smoke (vmt-t#678)

# Runs the authenticated staging smoke suites after every successful staging
# SPA deploy. Exercises every auth-gated SPA surface and BFF API endpoint using
# a real Clerk session minted from the staging CLERK_SECRET_KEY in SSM.
#
# Auth-enforcement contract (vmt-t#678):
#   - CLERK_SECRET_KEY is read directly from SSM (path /vaultmtg/staging/CLERK_SECRET_KEY,
#     SecureString). The secret is masked immediately and never echoed to logs.
#   - If CLERK_SECRET_KEY is absent the suite FAILs with INCONCLUSIVE — it does
#     NOT skip and report PASS. A smoke that skips all authenticated surfaces is
#     worse than no test (2026-06-02 false-PASS incident).
#   - STAGING_SMOKE_TOKEN is a pre-issued static BFF JWT for the BFF API smoke.
#     Also sourced from SSM; its absence produces the same hard failure.
#
# Architecture note: two jobs are required because configure-aws-credentials
# (OIDC) sets env vars on the runner host but they do NOT propagate into
# container steps. The fetch-secrets job runs on ubuntu-latest (no container)
# and passes masked secrets as job outputs to the container-based e2e job.
#
# Surfaces exercised (authenticated):
#   SPA: /home, /match-history, /quests, /draft, /draft-analytics, /decks,
#        /collection, /meta, /charts/*, /settings, /history/drafts, /draft/live,
#        /api-keys
#   BFF: GET /api/v1/matches, GET /api/v1/events (SSE), GET /healthz
#   WildcardAdvisorPanel: authenticated panel screenshots for visual PLAYER_VERDICT
#
# Verdict interpretation:
#   PASS     = all authenticated surfaces exercised without error
#   FAIL     = at least one surface errored, or auth was unavailable (INCONCLUSIVE)
#
# Triggered by:
#   - workflow_call: from deploy-spa-staging.yml post-deploy
#   - workflow_dispatch: manual trigger for ad-hoc re-runs

on:
  workflow_call:
    inputs:
      staging_spa_url:
        description: 'Staging SPA URL (e.g. https://stg-app.vaultmtg.app)'
        required: false
        type: string
        default: 'https://stg-app.vaultmtg.app'
      staging_api_url:
        description: 'Staging BFF URL (e.g. https://staging-api.vaultmtg.app)'
        required: false
        type: string
        default: 'https://staging-api.vaultmtg.app'

  workflow_dispatch:
    inputs:
      staging_spa_url:
        description: 'Staging SPA URL'
        required: false
        type: string
        default: 'https://stg-app.vaultmtg.app'
      staging_api_url:
        description: 'Staging BFF URL'
        required: false
        type: string
        default: 'https://staging-api.vaultmtg.app'

permissions:
  contents: read
  id-token: write

jobs:
  # ── Job 1: Fetch SSM secrets (non-container — OIDC only works on runner host)
  fetch-secrets:
    name: Fetch staging secrets from SSM
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      clerk_secret_key: ${{ steps.ssm.outputs.clerk_secret_key }}
      staging_smoke_token: ${{ steps.ssm.outputs.staging_smoke_token }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Read SSM secrets
        id: ssm
        run: |
          CLERK_SECRET_KEY=$(aws ssm get-parameter \
            --name /vaultmtg/staging/CLERK_SECRET_KEY \
            --with-decryption \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          STAGING_SMOKE_TOKEN=$(aws ssm get-parameter \
            --name /vaultmtg/staging/ci-smoke-token \
            --with-decryption \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          # Mask both values immediately so they never appear in log output.
          echo "::add-mask::${CLERK_SECRET_KEY}"
          echo "::add-mask::${STAGING_SMOKE_TOKEN}"
          echo "clerk_secret_key=${CLERK_SECRET_KEY}" >> "$GITHUB_OUTPUT"
          echo "staging_smoke_token=${STAGING_SMOKE_TOKEN}" >> "$GITHUB_OUTPUT"

  # ── Job 2: E2E tests (Playwright container — Chromium pre-installed)
  staging-auth-smoke:
    name: Staging Authenticated E2E Smoke
    needs: fetch-secrets
    runs-on: ubuntu-latest
    # Playwright container: Chromium + all system deps pre-installed.
    # No cdn.playwright.dev download needed — eliminates the browser-install
    # timeout that cancelled the ubuntu-latest runner approach.
    # Tag must match @playwright/test version (1.56.1).
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    # 20 min: SPA routes (17 × ~20s) + wildcard panel screenshots + BFF smoke.
    timeout-minutes: 20

    steps:
      - name: Checkout vault-mtg
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── SPA authenticated smoke ────────────────────────────────────────────
      # Exercises every protected SPA route via Clerk testing token injection.
      # If CLERK_SECRET_KEY is absent or invalid, this step FAILS — not skips.
      - name: Run SPA authenticated smoke (staging-spa-smoke.spec.ts)
        working-directory: frontend
        run: npx playwright test --config=playwright.staging-spa.config.ts
        env:
          CI: true
          STAGING_SPA_URL: ${{ inputs.staging_spa_url }}
          # CLERK_SECRET_KEY is injected from SSM via fetch-secrets job.
          # The spec uses this to call Clerk's Backend API sign_in_tokens endpoint
          # and inject the token into the browser (not via FAPI, which is bot-protected).
          CLERK_SECRET_KEY: ${{ needs.fetch-secrets.outputs.clerk_secret_key }}

      # ── BFF API authenticated smoke ───────────────────────────────────────
      # Exercises auth-gated BFF endpoints (matches, SSE) with a pre-issued token.
      # If STAGING_SMOKE_TOKEN is absent, this step FAILS — not skips.
      - name: Run BFF API authenticated smoke (staging-smoke.spec.ts)
        working-directory: frontend
        run: npx playwright test --config=playwright.staging.config.ts
        env:
          CI: true
          STAGING_API_URL: ${{ inputs.staging_api_url }}
          # STAGING_SMOKE_TOKEN is injected from SSM via fetch-secrets job.
          STAGING_SMOKE_TOKEN: ${{ needs.fetch-secrets.outputs.staging_smoke_token }}

      # ── WildcardAdvisorPanel visual screenshot capture ───────────────────
      # Captures authenticated screenshots of the WildcardAdvisorPanel for
      # Prof's visual PLAYER_VERDICT (#421/#424). Uses the same Clerk session
      # as the SPA smoke suite above. Runs after the smoke tests so a smoke
      # failure doesn't block screenshot capture (continue-on-error: true).
      - name: Create screenshot output directory
        run: mkdir -p /tmp/wildcard-panel-screenshots

      - name: Capture WildcardAdvisorPanel screenshots (wildcard-panel-visual-424.spec.ts)
        working-directory: frontend
        continue-on-error: true
        run: |
          npx playwright test \
            tests/e2e/staging/wildcard-panel-visual-424.spec.ts \
            --config=playwright.staging-spa.config.ts \
            --reporter=list
        env:
          CI: true
          STAGING_SPA_URL: ${{ inputs.staging_spa_url || 'https://stg-app.vaultmtg.app' }}
          CLERK_SECRET_KEY: ${{ needs.fetch-secrets.outputs.clerk_secret_key }}
          SCREENSHOT_DIR: /tmp/wildcard-panel-screenshots
          CI_SMOKE_USER_ID: user_3EamRFdUZdQl1yYPf4Yg7OIQqm4

      - name: Upload WildcardAdvisorPanel screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wildcard-panel-staging-screenshots
          path: /tmp/wildcard-panel-screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-auth-smoke-report
          path: |
            frontend/playwright-report-staging-spa/
            frontend/playwright-report-staging/
          retention-days: 7
