name: Release

on:
  # Fires only for app/v* tags pushed directly (e.g. app/v0.3.1).
  # daemon/v* tags are handled exclusively by daemon-release.yml.
  push:
    tags:
      - 'app/v*'

  # Allow other workflows to call this as a reusable workflow
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. app/v1.0.0)'
        required: true
        type: string
      prerelease:
        required: false
        default: 'false'
        type: string
      skip_e2e:
        required: false
        default: 'false'
        type: string

  # Manual prod deploy without cutting a new release tag.
  # Use case: re-deploy the current prod SHA to refresh the on-instance env file
  # after a deploy-script change has landed on main but no new app/v* tag is due
  # (e.g. PR #2540 — provision-db-url.sh shape change). The GitHub Release
  # creation step is skipped on this path; deploy-bff + deploy-spa still run
  # so the SSM-driven env file gets re-rendered and the SPA bundle is refreshed.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref/SHA to deploy (branch, tag, or full SHA). Defaults to current main.'
        required: false
        default: 'main'
        type: string
      prerelease:
        description: 'Treat as a pre-release (unused on workflow_dispatch — release step is skipped).'
        required: false
        default: false
        type: boolean
      skip_e2e:
        description: 'Skip the E2E smoke gate (emergency hotfix bypass).'
        required: false
        default: false
        type: boolean

env:
  # For push: tags events, github.ref_name is the pushed tag (e.g. app/v0.3.1).
  # For workflow_call, the tag comes from the explicit input.
  # For workflow_dispatch, there is no tag — set a synthetic value (unused;
  # the GitHub Release creation job is skipped on this trigger).
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || (github.event_name == 'workflow_call' && inputs.tag) || format('manual-{0}', github.sha) }}
  # Prerelease detection: treat tags containing "-rc", "-alpha", or "-beta" as pre-releases.
  # For workflow_call the caller supplies this explicitly as a string.
  # For workflow_dispatch the input is a boolean (unused — release step is skipped).
  IS_PRERELEASE: ${{ github.event_name == 'push' && (contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta')) || (github.event_name == 'workflow_call' && inputs.prerelease == 'true') || (github.event_name == 'workflow_dispatch' && inputs.prerelease) || false }}
  # E2E skip is meaningful for workflow_call (emergency hotfix flag) and
  # workflow_dispatch (manual re-deploy bypass). For push: tags events, E2E always runs.
  SKIP_E2E: ${{ (github.event_name == 'workflow_call' && inputs.skip_e2e == 'true') || (github.event_name == 'workflow_dispatch' && inputs.skip_e2e) || false }}

permissions:
  contents: write
  id-token: write  # required for OIDC-based AWS auth in deploy job

# ---------------------------------------------------------------------------
# Tier 3 — E2E smoke gate before release (release workflow only)
# Tier 2 — Integration gate after E2E smoke, before release artifact
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the deploy SHA up front so every downstream job sees the same value.
  # ---------------------------------------------------------------------------
  # For push: tags and workflow_call, github.sha is already the correct commit
  # (tag SHA or caller SHA). For workflow_dispatch, inputs.ref may point at a
  # branch/tag/SHA distinct from the workflow source ref, so we resolve it here
  # via a lightweight checkout + git rev-parse.
  resolve-ref:
    name: Resolve Deploy SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      # Strip the "app/v" prefix from the release tag to produce a bare semver
      # string (e.g. "0.3.3") for injection into the binary via -ldflags.
      # On workflow_dispatch (manual re-deploy, no new tag) the RELEASE_TAG env
      # var resolves to "manual-<sha>", so the stripped value is also non-"dev"
      # and clearly identifiable in Sentry. The deploy job passes this as the
      # `version` input to deploy-bff.yml, which threads it to build-bff.
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 1
      - name: Resolve SHA
        id: resolve
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Resolved deploy SHA: ${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          # Derive the version string from the release tag by stripping the "app/v" prefix.
          # RELEASE_TAG is set at the workflow level (e.g. "app/v0.3.3" or "manual-<sha>").
          RAW_TAG="${{ env.RELEASE_TAG }}"
          VERSION="${RAW_TAG#app/v}"
          echo "Resolved version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Pre-flight checks — must pass before any release gates run.
  # ---------------------------------------------------------------------------

  # Verify that the staging environment is healthy before cutting a release.
  # Prevents releasing to production against a broken staging baseline.
  staging-health-gate:
    name: Verify Staging Health Before Release
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check staging /healthz via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://127.0.0.1:8081/healthz && echo staging-healthz-ok"]' \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)

          SUCCEEDED=0
          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/12] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Staging healthy."
              SUCCEEDED=1
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Staging health check failed: $STATUS" >&2
              echo "Run the Staging Deploy workflow against main before releasing." >&2
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region us-east-1 \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done
          if [ "$SUCCEEDED" -ne 1 ]; then
            echo "Staging health check timed out." >&2
            exit 1
          fi

  # Verify all required SSM parameters exist in production before releasing.
  # Prevents a deploy from silently failing due to a missing secret.
  secrets-inventory:
    name: Verify Production Secrets Inventory
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Assert required SSM parameters exist
        run: |
          MISSING=0
          for param in \
            /vaultmtg/prod/sentry-auth-token \
            /vaultmtg/app/production/sentry-dsn-bff \
            /vaultmtg/app/production/sentry-dsn-spa \
            /vaultmtg/app/production/CLERK_SECRET_KEY \
            /vaultmtg/app/production/db-secret-arn \
            /vaultmtg/app/production/db-endpoint \
            /vaultmtg/app/production/db-name \
            /vaultmtg/app/production/posthog-api-key \
            /vaultmtg/app/production/posthog-host \
            /vaultmtg/production/spa-bucket-name \
            /vaultmtg/production/spa-distribution-id; do
            aws ssm get-parameter --name "$param" --region us-east-1 \
              --query Parameter.Name --output text > /dev/null 2>&1 \
              || { echo "MISSING: $param"; MISSING=1; }
          done
          [ "$MISSING" -eq 0 ] || exit 1

  # ---------------------------------------------------------------------------
  # Release gates — run after pre-flight checks pass.
  # ---------------------------------------------------------------------------

  # Run E2E smoke tests before cutting the release artifact.
  # Skippable via input for emergency hotfix releases only.
  # Note: env context is not available in job-level if conditions; skip
  # logic is expressed directly using github and inputs contexts.
  # For push: tags events, E2E always runs (no [noe2e] mechanism; use workflow_call
  # with skip_e2e=true for emergency hotfix bypasses instead).
  e2e-smoke-gate:
    name: E2E Smoke Gate
    needs: [staging-health-gate, secrets-inventory]
    uses: ./.github/workflows/e2e-smoke.yml
    # Skip when the caller explicitly opts out:
    #   workflow_call: inputs.skip_e2e is a string 'true'
    #   workflow_dispatch: inputs.skip_e2e is a boolean true
    #   push: tags: inputs.skip_e2e is unset → always runs
    if: |
      !((github.event_name == 'workflow_call' && inputs.skip_e2e == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.skip_e2e))

  # Run BFF integration tests after E2E smoke passes.
  # Blocks the release if any integration test fails.
  integration-gate:
    name: Integration Gate
    needs: [e2e-smoke-gate]
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped')
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # PC-13 pre-cut triage gate (ADR-089 / #1144)
  #
  # Asserts that a PC-13 triage manifest exists at .release/pc13/app/<version>.yml
  # for the cut SHA, carries a PASS verdict, and contains a row for every commit
  # in the prev_tag..cut_sha range that touches the app component paths.
  #
  # Guard: runs ONLY on push: tags 'app/v*' (a real cut). Skips on:
  #   - workflow_dispatch  (re-deploy of an existing commit — not a cut)
  #   - workflow_call      (staging deploy — not a cut)
  #
  # App component paths (sourced from ci.yml detect-changes 'bff' + 'frontend' filters):
  #   frontend/
  #   services/bff/
  #   services/bff/internal/storage/migrations/   (subset of services/bff/ — explicit for clarity)
  #
  # RULE-INFRA-01 (ADR-075 / ADR-089 §4): ships continue-on-error: true for the first cut.
  # A follow-up PR flips it to false (hard-fail) after the manifest format shakes out.
  # ---------------------------------------------------------------------------
  pc13-gate:
    name: PC-13 Pre-Cut Triage Gate (app)
    runs-on: ubuntu-latest
    # Skip on workflow_dispatch (re-deploy, not a cut) and workflow_call (staging).
    # Only runs on push: tags app/v* — a real release cut.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/app/v')
    # RULE-INFRA-01: continue-on-error=true for first cycle; flip to false in follow-up PR.
    continue-on-error: true
    steps:
      - name: Checkout at cut SHA (full history required for git log range)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Resolve VERSION and manifest path
        id: resolve
        run: |
          set -euo pipefail
          # Strip 'app/v' prefix from the tag to produce the bare semver (e.g. '0.4.3.3').
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#app/v}"
          MANIFEST_PATH=".release/pc13/app/${VERSION}.yml"
          {
            echo "version=${VERSION}"
            echo "manifest_path=${MANIFEST_PATH}"
            echo "cut_sha=${{ github.sha }}"
          } >> "$GITHUB_OUTPUT"
          echo "PC-13 gate: tag=${RAW_TAG} version=${VERSION} manifest=${MANIFEST_PATH}"

      - name: Assert manifest exists
        id: manifest_exists
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ steps.resolve.outputs.manifest_path }}"
          if [[ ! -f "${MANIFEST_PATH}" ]]; then
            echo "ERROR: PC-13 manifest missing at ${MANIFEST_PATH}" >&2
            echo "" >&2
            echo "Najah must commit the triage manifest at the cut SHA before this tag" >&2
            echo "ships (ADR-089 / #1144). The manifest must be present at:" >&2
            echo "  ${MANIFEST_PATH}" >&2
            echo "" >&2
            echo "See: ADR-089 §A for the manifest schema." >&2
            exit 1
          fi
          echo "PASS: manifest found at ${MANIFEST_PATH}"
          cat "${MANIFEST_PATH}"

      - name: Assert verdict is PASS
        id: check_verdict
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ steps.resolve.outputs.manifest_path }}"
          # Extract 'verdict:' value from YAML using Python (available on ubuntu-latest).
          VERDICT=$(python3 -c "
          import yaml, sys
          with open('${MANIFEST_PATH}') as f:
              doc = yaml.safe_load(f)
          verdict = doc.get('verdict', '')
          print(verdict)
          ")
          echo "Manifest verdict: ${VERDICT}"
          if [[ "${VERDICT}" != "PASS" ]]; then
            echo "ERROR: PC-13 manifest verdict is '${VERDICT}', not PASS." >&2
            echo "The cut is blocked until Najah updates the manifest to PASS." >&2
            echo "See the manifest at ${{ steps.resolve.outputs.manifest_path }} for details." >&2
            exit 1
          fi
          echo "PASS: verdict is PASS"

      - name: Verify prev_tag matches git describe
        id: check_prev_tag
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ steps.resolve.outputs.manifest_path }}"
          CUT_SHA="${{ steps.resolve.outputs.cut_sha }}"
          # Read prev_tag from manifest.
          MANIFEST_PREV_TAG=$(python3 -c "
          import yaml, sys
          with open('${MANIFEST_PATH}') as f:
              doc = yaml.safe_load(f)
          print(doc.get('prev_tag', ''))
          ")
          echo "Manifest prev_tag: ${MANIFEST_PREV_TAG}"
          # Verify prev_tag against git describe to prevent a forged-low prev_tag
          # that would shrink the commit range and hide unreviewed commits.
          GIT_PREV_TAG=$(git describe --tags --match 'app/v*' --abbrev=0 "${CUT_SHA}^" 2>/dev/null || echo "")
          echo "Git-derived prev_tag: ${GIT_PREV_TAG}"
          if [[ -z "${MANIFEST_PREV_TAG}" ]]; then
            echo "ERROR: manifest prev_tag is empty." >&2
            exit 1
          fi
          if [[ "${MANIFEST_PREV_TAG}" != "${GIT_PREV_TAG}" ]]; then
            echo "ERROR: manifest prev_tag '${MANIFEST_PREV_TAG}' does not match" >&2
            echo "git describe result '${GIT_PREV_TAG}'." >&2
            echo "A forged-low prev_tag would shrink the commit range — fix the manifest." >&2
            exit 1
          fi
          echo "prev_tag=${MANIFEST_PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "PASS: prev_tag '${MANIFEST_PREV_TAG}' verified against git describe"

      - name: Compute in-range commit set and assert coverage
        run: |
          set -euo pipefail
          MANIFEST_PATH="${{ steps.resolve.outputs.manifest_path }}"
          CUT_SHA="${{ steps.resolve.outputs.cut_sha }}"
          PREV_TAG="${{ steps.check_prev_tag.outputs.prev_tag }}"

          # App component paths — sourced from ci.yml detect-changes 'bff' + 'frontend' filters.
          # services/bff/internal/storage/migrations/ is a subset of services/bff/ but listed
          # explicitly for spec clarity (ADR-089 §B step 5).
          APP_PATHS=(
            "frontend/"
            "services/bff/"
            "services/bff/internal/storage/migrations/"
          )

          echo "Computing commits in range: ${PREV_TAG}..${CUT_SHA} touching app paths"
          printf '  path: %s\n' "${APP_PATHS[@]}"

          # Collect all commits in range touching app paths.
          IN_RANGE_COMMITS=$(git log \
            --format="%H" \
            "${PREV_TAG}..${CUT_SHA}" \
            -- "${APP_PATHS[@]}" \
            2>/dev/null || true)

          if [[ -z "${IN_RANGE_COMMITS}" ]]; then
            echo "INFO: No commits in range ${PREV_TAG}..${CUT_SHA} touch app paths."
            echo "PASS: empty cohort — nothing to verify."
            exit 0
          fi

          echo "In-range commits touching app paths:"
          echo "${IN_RANGE_COMMITS}"

          # Read manifest commit SHAs.
          MANIFEST_SHAS=$(python3 -c "
          import yaml, sys
          with open('${MANIFEST_PATH}') as f:
              doc = yaml.safe_load(f)
          commits = doc.get('commits', []) or []
          for c in commits:
              sha = c.get('sha', '')
              if sha:
                  # Support both full and short SHAs in manifest (match by prefix).
                  print(sha)
          ")

          MISSING=""
          while IFS= read -r commit_sha; do
            [[ -z "${commit_sha}" ]] && continue
            # Match: in-range commit SHA starts with or equals a manifest SHA entry.
            FOUND=0
            while IFS= read -r manifest_sha; do
              [[ -z "${manifest_sha}" ]] && continue
              # Match full SHA or short-SHA prefix (manifest may use 8-char short SHAs).
              if [[ "${commit_sha}" == "${manifest_sha}"* || "${manifest_sha}" == "${commit_sha}"* ]]; then
                FOUND=1
                break
              fi
            done <<< "${MANIFEST_SHAS}"
            if [[ "${FOUND}" -eq 0 ]]; then
              MISSING="${MISSING}  ${commit_sha}\n"
            fi
          done <<< "${IN_RANGE_COMMITS}"

          if [[ -n "${MISSING}" ]]; then
            echo "ERROR: The following in-range commits are missing from the PC-13 manifest:" >&2
            printf '%s' "${MISSING}" >&2
            echo "" >&2
            echo "Each commit touching app paths (frontend/, services/bff/) must have a row" >&2
            echo "in the manifest commits[] list (ADR-089 / #1144)." >&2
            echo "Najah must update the manifest before this tag ships." >&2
            exit 1
          fi

          echo "PASS: all in-range commits are covered in the PC-13 manifest."

  release:
    needs: [resolve-ref, e2e-smoke-gate, integration-gate, pc13-gate]
    # Run if smoke passed (or skipped), integration tests passed, AND the PC-13 gate passed.
    # Skip entirely for workflow_dispatch — that path re-deploys an existing
    # commit and must not create a duplicate GitHub Release for it.
    #
    # CRITICAL (ADR-089 Correction 2 / Lee G4 F2): this job uses always(), so the
    # pc13-gate check MUST be in this if-clause — adding it only to needs: above is
    # insufficient. With always(), needs outcomes do not block job evaluation; only
    # an explicit if-clause check prevents the job from running on gate failure.
    if: |
      always() &&
      github.event_name != 'workflow_dispatch' &&
      (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped') &&
      needs.integration-gate.result == 'success' &&
      needs.pc13-gate.result == 'success'
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.resolve-ref.outputs.sha }}
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    # Legacy `cmd/mtga-companion` (Wails-era desktop monolith) was
    # removed in PR #19. The replacement daemon ships via
    # daemon-release.yml as vaultmtg-daemon-<os>-<arch> (ADR-022 Phase 6
    # cutover #1764 removed the legacy mtga-companion-daemon-* dual-naming);
    # the BFF ships from this same workflow further below. Nothing else gets
    # built into a tagged GitHub Release from this top-level step.

    - name: Generate changelog
      run: |
        echo "## What's Changed" > changelog.md
        PREV_TAG="$(git describe --tags --abbrev=0 --match 'app/v*' HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
        git log "${PREV_TAG}..HEAD" --pretty=format:"* %s (%h)" >> changelog.md || echo "* Initial release" >> changelog.md
        echo "" >> changelog.md
        COMPARE_BASE="$(git describe --tags --abbrev=0 --match 'app/v*' HEAD^ 2>/dev/null || echo 'v0.0.0')"
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${COMPARE_BASE}...${{ env.RELEASE_TAG }}" >> changelog.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        # No binaries attached at this level — daemon binaries ship via
        # daemon-release.yml on `daemon/v*` tags; BFF deploys directly to
        # EC2 in the `deploy` job below.
        body_path: changelog.md
        draft: false
        prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        generate_release_notes: true
        # Never let an app release become the repo's "latest" release.
        # The production daemon download (frontend/src/components/DaemonDownload.tsx:11)
        # resolves binaries via releases/latest/download/... — if an app release
        # (which has no binary assets) claimed "latest", that URL would 404.
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Delegates to the shared deploy-bff reusable workflow.
  # Production deploy uses the exact same job graph as staging (run via staging-deploy.yml
  # on every push to main). Any defect in the deploy path surfaces in staging first.
  # DEPLOY_BUCKET is passed as a secret because workflow inputs cannot reference secrets.
  #
  # Trigger paths:
  #   push: tags / workflow_call → release job creates the GH Release first, then deploy runs.
  #   workflow_dispatch          → release job is skipped; deploy runs after integration-gate.
  deploy:
    name: Deploy BFF to EC2
    needs: [resolve-ref, release, integration-gate]
    if: |
      always() &&
      needs.resolve-ref.result == 'success' &&
      needs.integration-gate.result == 'success' &&
      (needs.release.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && needs.release.result == 'skipped'))
    uses: ./.github/workflows/deploy-bff.yml
    with:
      environment: production
      s3-binary-key-suffix: releases/${{ needs.resolve-ref.outputs.sha }}/mtga-bff
      binary-name: mtga-bff
      deploy-sha: ${{ needs.resolve-ref.outputs.sha }}
      # Pass the semver string derived from the app/v* tag (e.g. "0.3.3") so the
      # compiled binary carries the real release version rather than "dev".
      # resolve-ref strips the "app/v" prefix and writes it to outputs.version.
      version: ${{ needs.resolve-ref.outputs.version }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      DEPLOY_BUCKET: ${{ secrets.DEPLOY_BUCKET }}

  deploy-spa:
    name: Deploy SPA
    needs: [resolve-ref, release, integration-gate]
    if: |
      always() &&
      needs.resolve-ref.result == 'success' &&
      needs.integration-gate.result == 'success' &&
      (needs.release.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && needs.release.result == 'skipped'))
    uses: ./.github/workflows/deploy-spa.yml
    with:
      environment: production
      ref: ${{ needs.resolve-ref.outputs.sha }}
      # Pass the bare semver version string (e.g. "0.4.2") already resolved by resolve-ref,
      # so deploy-spa.yml can set VITE_APP_VERSION directly without relying on git describe
      # (which fails on shallow SHA checkouts where tag refs are not fetched).
      # On workflow_dispatch the resolve-ref job produces "manual-<sha>" (the RELEASE_TAG with
      # "app/v" stripped is a no-op), giving deploy-spa a sane non-empty fallback.
      app_version: ${{ needs.resolve-ref.outputs.version }}
    secrets: inherit
