name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Tier 1 — Fast jobs (run on every PR, path-filtered per module)
# ---------------------------------------------------------------------------

jobs:
  gowork-replace-lint:
    name: Lint — go.work must not contain replace directives
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fail if go.work contains a replace directive
        run: |
          # Hard-fail: replace directives in go.work are forbidden on main.
          # The TEMPORARY-HOLLOWMARK-TRANSITION exemption was removed in #997
          # after pkg/draftalgo/v0.1.3, pkg/logparse/v0.1.5, and
          # services/contract/v0.1.6 were published (ADR-023 Amendment V, D-V4).
          if grep -qE '^\s*replace\b' go.work 2>/dev/null; then
            echo "ERROR: go.work contains a 'replace' directive."
            echo "Local replace directives must not be committed to main."
            echo "Offending replace line(s):"
            grep -E '^\s*replace\b' go.work
            exit 1
          fi
          echo "go.work is clean — no replace directives found."

  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go (for actionlint install)
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Cache actionlint binary
        id: cache-actionlint
        uses: actions/cache@v5
        with:
          path: ~/go/bin/actionlint
          key: actionlint-${{ runner.os }}-latest

      - name: Install actionlint
        if: steps.cache-actionlint.outputs.cache-hit != 'true'
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint

  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      bff: ${{ steps.filter.outputs.bff }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sync: ${{ steps.filter.outputs.sync }}
      meta_scrape: ${{ steps.filter.outputs.meta_scrape }}
      logparse: ${{ steps.filter.outputs.logparse }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Path filter
      id: filter
      uses: dorny/paths-filter@v4
      with:
        filters: |
          bff:
            - 'services/bff/**'
            - 'services/contract/**'
            - '.github/workflows/ci.yml'
            - '.github/actions/build-bff/**'
          frontend:
            - 'frontend/**'
            - '.github/workflows/ci.yml'
          sync:
            - 'services/sync/**'
            - '.github/workflows/ci.yml'
          meta_scrape:
            - 'services/meta-scrape/**'
            - '.github/workflows/ci.yml'
          logparse:
            - 'pkg/logparse/**'
            - '.github/workflows/ci.yml'

  # -------------------------------------------------------------------------
  # Continuous release-build validation (post-mortem A6 / #2175, AC2).
  #
  # Runs the exact release-build invocation (GOOS=linux GOARCH=amd64) on
  # every push/PR to main via the shared build-bff composite action — not
  # just at release time.  This makes a broken release build visible the
  # same day it is introduced rather than at the next release tag.
  #
  # Not path-filtered: the release build must be green regardless of which
  # file changed; the BFF could be broken by a go.work change, a contract
  # bump, or a dependency upgrade that only manifests on linux/amd64.
  # -------------------------------------------------------------------------
  bff-release-build:
    name: BFF Release Build (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Build BFF for linux/amd64 (release target)
      uses: ./.github/actions/build-bff
      with:
        goos: linux
        goarch: amd64
        output-path: bin/mtga-bff

  bff-unit-tests:
    name: BFF Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run BFF unit tests
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./services/bff/coverage.out
        flags: bff-unit
        fail_ci_if_error: false

  frontend-component-tests:
    name: Frontend Component Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript type check
      run: |
        cd frontend
        npx tsc --noEmit

    # stylelint color-no-hex is now a hard-fail (#340): the SPA token migration is
    # complete (#309 Pass B + #339 + #320). Categorical hex values (MTG mana pips,
    # data-viz series) are suppressed via inline disable comments in the CSS files;
    # the noRawHex.test.ts CATEGORICAL_HEX list is the canonical source of truth for
    # what is allowed. Any new raw hex introduced here will fail CI.
    - name: Stylelint (color-no-hex hard-fail)
      run: |
        cd frontend
        npm run lint:css

    - name: Run component tests
      env:
        # Belt-and-suspenders heap ceiling. The primary OOM fix is pool:forks in
        # vite.config.ts (isolates heap per file). This cap handles future suite
        # growth until the runner is upgraded. ubuntu-latest runners have 7 GB
        # RAM; 6144 MB leaves 1 GB for OS + Node overhead.
        NODE_OPTIONS: '--max-old-space-size=6144'
      run: |
        cd frontend
        npm run test:run

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        fail_ci_if_error: false

  go-lint:
    name: Go Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true' || needs.detect-changes.outputs.logparse == 'true' || needs.detect-changes.outputs.meta_scrape == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: |
          services/bff/go.sum
          services/daemon/go.sum
          services/sync/go.sum
          services/meta-scrape/go.sum
          services/contract/go.sum
          pkg/logparse/go.sum

    # Node + frontend deps are required for the TypeScript taxonomy staleness
    # check below (gen-analytics-taxonomy.ts requires js-yaml from
    # frontend/node_modules). Mirror the setup from frontend-component-tests.
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix frontend

    - name: go vet — all modules
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: |
        for mod in services/bff services/sync services/meta-scrape services/contract pkg/logparse; do
          echo "=== go vet $mod ==="
          (cd "$mod" && go vet ./...)
        done

    - name: Cache gofumpt binary
      id: cache-gofumpt
      uses: actions/cache@v5
      with:
        path: ~/go/bin/gofumpt
        key: gofumpt-${{ runner.os }}-latest

    - name: Install gofumpt
      if: steps.cache-gofumpt.outputs.cache-hit != 'true'
      run: go install mvdan.cc/gofumpt@latest

    - name: gofumpt check — all modules
      run: |
        OUT=$(gofumpt -l services/bff services/sync services/meta-scrape services/contract pkg/logparse)
        if [ -n "$OUT" ]; then
          echo "gofumpt formatting violations:"
          echo "$OUT"
          exit 1
        fi
        echo "gofumpt clean."

    # RULE-INFRA-01: promoted to hard-fail (#1176 — #1597 stable on main).
    # The diff strips the "// Generated: YYYY-MM-DD" comment header (line 3 in
    # both generated files) so a date-only difference does not trigger a false
    # stale detection.  Only content changes (new/removed events or properties)
    # will fail this check.
    - name: Taxonomy staleness check
      env:
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: |
        echo "=== Checking Go taxonomy ==="
        go run scripts/gen-analytics-taxonomy.go --stdout \
          | grep -v "^// Generated:" \
          | diff - <(grep -v "^// Generated:" services/bff/internal/analytics/taxonomy.gen.go) \
          || (echo "taxonomy.gen.go is stale — run: make gen-taxonomy" && exit 1)
        echo "=== Checking TypeScript taxonomy ==="
        if command -v npx >/dev/null 2>&1; then
          npx tsx scripts/gen-analytics-taxonomy.ts --stdout \
            | grep -v "^// Generated:" \
            | diff - <(grep -v "^// Generated:" frontend/src/services/analytics-taxonomy.gen.ts) \
            || (echo "analytics-taxonomy.gen.ts is stale — run: make gen-taxonomy" && exit 1)
        else
          echo "npx not available, skipping TypeScript taxonomy check"
        fi
        echo "Taxonomy files are up-to-date."

    # Zero-direct-posthog-calls guard: enforces the analytics seam contract by
    # failing if any Go file in services/bff calls posthog.Enqueue directly
    # (bypassing analytics.Client). RULE-INFRA-01: promoted to hard-fail (#1176
    # — zero violations confirmed on main before flip).
    - name: Zero direct posthog.Enqueue calls in BFF
      run: |
        VIOLATIONS=$(grep -rn 'posthog\.Enqueue\|\.Enqueue(posthog\.' services/bff --include='*.go' \
          | grep -v '_test\.go' \
          | grep -v 'internal/analytics/') || true
        if [ -n "$VIOLATIONS" ]; then
          echo "Direct posthog.Enqueue calls found — route through analytics.Client:"
          echo "$VIOLATIONS"
          exit 1
        fi
        echo "Zero direct posthog.Enqueue calls — analytics seam intact."

  # -------------------------------------------------------------------------
  # Go vulnerability scan (govulncheck) — covers BFF and Sync.
  # The Daemon module is covered by a parallel step in daemon.yml.
  #
  # Path-filtered: runs when bff or sync Go source changes. Not run on
  # frontend-only PRs (no Go source changed → no new Go vulns possible).
  #
  # Findings in the accepted-vulnerabilities registry
  # (vault-mtg-docs/engineering/security/accepted-vulnerabilities.md) are
  # NOT blockers — cite the AV-NNN entry and proceed.
  # -------------------------------------------------------------------------
  govulncheck:
    name: Go Vulnerability Scan (govulncheck)
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true' || needs.detect-changes.outputs.sync == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: services/bff/go.mod
        cache-dependency-path: |
          services/bff/go.sum
          services/sync/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Install govulncheck
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: govulncheck — BFF
      if: needs.detect-changes.outputs.bff == 'true'
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      # -scan symbol: call-graph analysis — only flags vulns whose vulnerable
      # symbols are actually reachable from our code (reduces false-positive
      # noise vs module-level scan). Symbol is the default in govulncheck
      # >=v1.1.0, but we pin it explicitly so the intent is clear and a future
      # govulncheck upgrade cannot silently downgrade the scan level.
      run: govulncheck -scan symbol ./...

    - name: govulncheck — Sync
      if: needs.detect-changes.outputs.sync == 'true'
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: govulncheck -scan symbol ./...

  sync-unit-tests:
    name: Sync Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sync == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/sync/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run Sync unit tests
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./services/sync/coverage.out
        flags: sync-unit
        fail_ci_if_error: false

  meta-scrape-unit-tests:
    name: Meta-Scrape Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.meta_scrape == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/meta-scrape/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/meta-scrape
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run Meta-Scrape unit tests
      working-directory: services/meta-scrape
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./services/meta-scrape/coverage.out
        flags: meta-scrape-unit
        fail_ci_if_error: false

  logparse-unit-tests:
    name: LogParse Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.logparse == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: pkg/logparse/go.sum

    - name: Download dependencies
      working-directory: pkg/logparse
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run logparse unit tests
      working-directory: pkg/logparse
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
        GOPRIVATE: github.com/RdHamilton/vault-mtg,github.com/RdHamilton/hollowmark
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./pkg/logparse/coverage.out
        flags: logparse-unit
        fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # Build the BFF binary ONCE, then fan out to E2E shards. Avoids 4x
  # redundant `go build` (~30s each) and 4x setup-go caching overhead.
  # -------------------------------------------------------------------------
  build-bff-for-e2e:
    name: Build BFF binary (E2E)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Build BFF binary
      uses: ./.github/actions/build-bff
      with:
        output-path: bin/mtga-bff

    - name: Upload BFF binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtga-bff-binary
        path: bin/mtga-bff
        retention-days: 1
        if-no-files-found: error

  # -------------------------------------------------------------------------
  # Frontend E2E sharded across 4 parallel runners.
  # Wall-clock target: ~10-12 min (vs. 38-42 min unsharded).
  #
  # Runs inside mcr.microsoft.com/playwright:v1.56.1-jammy so Chromium + all
  # system deps are pre-installed — no cdn.playwright.dev download, no cache
  # action, no warm-playwright-cache job needed.  (#815 iteration 4)
  #
  # Container pinning: tag MUST match the repo's @playwright/test version
  # (1.56.1).  Update this tag when upgrading @playwright/test.
  # -------------------------------------------------------------------------
  frontend-e2e:
    name: Frontend E2E Tests (shard ${{ matrix.shard }}/4)
    needs: [detect-changes, build-bff-for-e2e]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
    timeout-minutes: 18

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download BFF binary artifact
      uses: actions/download-artifact@v8
      with:
        name: mtga-bff-binary
        path: bin

    - name: Make BFF binary executable
      run: chmod +x bin/mtga-bff

    - name: Install dependencies
      run: cd frontend && npm ci

    # No `playwright install` or `playwright install-deps` steps.
    # Browsers are pre-installed in the container at /ms-playwright.

    - name: Run E2E tests (shard ${{ matrix.shard }}/4)
      run: cd frontend && npm run test:e2e:pipeline -- --shard=${{ matrix.shard }}/4 --reporter=blob
      env:
        CI: true
        # BFF config.Load() defaults MTGA_ENV to "production" which requires
        # DATABASE_URL and CLERK_SECRET_KEY. Set to "development" so the BFF
        # starts without a database for the pipeline log-fixture tests.
        MTGA_ENV: development
        # Removes auth from GET /api/v1/events so pipeline log-fixture tests
        # can receive SSE events without a database or Clerk key.
        # Safe only because MTGA_ENV=development above; never set in staging/prod.
        BFF_E2E_UNGUARDED_SSE: true

    - name: Upload blob report shard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: blob-report-${{ matrix.shard }}
        path: frontend/blob-report
        retention-days: 1
        if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Merge sharded blob reports into a single HTML report.
  # Runs even if some shards failed so you always have a unified report.
  # -------------------------------------------------------------------------
  merge-e2e-reports:
    name: Merge E2E reports
    if: ${{ !cancelled() && needs.frontend-e2e.result != 'skipped' }}
    needs: [frontend-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Playwright (for merge-reports)
      run: cd frontend && npm ci

    - name: Download all blob reports
      uses: actions/download-artifact@v8
      with:
        path: frontend/all-blob-reports
        pattern: blob-report-*
        merge-multiple: true

    - name: Merge into HTML report
      run: cd frontend && npx playwright merge-reports --reporter=html ./all-blob-reports

    - name: Upload merged HTML report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-e2e-report
        path: frontend/playwright-report
        retention-days: 7

  # --------------------------------------------------------------------------
  # ff3-secrets-grep: No GitHub Actions secret for deploy
  # Static grep over the deploy/release/rollback workflow file set for
  # hardcoded AWS account IDs, Clerk secret key patterns, and
  # credential-like variable names in env: or with: blocks.
  # Scoped to a named 8-file array (deploy path only, Ray C1 condition) --
  # e2e test jobs and daemon-release Authenticode signing excluded by design.
  # ADR-075 FF-3 / RULE-INFRA-01 staged enablement.
  # Ray PLAN_VERDICT: APPROVED with condition C1 -- #1129#issuecomment-4664207551
  # Structural template: hollowmark-infra ssm-parity-fitness.yml ff4 (line 125).
  # --------------------------------------------------------------------------
  ff3-secrets-grep:
    name: FF-3 -- No GitHub Actions secret for deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 SHA-pinned (tag object 9f698171 dereferences here)

      - name: FF-3 -- Grep deploy workflows for hardcoded secrets patterns
        # Guards the D1 failure class: SSM-resident secrets (Clerk secret key,
        # credentials) being wired as GitHub Actions secrets into deploy/release/
        # rollback workflows instead of being read from SSM at runtime on EC2.
        #
        # Scoped to 8 deploy workflow files (named array, Ray C1 condition).
        # Excludes:
        #   - e2e-smoke.yml / e2e-staging-auth-smoke.yml: legitimate test-harness
        #     Clerk session minting -- not a deploy job.
        #   - daemon-release.yml: AZURE_CLIENT_SECRET is Authenticode signing (ADR-073).
        #   - All other CI/lint/utility workflows.
        #
        # 0-violation baseline confirmed on main (Ray C1 condition satisfied).
        # Promote to hard-fail after a clean release cycle (flip continue-on-error).
        run: |
          set +e  # Handle failures manually for WARN_ONLY behavior

          VIOLATIONS=0

          # Named file array -- mirrors ff4 scoping discipline in ssm-parity-fitness.yml.
          # Extended to full credentialed-deploy-path class per Ray C1 condition
          # (#1129#issuecomment-4664207551): 8 files covering all deploy paths.
          DEPLOY_FILES=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/staging-deploy.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/frontend.yml"
            ".github/workflows/run-prod-sql.yml"
            ".github/workflows/run-staging-sql.yml"
          )

          echo "======================================================="
          echo "FF-3: No GitHub Actions secret for deploy"
          echo "Scanning deploy/release/rollback workflow file set for credential antipatterns"
          echo "File set (8 files -- Ray C1 condition):"
          for f in "${DEPLOY_FILES[@]}"; do
            echo "  ${f}"
          done
          echo "======================================================="

          for f in "${DEPLOY_FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "  SKIP: ${f} not found"
              continue
            fi

            # P1: Clerk secret key referenced via GHA secrets in a deploy workflow.
            # Guards D1 regression: CLERK_STAGING_SECRET_KEY wired as a GHA secret
            # instead of being read from SSM at runtime.
            matches_p1=$(grep -n \
              "secrets\..*CLERK.*SECRET\|secrets\..*SK_\|secrets\.CLERK_SECRET" "$f" \
              | grep -v "^\s*#" \
              | grep -v "GITHUB_TOKEN\|GH_PAT\|AWS_.*ROLE_ARN\|AWS_ACCOUNT_ID" \
              || true)
            if [[ -n "$matches_p1" ]]; then
              echo ""
              echo "VIOLATION: [FF-3-P1] Clerk secret key passed via GHA secret in ${f}:"
              while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p1"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

            # P2: Any GHA secrets.* reference whose name contains SECRET_KEY or similar.
            # Guards against new credentials being added as GHA secrets instead of SSM.
            # Allowlist: AZURE_CLIENT_SECRET (ADR-073 signing, excluded from file set
            # but allowlisted as belt-and-suspenders).
            matches_p2=$(grep -n "secrets\." "$f" \
              | grep -iE "SECRET_KEY|_SECRET[^_]|SK_LIVE|SK_TEST" \
              | grep -v "^\s*#" \
              | grep -v \
                "GITHUB_TOKEN\|GH_PAT\|AWS_.*ROLE_ARN\|CODECOV\|ACTIONS_\|AZURE_CLIENT_SECRET" \
              || true)
            if [[ -n "$matches_p2" ]]; then
              echo ""
              echo "VIOLATION: [FF-3-P2] Secret key pattern via GHA secrets in ${f} (use SSM):"
              while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p2"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

            # P3: Hardcoded AWS account ID literals (901347789205).
            # Should be read from SSM or the OIDC role ARN, not hardcoded.
            # Allowlist: arn:aws:iam:: role ARNs (OIDC trust -- expected and correct).
            matches_p3=$(grep -n "901347789205" "$f" \
              | grep -v "^\s*#" \
              | grep -v "arn:aws:iam::901347789205:role/" \
              || true)
            if [[ -n "$matches_p3" ]]; then
              echo ""
              echo "VIOLATION: [FF-3-P3] Hardcoded AWS account ID in ${f} (use role ARN or SSM):"
              while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p3"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          echo ""
          echo "======================================================="
          echo "FF-3 Summary: ${VIOLATIONS} violation class(es) found"

          if [[ "$VIOLATIONS" -eq 0 ]]; then
            echo "FF-3: PASS"
          else
            echo "FF-3: FAIL -- ADR-075 RULE-INFRA-01 hard-fail (promoted per #1141)"
            echo "Remediation: move flagged values to SSM; read via aws ssm get-parameter."
            exit 1
          fi

      - name: Write step summary
        if: always()
        run: |
          {
            echo "### FF-3 -- No GitHub Actions Secret for Deploy"
            echo ""
            echo "Scope: 8-file deploy/release/rollback array (Ray C1 condition)"
            echo ""
            echo "- **HARD-FAIL** (ADR-075 RULE-INFRA-01 staged enablement complete, promoted per #1141)"
            echo "- See job log for VIOLATION lines, if any."
            echo "- Ref: ADR-075 FF-3, Ray PLAN_VERDICT #1129#issuecomment-4664207551"
          } >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # portability-lint: Fail PRs that introduce author/machine-specific paths
  #
  # Scans ADDED lines only in the PR diff for paths that are specific to an
  # author's machine or a transient CI agent worktree. This is the write-time
  # wall from the 2026-06-10 agent-quality retro.
  #
  # Origin: PR #3085 committed build.Dir = "/tmp/claude-worktrees/agent-.../
  # services/bff/cmd" into a Go test. It passed local verification (ran in
  # that exact worktree) and failed BFF Unit Tests in CI. This lint catches
  # the entire class on every PR, for every author.
  #
  # Scoped to source/test/script/config files only:
  #   *.go  *.ts  *.tsx  *.sh  *.yml  *.yaml  *.json
  # Excluded:
  #   *.md docs          (illustrative paths in documentation are expected)
  #   testdata/          (fixture data directories may contain example paths)
  #   /home/runner/      (GitHub Actions runner path -- always legitimate)
  #   /home/user/        (generic illustrative placeholder -- not machine-specific)
  #
  # Two steps:
  #   Step 1: home-dir / worktree paths  (hard-fail class once baseline clean)
  #   Step 2: hardcoded localhost ports  (warn class -- legit in test fixtures)
  #
  # RULE-INFRA-01 staged enablement: continue-on-error: true on the job.
  # Known baseline violations to resolve before promoting to hard-fail:
  #   - scripts/corpus-lint.sh: AGENTS_DIR default hardcodes /Users/<author>/
  #     (fix: use $HOME-relative default or relative path)
  #   - frontend CopyDiagnosticsSection.test.tsx + .stories.tsx + e2e spec:
  #     /Users/test/ and /Users/planeswalker/ (illustrative macOS log paths --
  #     replace with $HOME-relative or a const, or move to testdata/)
  # Promote both steps to hard-fail by removing continue-on-error from this
  # job after the baseline is clean. Coordinate with #1154 (fix-then-flip).
  # --------------------------------------------------------------------------
  portability-lint:
    name: Portability lint -- no author/machine-specific paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # RULE-INFRA-01: warn-only during staged enablement.
    # Known baseline violations documented above. Remove continue-on-error
    # after the baseline is clean (coordinate with #1154).
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch enough history to diff against the PR base branch.
          fetch-depth: 0

      - name: Portability lint -- home-dir and worktree paths (hard-fail class)
        # Catches author home directories and transient agent worktree IDs
        # in added diff lines across source, test, script, and config files.
        #
        # Patterns (hard-fail class):
        #   /Users/             macOS home directory root
        #   /home/<user>/       Linux home (username 4+ chars, not 'runner'/'user')
        #   /tmp/claude-worktrees/   agent scratch root
        #   /private/tmp/claude      macOS agent scratch (same class)
        #   /var/folders/            macOS temp (machine-specific inode path)
        #   agent-[0-9a-f]{16,}      agent worktree hex ID suffix
        #
        # File scope: *.go *.ts *.tsx *.sh *.yml *.yaml *.json
        # Excluded: *.md, testdata/ paths, /home/runner/, /home/user/
        run: |
          set +e

          BASE="${{ github.base_ref }}"
          if [[ -z "$BASE" ]]; then
            # push to main -- diff against HEAD~1
            DIFF=$(git diff HEAD~1...HEAD -- \
              '*.go' '*.ts' '*.tsx' '*.sh' '*.yml' '*.yaml' '*.json' \
              2>/dev/null || true)
          else
            git fetch origin "$BASE" --depth=1 2>/dev/null || true
            DIFF=$(git diff "origin/${BASE}...HEAD" -- \
              '*.go' '*.ts' '*.tsx' '*.sh' '*.yml' '*.yaml' '*.json' \
              2>/dev/null || true)
          fi

          # Extract added lines only from non-testdata files.
          # Process hunk-by-hunk: track the current file; skip if it is under
          # testdata/ or fixtures/; emit the content of '+' lines (not '+++').
          ADDED_FILTERED=$(echo "$DIFF" | awk '
            /^\+\+\+ b\// {
              filepath = substr($0, 7)
              in_excluded = (filepath ~ /testdata\/|\/fixtures\//)
              next
            }
            /^--- / { next }
            /^diff / { in_excluded = 0; next }
            /^index / { next }
            /^@@/ { next }
            /^\+/ && !in_excluded && !/^\+\+\+/ {
              print substr($0, 2)
            }
          ' || true)

          VIOLATIONS=0

          echo "======================================================="
          echo "Portability lint: home-dir / worktree paths (hard-fail class)"
          echo "Scanning added lines in PR diff for machine-specific paths"
          echo "======================================================="

          # P1: macOS home directories (/Users/<anything>/)
          matches_p1=$(echo "$ADDED_FILTERED" | \
            grep -E '/Users/[^[:space:]]+' \
            || true)
          if [[ -n "$matches_p1" ]]; then
            echo ""
            echo "VIOLATION [P1]: macOS /Users/<author>/ path in source/test/script/config:"
            while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p1"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # P2: Linux home directories -- /home/<username>/ where username is
          # 4+ chars and NOT 'runner' (GHA runner) or 'user' (generic placeholder).
          matches_p2=$(echo "$ADDED_FILTERED" | \
            grep -E '/home/[a-zA-Z][a-zA-Z0-9._-]{3,}/' | \
            grep -v '/home/runner/' | \
            grep -v '/home/user/' \
            || true)
          if [[ -n "$matches_p2" ]]; then
            echo ""
            echo "VIOLATION [P2]: Linux /home/<author>/ path in source/test/script/config:"
            while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p2"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # P3: Agent/CI worktree scratch paths (all are machine-specific)
          matches_p3=$(echo "$ADDED_FILTERED" | \
            grep -E '/tmp/claude-worktrees/|/private/tmp/claude|/var/folders/' \
            || true)
          if [[ -n "$matches_p3" ]]; then
            echo ""
            echo "VIOLATION [P3]: Agent worktree / macOS scratch path:"
            while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p3"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # P4: Agent worktree hex ID embedded in any string
          # (e.g. Dir = "/tmp/.../agent-3f8a2b1c9d4e7f0a12b3/...")
          matches_p4=$(echo "$ADDED_FILTERED" | \
            grep -E 'agent-[0-9a-f]{16,}' \
            || true)
          if [[ -n "$matches_p4" ]]; then
            echo ""
            echo "VIOLATION [P4]: Agent worktree hex ID (agent-<16+hex>):"
            while IFS= read -r line; do echo "  ${line}"; done <<< "$matches_p4"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          echo ""
          echo "======================================================="
          echo "Portability lint (home-dir/worktree): ${VIOLATIONS} violation class(es)"

          if [[ "$VIOLATIONS" -eq 0 ]]; then
            echo "PASS"
          else
            echo "WARN (WARN_ONLY -- non-blocking per RULE-INFRA-01 staged enablement)"
            echo ""
            echo "Fix guidance:"
            echo "  - Replace /Users/<you>/... with a relative path, \$HOME, or"
            echo "    os.UserHomeDir() / os.TempDir() in Go code."
            echo "  - Replace /tmp/claude-worktrees/... with t.TempDir() in tests."
            echo "  - Never embed a worktree ID -- derive the working directory"
            echo "    from the test package dir or an env var at runtime."
            echo ""
            echo "Promote to hard-fail after baseline cleanup (see #1154, #1155)."
          fi
          # Always exit 0 in staged-enablement. continue-on-error: true is the belt;
          # this exit 0 is the suspenders. The job must conclude 'success' while
          # violations are still visible in the log and step summary.
          # FLIP PATH (#1154): remove continue-on-error on the job AND change exit 0
          # below to exit 1 (or remove the override) to promote to hard-fail.
          exit 0

      - name: Portability lint -- hardcoded localhost/loopback ports (warn class)
        # Catches localhost:<port> and 127.0.0.1:<port> literals in added lines.
        # These may indicate services that only exist on the author's machine.
        #
        # Warn-only: many legitimate test fixtures use localhost ports (e.g.
        # httptest.NewServer, net.Listen(":0") tests). An allowlist / case-by-case
        # review is needed before hard-failing. Coordinate with #1154.
        run: |
          set +e

          BASE="${{ github.base_ref }}"
          if [[ -z "$BASE" ]]; then
            DIFF=$(git diff HEAD~1...HEAD -- \
              '*.go' '*.ts' '*.tsx' '*.sh' '*.yml' '*.yaml' '*.json' \
              2>/dev/null || true)
          else
            git fetch origin "$BASE" --depth=1 2>/dev/null || true
            DIFF=$(git diff "origin/${BASE}...HEAD" -- \
              '*.go' '*.ts' '*.tsx' '*.sh' '*.yml' '*.yaml' '*.json' \
              2>/dev/null || true)
          fi

          ADDED_FILTERED=$(echo "$DIFF" | awk '
            /^\+\+\+ b\// {
              filepath = substr($0, 7)
              in_excluded = (filepath ~ /testdata\/|\/fixtures\//)
              next
            }
            /^--- / { next }
            /^diff / { in_excluded = 0; next }
            /^index / { next }
            /^@@/ { next }
            /^\+/ && !in_excluded && !/^\+\+\+/ {
              print substr($0, 2)
            }
          ' || true)

          echo "======================================================="
          echo "Portability lint: hardcoded localhost/loopback ports (warn class)"
          echo "======================================================="

          matches=$(echo "$ADDED_FILTERED" | \
            grep -E 'localhost:[0-9]{2,5}|127\.0\.0\.1:[0-9]{2,5}' \
            || true)

          if [[ -n "$matches" ]]; then
            echo ""
            echo "WARN [localhost-port]: hardcoded localhost:<port> or 127.0.0.1:<port>:"
            while IFS= read -r line; do echo "  ${line}"; done <<< "$matches"
            echo ""
            echo "These may be legitimate test fixtures. Review and either:"
            echo "  - Keep if the fixture clearly uses a dynamic port (net.Listen(':0'),"
            echo "    httptest.NewServer) and this is just the resolved address"
            echo "  - Replace with a dynamic port binding if it is a hardcoded constant"
            echo "WARN (non-blocking) -- coordinate with #1154 for hard-fail promotion"
          else
            echo "PASS -- no hardcoded localhost ports found in added lines"
          fi
          # Always exit 0 in staged-enablement. continue-on-error: true is the belt;
          # this exit 0 is the suspenders. Violations surface in log/summary but the
          # job concludes 'success' -- no masked-red check on every PR.
          # FLIP PATH (#1154): remove continue-on-error on the job AND change exit 0
          # below to exit 1 (or remove the override) to promote to hard-fail.
          exit 0

      - name: Write step summary
        if: always()
        run: |
          {
            echo "### Portability Lint -- author/machine-specific paths"
            echo ""
            echo "Scans added PR diff lines for machine-specific paths in source/test/script/config."
            echo ""
            echo "- **WARN_ONLY** (RULE-INFRA-01 staged enablement)"
            echo "- Known baseline violations: scripts/corpus-lint.sh AGENTS_DIR,"
            echo "  frontend CopyDiagnosticsSection test/story fixtures."
            echo "- See job log for VIOLATION/WARN lines, if any."
            echo "- Promote to hard-fail after baseline cleanup (coordinate with #1154)."
            echo "- Ref: RdHamilton/hollowmark-tickets#1155, 2026-06 agent-quality retro"
          } >> "$GITHUB_STEP_SUMMARY"
