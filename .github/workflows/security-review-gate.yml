# security-review-gate.yml
#
# S-07 Infra Security Review Gate
#
# PURPOSE
# -------
# Blocks merge on any PR that touches IAM, trust policies, security groups, SSM,
# Secrets Manager, KMS, OIDC, or security-sensitive workflow files until Sarah
# (Security Engineer) has completed the effect-enumeration SOP and posted an
# explicit VERDICT: APPROVED comment.
#
# Runbook: vault-mtg-docs/engineering/runbooks/infra-security-review-gate.md
# Ticket:  RdHamilton/hollowmark#2365
#
# GATE MECHANISM
# --------------
# The job runs on:
#   - pull_request events (opened, synchronize, reopened, labeled, unlabeled) --
#     sets initial failing state and re-evaluates when the PR diff changes.
#   - issue_comment events (created) -- re-evaluates when a new comment is posted,
#     picking up the VERDICT comment the moment Sarah posts it.
#   - workflow_dispatch with a pr_number input -- for live testing on a disposable
#     test PR without needing to post a comment or push a commit (ticket #2420).
#
# The gate PASSES only when a PR comment matches ALL of:
#   1. Body contains "## S-07 Security Review" (SOP header).
#   2. Body contains a line that is exactly "VERDICT: APPROVED" (after stripping
#      leading/trailing whitespace and carriage returns).
#
# The gate SKIPS (passes neutrally) when the PR does not match any S-07 trigger
# glob, so it never blocks unrelated PRs.
#
# RESULT PUBLISHING (ticket #2420)
# ---------------------------------
# The job is named "Security Review Gate Runner" so that the runner's own
# auto-status check registers under a NON-required context. The actual required
# "Security Review Gate" check-run context is written explicitly via the
# checks.create REST API using the live PR-head SHA (resolved via pulls.get so
# that issue_comment and workflow_dispatch triggers bind to the correct commit,
# not to the commit that triggered the workflow run). This means:
#
#   - issue_comment runs (which execute at the *main* HEAD SHA) now correctly
#     flip the required "Security Review Gate" check on the PR head commit.
#   - No manual re-run is needed after Sarah posts the VERDICT comment.
#   - The job always exits 0; pass/fail is expressed only via the check-run
#     conclusion ("success" or "failure").
#
# BYPASS RISK (single-account repo)
# ----------------------------------
# GitHub's required-reviewer controls are unavailable in a single-account repo.
# The gate enforces PROCESS VISIBILITY: the verdict comment must carry the full
# SOP header, making it obvious in the audit trail whether Sarah's
# effect-enumeration procedure ran. Branch protection makes this status check
# required; there is no PR-UI path that passes the gate without a matching
# comment in the audit log.
#
# RELEASING THE GATE
# ------------------
# Sarah posts the verdict as a PR comment following the SOP runbook. The
# issue_comment trigger re-runs this workflow immediately and picks up the
# APPROVED comment. No separate workflow_dispatch step is required.
#
# COMMENT-INDEXING RACE (ticket #2608)
# ------------------------------------
# A pull_request "synchronize" (push) event can fire within seconds of a valid
# verdict comment. GitHub's issue-comments API is eventually consistent, so a
# verdict that was already posted may not yet be returned by the comments
# endpoint when the synchronize run evaluates -- producing a false-negative
# BLOCK that previously required a manual label-toggle to clear.
#
# The verdict scan therefore retries the comments fetch up to S07_VERDICT_FETCH_
# MAX_ATTEMPTS times with S07_VERDICT_FETCH_SLEEP_SECONDS between attempts,
# breaking early the instant a matching APPROVED comment appears. This tolerates
# comment-availability lag without weakening the gate: a PR with NO verdict still
# exhausts all attempts and BLOCKS (true-negative preserved). The retry runs
# before -- and is independent of -- the SHA-delta staleness logic (#119), which
# is left untouched.
#
# STALENESS: SHA-DELTA CHECK (tickets #119, #231)
# ------------------------------------------------
# When an APPROVED comment exists but predates the current HEAD (e.g., because
# Lee ran update-branch to pull in main), the gate performs a SHA-delta check
# before marking the verdict stale:
#
#   1. Collect all PR commits whose committer date is AFTER the verdict timestamp.
#   2. Aggregate every file changed in those commits via the GitHub commits API.
#   3. Test each changed file against the S-07 §1A trigger path globs.
#   4a. If ZERO §1A-path changes are found -> the commits since the verdict are
#       inert (merge commits, unrelated fixups); carry the verdict forward as FRESH.
#   4b. If ANY §1A-path change is found -> new security-sensitive code was pushed
#       after Sarah's approval; mark stale and require a fresh verdict.
#
# This eliminates false-positive staleness on update-branch merge commits while
# preserving gate integrity for real security changes.
#
# Ticket #231 (vault-mtg-tickets) is the canonical implementation ticket that
# also ports this logic to mtga-companion-infra and updates the runbook to
# reflect SHA-delta behaviour as the authoritative staleness rule.

name: Security Review Gate (S-07)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate (for live testing)'
        required: true
        type: string

# Queue (do not cancel) concurrent runs on the same PR -- any one may be the
# run that finds the APPROVED verdict.
concurrency:
  group: security-review-gate-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  security-review-gate:
    # Renamed from "Security Review Gate" to "Security Review Gate Runner" so
    # this job's auto-status registers under a NON-required context. The
    # required "Security Review Gate" check is written explicitly via
    # checks.create in the final step, bound to the live PR-head SHA.
    name: Security Review Gate Runner
    # For issue_comment events only run when the comment is on a pull request
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Resolve PR number and head SHA
        id: pr_info
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            # Fix 2 (Sarah Finding 3 / #261): guard against malformed pr_number input
            # before it reaches any gh api URL. A non-numeric value (e.g. "12; rm -rf /")
            # would previously just result in a 404 -- not exploitable, but fail fast
            # with a clear error is better hygiene.
            if ! echo "${PR_NUMBER}" | grep -qE '^[0-9]+$'; then
              echo "ERROR: pr_number input '${PR_NUMBER}' is not a valid PR number (must match ^[0-9]+\$)" >&2
              exit 1
            fi
          else
            PR_NUMBER="${{ github.event.issue.number }}"
          fi

          # Always re-fetch the live PR head SHA via the API.
          # Do NOT use event.pull_request.head.sha -- it is stale on
          # issue_comment and workflow_dispatch triggers (they run at the
          # SHA of the commit that triggered the workflow, not the PR head).
          # This is the root cause fixed by ticket #2420.
          HEAD_SHA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" \
            --jq '.head.sha' 2>/dev/null || echo "")

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          echo "PR number: ${PR_NUMBER}"
          echo "PR head SHA (live): ${HEAD_SHA}"

      - name: Check whether S-07 gate is required for this PR
        id: gate_required
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
        run: |
          set -euo pipefail

          # ------------------------------------------------------------------
          # 1. Label check -- gate required if 'security' or 'infra' label present
          # ------------------------------------------------------------------
          LABELS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" \
            --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "PR labels: ${LABELS}"

          if echo "${LABELS}" | grep -qE '(^|,)(security|infra)(,|$)'; then
            echo "Gate required: label match (security or infra label present)"
            { echo "required=true"; echo "reason=label match"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ------------------------------------------------------------------
          # 2. Path glob check -- S-07 trigger paths for vault-mtg
          #    Source: vault-mtg-docs/engineering/runbooks/infra-security-review-gate.md sec 1A
          # ------------------------------------------------------------------
          CHANGED_FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '[.[].filename] | join("\n")' 2>/dev/null || echo "")

          echo "Changed files:"
          echo "${CHANGED_FILES}"

          GATE_REQUIRED=false
          TRIGGER_GLOBS=(
            ".github/workflows/deploy-bff.yml"
            ".github/workflows/deploy-spa.yml"
            ".github/workflows/deploy-spa-staging.yml"
            ".github/workflows/release.yml"
            ".github/workflows/rollback.yml"
            ".github/workflows/staging-deploy.yml"
            # daemon-release.yml: pushes GitHub Releases, uses SENTRY_DSN_DAEMON_PRODUCTION,
            # APPLE_* signing secrets, and GH_VARIABLES_PAT. (#98)
            ".github/workflows/daemon-release.yml"
            # frontend.yml: production SPA deploy -- AWS_DEPLOY_ROLE_ARN, DEPLOY_BUCKET,
            # EC2_INSTANCE_ID (SSM Run Command against production instance). (#98)
            ".github/workflows/frontend.yml"
            # Fix 1 (Sarah Finding 1 / #261): gate self-coverage -- a change to the gate
            # workflow itself must also require an S-07 verdict, so the gate can't be
            # weakened without Sarah's review. Mirrors the entry in the staleness check below.
            ".github/workflows/security-review-gate.yml"
            "services/bff/cmd/"
            "services/daemon/cmd/"
            "scripts/deploy/"
          )

          for GLOB in "${TRIGGER_GLOBS[@]}"; do
            if echo "${CHANGED_FILES}" | grep -qF "${GLOB}"; then
              echo "Gate required: path match -> ${GLOB}"
              GATE_REQUIRED=true
              break
            fi
          done

          # ------------------------------------------------------------------
          # 3. Catch-all content check -- scan diff for security-sensitive keywords
          # ------------------------------------------------------------------
          if [ "${GATE_REQUIRED}" = "false" ]; then
            DIFF=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" \
              -H "Accept: application/vnd.github.v3.diff" 2>/dev/null || echo "")

            CATCH_ALL_STRINGS=(
              "iam:"
              "secretsmanager:"
              "AssumeRolePolicyDocument"
              "WebIdentityToken"
              "SecurityGroupIngress"
              "SecurityGroupEgress"
              "ssm:"
              "kms:"
            )

            for KEYWORD in "${CATCH_ALL_STRINGS[@]}"; do
              if echo "${DIFF}" | grep -q "${KEYWORD}"; then
                echo "Gate required: catch-all keyword match -> ${KEYWORD}"
                GATE_REQUIRED=true
                break
              fi
            done
          fi

          if [ "${GATE_REQUIRED}" = "true" ]; then
            { echo "required=true"; echo "reason=path/content match"; } >> "$GITHUB_OUTPUT"
          else
            { echo "required=false"; echo "reason=no trigger match"; } >> "$GITHUB_OUTPUT"
          fi

      - name: Scan PR comments for security review verdict
        if: steps.gate_required.outputs.required == 'true'
        id: verdict_check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          # Comment-indexing race tolerance (ticket #2608). Bounds the retry loop
          # around the verdict-comment fetch so a synchronize event arriving within
          # seconds of a valid verdict still finds the (eventually-consistent)
          # comment instead of false-negative-blocking. 4 attempts x 5s sleep =>
          # tolerates ~15s of API lag, comfortably covering the AC1 5s window while
          # staying well inside the 5-minute job timeout.
          S07_VERDICT_FETCH_MAX_ATTEMPTS: "4"
          S07_VERDICT_FETCH_SLEEP_SECONDS: "5"
        run: |
          set -euo pipefail

          echo "S-07 gate IS REQUIRED for PR #${PR_NUMBER}"
          echo "Reason: ${{ steps.gate_required.outputs.reason }}"
          echo ""

          # ------------------------------------------------------------------
          # 1. Resolve current HEAD SHA and its committer timestamp.
          #    HEAD_SHA already resolved in pr_info step; re-use it here.
          #    Fetch the committer timestamp from the commits API.
          # ------------------------------------------------------------------
          HEAD_SHA="${{ steps.pr_info.outputs.head_sha }}"
          LAST_PUSH_TIMESTAMP=$(gh api "repos/${REPO}/commits/${HEAD_SHA}" \
            --jq '.commit.committer.date' 2>/dev/null || echo "")

          echo "Head SHA:             ${HEAD_SHA}"
          echo "Last push timestamp:  ${LAST_PUSH_TIMESTAMP}"
          echo ""
          echo "Scanning PR comments for Sarah's security review verdict..."

          # ------------------------------------------------------------------
          # 2. Find the most-recent matching APPROVED comment.
          #    jq selects comments that:
          #      a. Contain the S-07 SOP header string
          #      b. Have a line that is exactly "VERDICT: APPROVED" (stripped of
          #         CR/spaces) OR the bolded variant "**VERDICT: APPROVED**"
          #    Output format: "<comment_id> <author_login> <created_at>"
          #    Newlines in bodies are safe -- jq handles JSON string escaping.
          #
          #    RETRY (ticket #2608): the comments API is eventually consistent, so
          #    a verdict posted moments before a synchronize event may not yet be
          #    returned. Retry the fetch up to S07_VERDICT_FETCH_MAX_ATTEMPTS times
          #    with S07_VERDICT_FETCH_SLEEP_SECONDS between attempts, breaking the
          #    instant a match appears. If no match is ever found the loop exits
          #    with an empty MATCH and the gate BLOCKS (true-negative preserved).
          # ------------------------------------------------------------------
          MATCH=""
          ATTEMPT=1
          while [ "${ATTEMPT}" -le "${S07_VERDICT_FETCH_MAX_ATTEMPTS}" ]; do
            MATCH=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '.[] |
                select(
                  (.body | contains("## S-07 Security Review")) and
                  (.body | split("\n") |
                    map(ltrimstr("\r") | ltrimstr(" ") | rtrimstr(" ") |
                        ltrimstr("**") | rtrimstr("**")) |
                    any(. == "VERDICT: APPROVED"))
                ) |
                "\(.id) \(.user.login) \(.created_at)"' \
              2>/dev/null | tail -1 || echo "")

            if [ -n "${MATCH}" ]; then
              echo "Verdict comment found on attempt ${ATTEMPT}/${S07_VERDICT_FETCH_MAX_ATTEMPTS}."
              break
            fi

            if [ "${ATTEMPT}" -lt "${S07_VERDICT_FETCH_MAX_ATTEMPTS}" ]; then
              echo "No verdict comment on attempt ${ATTEMPT}/${S07_VERDICT_FETCH_MAX_ATTEMPTS}; the comments API may not yet have indexed a recent verdict. Retrying in ${S07_VERDICT_FETCH_SLEEP_SECONDS}s..."
              sleep "${S07_VERDICT_FETCH_SLEEP_SECONDS}"
            else
              echo "No verdict comment after ${S07_VERDICT_FETCH_MAX_ATTEMPTS} attempts."
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Match result: ${MATCH}"

          if [ -z "${MATCH}" ]; then
            echo "No matching APPROVED comment found."
            echo "approved=false" >> "$GITHUB_OUTPUT"
          else
            COMMENT_ID=$(echo "${MATCH}" | cut -d' ' -f1)
            APPROVER=$(echo "${MATCH}" | cut -d' ' -f2)
            COMMENT_TIMESTAMP=$(echo "${MATCH}" | cut -d' ' -f3)

            echo "Comment ID:        ${COMMENT_ID}"
            echo "Approver:          ${APPROVER}"
            echo "Comment timestamp: ${COMMENT_TIMESTAMP}"

            # ------------------------------------------------------------------
            # 3. Staleness check: SHA-delta-based (ticket #119).
            #
            #    FAST PATH: if the verdict post-dates the last push, it is fresh
            #    by definition -- skip the delta check entirely.
            #
            #    DELTA PATH: if the verdict pre-dates the last push (e.g., an
            #    update-branch merge commit landed after Sarah approved), collect
            #    all commits pushed to this PR after the verdict timestamp and
            #    check whether any of those commits touched an S-07 §1A trigger
            #    path.  If none did, the verdict is carried forward as FRESH
            #    (inert merge commits do not invalidate the approval).  If any
            #    §1A-path change is found the verdict is genuinely stale and
            #    Sarah must re-review.
            # ------------------------------------------------------------------

            # Determine temporal ordering (python3 for UTC-safe ISO8601 parsing)
            # Guard: if the HEAD SHA lookup returned an empty timestamp (API
            # error / race), skip the comparison and treat the verdict as
            # non-stale so the delta-path check below runs and decides freshness.
            if [ -z "${LAST_PUSH_TIMESTAMP}" ]; then
              echo "LAST_PUSH_TIMESTAMP is empty (HEAD SHA lookup failed or returned no date)."
              echo "Skipping fast-path timestamp comparison; falling through to SHA-delta check."
              VERDICT_AFTER_PUSH="false"
            else
            VERDICT_AFTER_PUSH=$(python3 -c "
          from datetime import datetime, timezone
          def p(t):
              t = t.strip()
              if t.endswith('Z'):
                  t = t[:-1] + '+00:00'
              return datetime.fromisoformat(t).astimezone(timezone.utc)
          verdict = p('${COMMENT_TIMESTAMP}')
          push   = p('${LAST_PUSH_TIMESTAMP}')
          print('true' if verdict > push else 'false')
          ")
            fi

            echo "Verdict post-dates last push: ${VERDICT_AFTER_PUSH}"

            if [ "${VERDICT_AFTER_PUSH}" = "true" ]; then
              # Fast path: verdict is newer than the push -- unambiguously fresh.
              echo "Verdict is fresh (post-dates last push). Gate passes."
              {
                echo "approved=true"
                echo "approver=${APPROVER}"
                echo "comment_id=${COMMENT_ID}"
                echo "comment_timestamp=${COMMENT_TIMESTAMP}"
                echo "last_push_timestamp=${LAST_PUSH_TIMESTAMP}"
                echo "staleness_check=fresh"
              } >> "$GITHUB_OUTPUT"
            else
              # Delta path: verdict pre-dates current HEAD.
              # Collect commits added to this PR after the verdict timestamp,
              # then check if any of those commits touched S-07 §1A trigger paths.
              echo ""
              echo "Verdict pre-dates last push -- running SHA-delta staleness check..."
              echo "Collecting PR commits after verdict timestamp (${COMMENT_TIMESTAMP})..."

              # List all commits on the PR; filter to those whose committer date
              # is strictly after the verdict timestamp.
              # gh api --jq takes a single jq expression string; it does not
              # accept --arg (that is a standalone jq binary flag). Embed the
              # timestamp directly via shell interpolation so the filter is a
              # self-contained string that gh api can evaluate. Bug: #1120.
              COMMITS_AFTER=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
                --paginate \
                --jq ".[] | select(.commit.committer.date > \"${COMMENT_TIMESTAMP}\") | .sha" \
                2>/dev/null || echo "")

              if [ -z "${COMMITS_AFTER}" ]; then
                # No commits registered after the verdict -- likely a race between
                # comment creation and the push event.  Treat as fresh.
                echo "No commits found after verdict timestamp. Treating verdict as fresh."
                {
                  echo "approved=true"
                  echo "approver=${APPROVER}"
                  echo "comment_id=${COMMENT_ID}"
                  echo "comment_timestamp=${COMMENT_TIMESTAMP}"
                  echo "last_push_timestamp=${LAST_PUSH_TIMESTAMP}"
                  echo "staleness_check=delta-no-commits"
                } >> "$GITHUB_OUTPUT"
              else
                echo "Commits after verdict:"
                echo "${COMMITS_AFTER}"
                echo ""

                # S-07 §1A trigger path globs (must mirror gate_required step above)
                TRIGGER_GLOBS=(
                  ".github/workflows/deploy-bff.yml"
                  ".github/workflows/deploy-spa.yml"
                  ".github/workflows/deploy-spa-staging.yml"
                  ".github/workflows/release.yml"
                  ".github/workflows/rollback.yml"
                  ".github/workflows/staging-deploy.yml"
                  ".github/workflows/daemon-release.yml"
                  ".github/workflows/frontend.yml"
                  # Fix 1 (#261): mirrors gate_required TRIGGER_GLOBS above -- keep in sync.
                  ".github/workflows/security-review-gate.yml"
                  "services/bff/cmd/"
                  "services/daemon/cmd/"
                  "scripts/deploy/"
                )

                S07_DELTA_FOUND=false

                for COMMIT_SHA in ${COMMITS_AFTER}; do
                  echo "Checking commit ${COMMIT_SHA}..."
                  COMMIT_FILES=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}" \
                    --jq '[.files[].filename] | join("\n")' 2>/dev/null || echo "")

                  if [ -z "${COMMIT_FILES}" ]; then
                    echo "  (no files listed -- merge commit or API error; skipping)"
                    continue
                  fi

                  echo "  Changed files: $(echo "${COMMIT_FILES}" | tr '\n' ' ')"

                  for GLOB in "${TRIGGER_GLOBS[@]}"; do
                    if echo "${COMMIT_FILES}" | grep -qF "${GLOB}"; then
                      echo "  S-07 §1A path match in commit ${COMMIT_SHA}: ${GLOB}"
                      S07_DELTA_FOUND=true
                      break 2
                    fi
                  done
                done

                echo ""
                if [ "${S07_DELTA_FOUND}" = "true" ]; then
                  echo "SHA-delta check: STALE -- S-07 §1A path(s) changed after verdict."
                  echo "Sarah must re-review the new security-sensitive changes."
                  echo "approved=false" >> "$GITHUB_OUTPUT"
                else
                  echo "SHA-delta check: FRESH -- no S-07 §1A path changes since verdict."
                  echo "All commits after verdict are inert (merge commits / unrelated changes)."
                  echo "Carrying verdict forward."
                  {
                    echo "approved=true"
                    echo "approver=${APPROVER}"
                    echo "comment_id=${COMMENT_ID}"
                    echo "comment_timestamp=${COMMENT_TIMESTAMP}"
                    echo "last_push_timestamp=${LAST_PUSH_TIMESTAMP}"
                    echo "staleness_check=delta-clean"
                  } >> "$GITHUB_OUTPUT"
                fi
              fi
            fi
          fi

      - name: Publish check-run result
        if: always()
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ steps.pr_info.outputs.head_sha }}
          GATE_REQUIRED: ${{ steps.gate_required.outputs.required }}
          APPROVED: ${{ steps.verdict_check.outputs.approved }}
          APPROVER: ${{ steps.verdict_check.outputs.approver }}
          COMMENT_ID: ${{ steps.verdict_check.outputs.comment_id }}
          COMMENT_TIMESTAMP: ${{ steps.verdict_check.outputs.comment_timestamp }}
          LAST_PUSH_TIMESTAMP: ${{ steps.verdict_check.outputs.last_push_timestamp }}
          STALENESS_CHECK: ${{ steps.verdict_check.outputs.staleness_check }}
        with:
          script: |
            const headSha    = process.env.HEAD_SHA;
            const required   = process.env.GATE_REQUIRED === 'true';
            const approved   = process.env.APPROVED === 'true';
            const approver   = process.env.APPROVER   || '';
            const commentId  = process.env.COMMENT_ID || '';
            const verdictTs  = process.env.COMMENT_TIMESTAMP    || '';
            const pushTs     = process.env.LAST_PUSH_TIMESTAMP  || '';
            const staleness  = process.env.STALENESS_CHECK       || '';

            let conclusion, title, summary;

            if (!required) {
              conclusion = 'success';
              title      = 'Security Review Gate: Not Required';
              summary    = 'This PR does not match S-07 trigger criteria. Gate skipped (no IAM/security-sensitive paths, labels, or keywords detected).';
            } else if (approved) {
              conclusion = 'success';
              title      = 'Security Review Gate: PASSED';
              summary    = [
                'S-07 effect-enumeration review complete.',
                '',
                `Reviewer:             @${approver}`,
                `Comment ID:           ${commentId}`,
                `Approval timestamp:   ${verdictTs}`,
                `Last push timestamp:  ${pushTs}`,
                `Staleness check:      ${staleness}`,
                '',
                'This PR is cleared for merge (security review requirement satisfied).',
              ].join('\n');
            } else {
              conclusion = 'failure';
              title      = 'Security Review Gate: BLOCKED';
              summary    = [
                'This PR matches S-07 infra security review criteria.',
                'Merge is blocked until Sarah posts the APPROVED verdict.',
                '',
                'Required action:',
                '  Sarah must run the S-07 effect-enumeration SOP and post a',
                '  PR comment containing BOTH:',
                '',
                '    1. Header line:   ## S-07 Security Review',
                '    2. Verdict line:  VERDICT: APPROVED',
                '',
                '  (or VERDICT: BLOCKED -- <reason> to explicitly block the PR)',
                '',
                '  If the verdict was posted before an update-branch merge commit,',
                '  the gate will carry it forward automatically provided no S-07',
                '  §1A trigger paths changed in the commits since the verdict.',
                '  Re-review is only required when new security-sensitive code',
                '  was pushed after the last approval.',
                '',
                'Runbook: vault-mtg-docs/engineering/runbooks/infra-security-review-gate.md',
                'Ticket:  RdHamilton/hollowmark#2365',
              ].join('\n');
            }

            if (!headSha) {
              core.warning('HEAD SHA is empty -- cannot publish check-run. PR may have been deleted or the API call failed.');
              return;
            }

            await github.rest.checks.create({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              name:        'Security Review Gate',
              head_sha:    headSha,
              status:      'completed',
              conclusion:  conclusion,
              output: {
                title:   title,
                summary: summary,
              },
            });

            core.info(`Published check-run "Security Review Gate" on ${headSha} with conclusion=${conclusion}`);
            // Job always exits 0 -- pass/fail is expressed only via the check-run conclusion.
