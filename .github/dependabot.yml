version: 2
updates:
  # Enable version updates for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # Group all Go module updates into a single PR per cycle (#827).
    # Multiple simultaneous Go module PRs conflict on overlapping go.sum entries
    # (v0.3.7: #2872/#2869 vs #2873 all touched go.sum and could not merge).
    # Grouping into one PR per cycle eliminates the conflict entirely.
    groups:
      go-modules:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    labels:
      - "enhancement"
      - "infrastructure"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Enable GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "enhancement"
      - "infrastructure"
    commit-message:
      prefix: "ci"
      include: "scope"
