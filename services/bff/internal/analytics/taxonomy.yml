# PostHog Event Taxonomy — VaultMTG / Hollowmark
#
# Single source of truth for the locked event taxonomy.  Drives codegen
# for both the BFF (Go constants) and the SPA (TypeScript const + consent map).
#
# Rules:
#   - event names: snake_case, stable forever once locked (PostHog queries break on rename)
#   - pii_class values: none | pseudonymous | pii_hashed | pii_raw_FORBIDDEN
#   - pii_raw_FORBIDDEN is a compile-time guard: codegen rejects any property with this class
#   - cmp_storage_key: the localStorage key written by the SPA's own PostHog-consent
#     surface (NOT the cookie consent banner #877 — that is a separate independent flow).
#     Name stays vaultmtg_* per INVARIANTS I-57 until the v0.4.x infra cutover.
#
# Codegen targets (run: make gen-taxonomy):
#   - services/bff/internal/analytics/taxonomy.gen.go  (Go constants)
#   - frontend/src/services/analytics-taxonomy.gen.ts  (TS const + consent map + CMPStorageKey)
#
# Staleness CI gate: make check-taxonomy-stale (fails if generated files differ from this YAML).
#
# To add a new event: edit this file, run make gen-taxonomy, update AnalyticsEvent union
# in analytics.ts, add the handler call site, commit all together.

version: "1"
cmp_storage_key: "vaultmtg_consent_v1"

events:
  - name: page_viewed
    category: nav
    trigger_surface: spa
    consent_category: analytics
    properties:
      - name: page
        type: string
        pii_class: none
      - name: previous_page
        type: "string | null"
        pii_class: none

  - name: app_session_started
    category: nav
    trigger_surface: spa
    consent_category: analytics
    properties:
      - name: services_init_ms
        type: number
        pii_class: none

  - name: app_user_identified
    category: auth
    trigger_surface: spa
    consent_category: necessary
    properties:
