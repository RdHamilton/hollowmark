        pii_class: pseudonymous
      - name: session_id
        type: string
        pii_class: none
      - name: expected_sequence
        type: number
        pii_class: none
      - name: received_sequence
        type: number
        pii_class: none

  - name: daemon_dispatch_degraded
    category: system
    trigger_surface: bff
    consent_category: necessary
    properties:
      - name: account_id_hash
        type: string
        pii_class: pseudonymous
      - name: degraded_reason
        type: string
        pii_class: none
        description: "dispatch_error | log_format_drift"
      - name: consecutive_failures
        type: "number | null"
        pii_class: none
      - name: status_code
        type: "number | null"
        pii_class: none
      - name: parse_failure_count
        type: "number | null"
        pii_class: none
      - name: sample_line_hash
        type: "string | null"
        pii_class: none
      - name: failed_event_types
        type: "string[] | null"
        pii_class: none

  - name: daemon_auth_failed
    category: system
    trigger_surface: bff
    consent_category: necessary
    properties:
      - name: account_id_hash
        type: string
        pii_class: pseudonymous
      - name: reason
        type: string
        pii_class: none
      - name: platform
        type: string
        pii_class: none
      - name: daemon_version
        type: string
        pii_class: none

  - name: daemon_keychain_error
    category: system
    trigger_surface: bff
    consent_category: necessary
    properties:
      - name: account_id_hash
        type: string
        pii_class: pseudonymous
      - name: error_type
        type: string
        pii_class: none
      - name: platform
        type: string
        pii_class: none
      - name: daemon_version
        type: string
        pii_class: none

  - name: daemon_account_id_mismatch
    category: system
    trigger_surface: bff
    consent_category: necessary
    properties:
      - name: account_id_hash
        type: string
        pii_class: pseudonymous
      - name: event_account_id_hash
        type: string
        pii_class: pseudonymous
      - name: key_bound_account_id_hash
        type: string
        pii_class: pseudonymous
      - name: user_id
        type: number
        pii_class: none

  - name: get_deck
    category: feature_use
    trigger_surface: bff
    consent_category: analytics
    properties:
      - name: deck_id
        type: string
        pii_class: none
      - name: account_id_hash
        type: string
        pii_class: pseudonymous

  - name: create_deck
    category: feature_use
    trigger_surface: bff
    consent_category: analytics
    properties:
      - name: format
        type: string
        pii_class: none
      - name: source
        type: string
        pii_class: none
      - name: account_id_hash
        type: string
        pii_class: pseudonymous

  - name: update_deck
    category: feature_use
    trigger_surface: bff
    consent_category: analytics
    properties:
      - name: deck_id
        type: string
        pii_class: none
      - name: account_id_hash
        type: string
        pii_class: pseudonymous

  - name: delete_deck
    category: feature_use
    trigger_surface: bff
    consent_category: analytics
    properties:
      - name: deck_id
        type: string
        pii_class: none
      - name: account_id_hash
        type: string
        pii_class: pseudonymous

  - name: clone_deck
    category: feature_use
    trigger_surface: bff
    consent_category: analytics
    properties:
      - name: source_deck_id
        type: string
        pii_class: none
      - name: new_deck_id
        type: string
        pii_class: none
      - name: account_id_hash
        type: string
        pii_class: pseudonymous

  - name: export_deck
    category: feature_use
    trigger_surface: bff
    consent_category: analytics
    properties:
      - name: deck_id
        type: string
        pii_class: none
      - name: deck_name
        type: string
        pii_class: pii_hashed
        description: "User-supplied free-text deck name — may contain personal data; must be hashed before forwarding to PostHog."
      - name: account_id_hash
        type: string
        pii_class: pseudonymous
      - name: format
        type: string
        pii_class: none

  # D7.2 — projection-time duplicate-account detection (ticket #1335).
  # Emitted by GetOrCreateByClientID when an INSERT succeeds but the post-insert
  # count reveals the user now has more than one accounts row.
  # Operational=true so it bypasses the Art.18 halt check (system observability).
  - name: account_duplicate_detected
    category: system
    trigger_surface: bff
    consent_category: necessary
    properties:
      - name: account_id_hash
        type: string
        pii_class: pseudonymous
        description: "SHA-256 hex[:16] of accounts.account_id_hash — never a raw id."
      - name: duplicate_count
        type: number
        pii_class: none
        description: "Total number of accounts rows for this user after the duplicate insert."

  # D7.1 — daily canary alert (ticket #1335).
  # Emitted by the background canary worker when CheckDuplicateAccounts finds any
  # user with more than one accounts row.
  # Operational=true so it always fires regardless of halt flags.
  - name: account_duplicate_canary_triggered
    category: system
    trigger_surface: bff
    consent_category: necessary
    properties:
      - name: affected_user_count
        type: number
        pii_class: none
        description: "Number of distinct user_ids that have more than one accounts row."
